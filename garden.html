<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘花园 Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0c3fc;
            --bg-gradient: linear-gradient(135deg, var(--bg-color) 0%, #ffffff 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --primary: #4CAF50;
            --accent: #FF9800;
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #1a1a1a 100%);
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-main: #ecf0f1;
            --text-sub: #bdc3c7;
            --primary: #2ecc71;
            --accent: #f39c12;
            --border: rgba(255, 255, 255, 0.1);
        }

        /* 稀有度颜色 */
        .rarity-1 { color: #7f8c8d; border-color: #7f8c8d; } 
        .rarity-2 { color: #2ecc71; border-color: #2ecc71; } 
        .rarity-3 { color: #3498db; border-color: #3498db; } 
        .rarity-4 { color: #9b59b6; border-color: #9b59b6; } 
        .rarity-5 { color: #f1c40f; border-color: #f1c40f; text-shadow: 0 0 5px #f1c40f; }
        .rarity-S { color: #ff7675; border-color: #ff7675; animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            margin: 0; padding: 15px; min-height: 100vh;
            color: var(--text-main); overflow-y: auto;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 10px 20px; border-radius: 20px;
            box-shadow: var(--shadow); margin-bottom: 20px; backdrop-filter: blur(10px);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .back-btn { text-decoration: none; font-size: 16px; background: #f1f2f6; padding: 5px 12px; border-radius: 20px; color: #333; }
        .nav-right { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .icon-btn:hover { background: rgba(0,0,0,0.1); }
        
        /* 颜色选择器 */
        .color-picker-group { display: flex; gap: 5px; align-items: center; background: rgba(0,0,0,0.05); padding: 5px; border-radius: 20px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        #custom-color-input { width: 24px; height: 24px; padding: 0; border: none; border-radius: 50%; overflow: hidden; cursor: pointer; }

        /* 三栏布局 */
        .main-layout {
            display: grid; grid-template-columns: 280px 1fr 300px; gap: 20px;
            height: calc(100vh - 100px);
        }

        .panel {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow-y: auto;
        }

        h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* 左侧 */
        .level-bar-container { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        .level-bar-fill { height: 100%; background: linear-gradient(90deg, #00b09b, #96c93d); width: 0%; }
        
        .dig-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .soil-pile { aspect-ratio: 1; background: #8D6E63; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 32px; position: relative; }
        .soil-pile:hover { transform: translateY(-2px); background: #795548; }
        .soil-pile.dug { background: #5D4037; cursor: default; opacity: 0.6; }

        /* 中间：种植 */
        .garden-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 5px; }
        .plot {
            aspect-ratio: 1; background: rgba(139, 69, 19, 0.05); border: 2px dashed var(--text-sub);
            border-radius: 20px; position: relative; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; text-align: center;
        }
        .plot.occupied { border-style: solid; background: rgba(255,255,255,0.4); }
        .plant-emoji { font-size: 42px; margin-bottom: 2px; transition: transform 0.3s; }
        .plot:hover .plant-emoji { transform: scale(1.1); }
        .plant-timer { font-size: 11px; font-family: monospace; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 10px; margin-top: 4px; }
        
        /* 阶段标识 */
        .stage-tag { position: absolute; top: 5px; left: 5px; font-size: 10px; padding: 2px 6px; background: var(--primary); color: white; border-radius: 8px; opacity: 0.8; }

        /* 右侧：展览馆 */
        .tab-group { display: flex; margin-bottom: 15px; border-bottom: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; cursor: pointer; font-weight: bold; color: var(--text-sub); border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        
        .exhibition-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .exhibit-slot { 
            aspect-ratio: 1; background: rgba(0,0,0,0.03); border-radius: 16px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--border); cursor: pointer;
        }
        .exhibit-slot.locked { background: repeating-linear-gradient(45deg, #eee, #eee 10px, #e0e0e0 10px, #e0e0e0 20px); cursor: not-allowed; }

        /* 纪念品金框动画 */
        .souvenir-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #fff 0%, #fff8e1 100%);
            padding: 30px; border-radius: 30px; text-align: center;
            border: 4px solid #f1c40f; box-shadow: 0 0 50px rgba(241, 196, 15, 0.5);
            z-index: 2000; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 300px;
        }
        .souvenir-popup.show { transform: translate(-50%, -50%) scale(1); }
        .souvenir-halo { font-size: 60px; filter: drop-shadow(0 0 20px gold); animation: spin 10s linear infinite; display: inline-block; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 模态框 & 列表 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; display: flex; flex-direction: column; }
        
        .shop-tabs, .bag-tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip { padding: 6px 12px; background: #f1f2f6; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .filter-chip.active { background: var(--primary); color: white; }

        .item-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-item { border: 1px solid #eee; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; position: relative; }
        .game-item:hover { background: #f9f9f9; border-color: var(--primary); }
        .badge-count { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 10px; font-size: 10px; padding: 2px 6px; }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; height: auto; display: block; }
            .panel { margin-bottom: 20px; min-height: 350px; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="top-bar">
        <div class="nav-left">
            <a href="index.html" class="back-btn">⬅ 返回首页</a>
            <h1 style="margin:0; font-size:18px;">🌿 神秘花园 Pro</h1>
        </div>
        <div class="nav-right">
            <div class="color-picker-group">
                <div class="color-dot" style="background:#e0c3fc" onclick="setTheme('#e0c3fc')"></div>
                <div class="color-dot" style="background:#8ec5fc" onclick="setTheme('#8ec5fc')"></div>
                <div class="color-dot" style="background:#ff9ff3" onclick="setTheme('#ff9ff3')"></div>
                <div class="color-dot" style="background:#55efc4" onclick="setTheme('#55efc4')"></div>
                <input type="color" id="custom-color-input" onchange="setTheme(this.value)" title="自定义背景色">
            </div>
            <button class="icon-btn" onclick="toggleDarkMode()" title="黑夜模式">🌗</button>
            <span id="coin-display" style="font-weight:bold; color:var(--accent); font-size:14px;">💰 0</span>
            <span id="level-display" style="font-weight:bold; color:var(--primary); font-size:14px; margin-left:5px;">Lv.1</span>
            <button class="icon-btn" onclick="openModal('inventoryModal')">🎒</button>
            <button class="icon-btn" onclick="openModal('shopModal')">🛒</button>
            <button class="icon-btn" onclick="openDevAuth()">🛠️</button>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        
        <!-- 左侧：等级 & 挖土 -->
        <div class="panel">
            <h2>
                <span>📊 等级 <span id="lvl-num">1</span></span>
                <button onclick="dailyCheckIn()" id="check-in-btn" style="font-size:12px; padding:4px 8px; background:var(--accent); color:white; border:none; border-radius:12px; cursor:pointer;">📅 签到</button>
            </h2>
            <div class="level-bar-container">
                <div id="xp-bar" class="level-bar-fill"></div>
            </div>
            <div style="font-size:12px; text-align:right; margin-bottom:15px; color:var(--text-sub);">XP: <span id="xp-val">0</span>/<span id="xp-max">100</span></div>

            <h2 style="margin-top:10px;">⛏️ 寻宝 (<span id="dig-count">5</span>)</h2>
            <div id="soil-container" class="dig-grid">
                <!-- JS生成 -->
            </div>
            <div id="dig-msg" style="margin-top:10px; text-align:center; height:20px; font-size:12px; color:var(--text-main);"></div>
        </div>

        <!-- 中间：种植区 -->
        <div class="panel">
            <h2>🌱 皇家种植园 <small style="font-size:12px; font-weight:normal; color:#888;">树木与花卉</small></h2>
            <div id="garden-container" class="garden-grid">
                <!-- JS生成 -->
            </div>
        </div>

        <!-- 右侧：展览馆 -->
        <div class="panel">
            <div class="tab-group">
                <button class="tab-btn active" onclick="switchRightTab('exhibit')">🏆 展览区</button>
                <button class="tab-btn" onclick="switchRightTab('gallery')">📖 图鉴</button>
            </div>
            
            <!-- 展览区内容 -->
            <div id="tab-exhibit" style="display:block;">
                <p style="font-size:12px; color:var(--text-sub); margin-bottom:10px;">展示你的得意收藏 (升级解锁更多位置)</p>
                <div id="exhibition-grid" class="exhibition-grid">
                    <!-- JS生成 -->
                </div>
            </div>

            <!-- 图鉴内容 -->
            <div id="tab-gallery" style="display:none;">
                <div id="gallery-list" class="item-list" style="grid-template-columns: repeat(4, 1fr);">
                    <!-- JS生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 获得纪念品弹窗 -->
    <div id="souvenirPopup" class="souvenir-popup">
        <h3>✨ 获得稀有纪念品 ✨</h3>
        <div class="souvenir-halo" id="pop-emoji">🏆</div>
        <h2 id="pop-name" style="color:var(--accent); margin:10px 0;">神秘奖杯</h2>
        <p id="pop-desc" style="font-size:12px; color:#666;">这是一个非常珍贵的物品。</p>
        <button onclick="closeSouvenirPopup()" style="margin-top:15px; padding:8px 20px; background:var(--primary); color:white; border:none; border-radius:20px; cursor:pointer;">收入囊中</button>
    </div>

    <!-- 背包模态框 -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <h3>🎒 我的背包</h3>
            <div class="bag-tabs">
                <span class="filter-chip active" onclick="filterBag('all', this)">全部</span>
                <span class="filter-chip" onclick="filterBag('seed', this)">🌱 种子</span>
                <span class="filter-chip" onclick="filterBag('fruit', this)">🍎 果实</span>
                <span class="filter-chip" onclick="filterBag('tool', this)">🔧 道具</span>
                <span class="filter-chip" onclick="filterBag('souvenir', this)">🏆 纪念品</span>
            </div>
            <div id="inventory-list" class="item-list"></div>
            <button onclick="closeModal('inventoryModal')" style="width:100%; margin-top:20px; padding:10px; border:none; background:#eee; border-radius:10px;">关闭</button>
        </div>
    </div>

    <!-- 商城模态框 -->
    <div id="shopModal" class="modal">
        <div class="modal-content">
            <h3>🛒 农资百货</h3>
            <div class="shop-tabs">
                <span class="filter-chip active" onclick="filterShop('seed', this)">种子</span>
                <span class="filter-chip" onclick="filterShop('tool', this)">道具</span>
                <span class="filter-chip" onclick="filterShop('chance', this)">机会/玩法</span>
            </div>
            <div id="shop-list" class="item-list"></div>
            <button onclick="closeModal('shopModal')" style="width:100%; margin-top:20px; padding:10px; border:none; background:#eee; border-radius:10px;">离开</button>
        </div>
    </div>

    <!-- 种子选择播种 -->
    <div id="seedSelectModal" class="modal">
        <div class="modal-content">
            <h3>🌱 选择要播种的种子</h3>
            <div id="seed-select-list" class="item-list"></div>
            <button onclick="closeModal('seedSelectModal')" style="width:100%; margin-top:20px; padding:10px;">取消</button>
        </div>
    </div>
    
    <!-- 展览选择 -->
    <div id="exhibitSelectModal" class="modal">
        <div class="modal-content">
            <h3>🏆 选择展品</h3>
            <p style="font-size:12px; color:#888;">可以展示已解锁的图鉴内容</p>
            <div id="exhibit-select-list" class="item-list"></div>
            <button onclick="closeModal('exhibitSelectModal')" style="width:100%; margin-top:20px; padding:10px;">取消</button>
        </div>
    </div>

    <!-- 开发者 -->
    <div id="devModal" class="modal">
        <div class="modal-content">
            <h3>🛠️ 开发者控制台</h3>
            <div style="display:grid; gap:10px;">
                <button onclick="devAddCoins()">+1000 金币</button>
                <button onclick="devAddXP()">+100 经验</button>
                <button onclick="devAddDigs()">满挖掘次数</button>
                <button onclick="devSpeedUp()">一键加速所有植物</button>
                <button onclick="devGetSouvenir()">随机获得纪念品</button>
                <button onclick="hardReset()" style="background:red; color:white;">⚠️ 删档重置</button>
            </div>
            <button onclick="closeModal('devModal')" style="margin-top:20px;">关闭</button>
        </div>
    </div>

    <script>
        // ================= 数据定义 =================
        const CONFIG = {
            baseDigs: 5,
            levelCap: 10,
            xpTable: [0, 100, 300, 600, 1000, 1500, 2200, 3000, 4000, 5500, 99999]
        };

        // 植物库 (type: 1=花草, 2=树木)
        const PLANTS = {
            1: { name: '狗尾草', type: 1, emoji: '🌿', stages: ['🌱','🌱','🌿','🌾'], time: 60, reward: 10, xp: 5, rarity: 1 },
            2: { name: '向日葵', type: 1, emoji: '🌻', stages: ['🌱','🪴','🌻','🌻'], time: 180, reward: 30, xp: 15, rarity: 2 },
            3: { name: '蓝玫瑰', type: 1, emoji: '🌹', stages: ['🌱','🪴','🥀','🌹'], time: 600, reward: 80, xp: 40, rarity: 3 },
            4: { name: '橡树',   type: 2, emoji: '🌳', stages: ['🌰','🌱','🌲','🌳'], time: 1200, reward: 150, xp: 80, rarity: 3 },
            5: { name: '水晶兰', type: 1, emoji: '🪷', stages: ['🌱','💠','🪷','🪷'], time: 2400, reward: 300, xp: 150, rarity: 4 },
            6: { name: '黄金树', type: 2, emoji: '🎄', stages: ['🌰','🌱','🌲','🎄'], time: 3600, reward: 600, xp: 300, rarity: 5 },
            7: { name: '食人花', type: 1, emoji: '🌺', stages: ['🌱','🪴','🌷','🌺'], time: 4800, reward: 800, xp: 400, rarity: 4 },
            8: { name: '世界树', type: 2, emoji: '🎋', stages: ['✨','🎋','🎋','🎋'], time: 7200, reward: 1500, xp: 800, rarity: 5 }
        };

        // 纪念品库
        const SOUVENIRS = {
            's1': { name: '古代化石', emoji: '🦕', desc: '挖土时意外发现的恐龙骨头。' },
            's2': { name: '四叶草', emoji: '🍀', desc: '象征幸运的植物标本。' },
            's3': { name: '金铲子', emoji: '🔱', desc: '传说中农神使用过的工具。' },
            's4': { name: '神秘外星人', emoji: '👽', desc: '它说它来自种子的故乡。' },
            's5': { name: '时间胶囊', emoji: '💊', desc: '里面写着上一代园主的信。' },
            's6': { name: '冠军奖杯', emoji: '🏆', desc: '园艺大赛第一名！' }
        };

        // 道具库
        const TOOLS = {
            'fertilizer': { name: '速效肥', emoji: '⚡', desc: '减少30%生长时间', price: 50 },
            'water':      { name: '山泉水', emoji: '💧', desc: '减少10秒，免费', price: 0 },
            'mystery_box':{ name: '神秘盲盒', emoji: '🎁', desc: '随机开出物品', price: 100 }
        };

        let state = {
            coins: 100,
            xp: 0,
            level: 1,
            digs: 5,
            lastLogin: '',
            plots: Array(6).fill(null), // { id, pid, start, duration, stageIndex }
            inventory: { seeds: {}, fruits: {}, tools: { fertilizer: 0 }, souvenirs: [] },
            exhibition: Array(4).fill(null), // 存 PLANT_ID 或 SOUVENIR_KEY
            unlocked: [] // 记录解锁过的ID
        };

        let activePlotIdx = -1;
        let activeExhibitIdx = -1;

        // ================= 初始化 =================
        window.onload = () => {
            loadGame();
            renderAll();
            setInterval(gameLoop, 1000);
        };

        function loadGame() {
            const saved = localStorage.getItem('garden_pro_v1');
            if(saved) {
                state = JSON.parse(saved);
                // 数据迁移兼容
                if(!state.exhibition) state.exhibition = Array(4).fill(null);
                if(!state.unlocked) state.unlocked = [];
            }
            // 恢复主题
            const theme = localStorage.getItem('garden_theme_color');
            if(theme) setTheme(theme);
            const dark = localStorage.getItem('garden_dark_mode');
            if(dark === 'true') document.body.setAttribute('data-theme', 'dark');
        }

        function saveGame() {
            localStorage.setItem('garden_pro_v1', JSON.stringify(state));
        }

        function renderAll() {
            updateHeader();
            renderLeftPanel();
            renderGarden();
            renderRightPanel();
        }

        // ================= 逻辑与功能 =================

        // --- 头部 & 主题 ---
        function updateHeader() {
            document.getElementById('coin-display').innerText = `💰 ${state.coins}`;
            document.getElementById('level-display').innerText = `Lv.${state.level}`;
        }

        function setTheme(color) {
            document.documentElement.style.setProperty('--bg-color', color);
            localStorage.setItem('garden_theme_color', color);
        }

        function toggleDarkMode() {
            const isDark = document.body.hasAttribute('data-theme');
            if(isDark) {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('garden_dark_mode', 'false');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('garden_dark_mode', 'true');
            }
        }

        // --- 左侧：等级、签到、挖土 ---
        function renderLeftPanel() {
            // 等级条
            const maxXp = CONFIG.xpTable[state.level];
            const currentLevelXp = state.level === 1 ? state.xp : state.xp - CONFIG.xpTable[state.level-1];
            const levelRange = state.level === 1 ? 100 : CONFIG.xpTable[state.level] - CONFIG.xpTable[state.level-1];
            
            const pct = Math.min(100, Math.floor((currentLevelXp / levelRange) * 100));
            document.getElementById('lvl-num').innerText = state.level;
            document.getElementById('xp-bar').style.width = pct + '%';
            document.getElementById('xp-val').innerText = state.xp;
            document.getElementById('xp-max').innerText = maxXp;

            // 签到按钮
            const today = new Date().toDateString();
            const btn = document.getElementById('check-in-btn');
            if(state.lastLogin === today) {
                btn.innerText = '✅ 已签到';
                btn.disabled = true;
                btn.style.background = '#ccc';
            } else {
                btn.innerText = '📅 签到';
                btn.disabled = false;
                btn.style.background = 'var(--accent)';
                // 重置挖土次数
                state.digs = CONFIG.baseDigs;
            }
            document.getElementById('dig-count').innerText = state.digs;

            // 挖土格子
            const box = document.getElementById('soil-container');
            box.innerHTML = '';
            for(let i=0; i<4; i++) {
                box.innerHTML += `<div class="soil-pile" onclick="dig(this)">🕳️</div>`;
            }
        }

        function dailyCheckIn() {
            const reward = Math.floor(Math.random() * 100) + 10;
            state.coins += reward;
            state.lastLogin = new Date().toDateString();
            showToast(`📅 签到成功！获得 ${reward} 金币`);
            saveGame();
            renderAll();
        }

        function dig(el) {
            if(state.digs <= 0) return showToast('😫 次数用光了，去商城买点？');
            if(el.classList.contains('dug')) return;

            el.classList.add('dug');
            state.digs--;
            
            // 挖土概率: 20%空, 40%种子, 20%金币, 15%道具, 5%纪念品
            const rng = Math.random();
            if(rng < 0.2) {
                showToast('💨 哎呀，什么都没有挖到');
            } else if (rng < 0.6) {
                // 种子
                const pid = Math.floor(Math.random() * 4) + 1; // 1-4号普通种子
                addItem('seeds', pid, 1);
                showToast(`🌱 挖到了：${PLANTS[pid].name}种子`);
            } else if (rng < 0.8) {
                // 金币
                const c = Math.floor(Math.random() * 50) + 10;
                state.coins += c;
                showToast(`💰 挖到了 ${c} 金币`);
            } else if (rng < 0.95) {
                // 道具
                addItem('tools', 'fertilizer', 1);
                showToast(`⚡ 挖到了：速效肥`);
            } else {
                // 纪念品
                const sKeys = Object.keys(SOUVENIRS);
                const sKey = sKeys[Math.floor(Math.random() * sKeys.length)];
                addSouvenir(sKey);
            }
            
            updateHeader();
            document.getElementById('dig-count').innerText = state.digs;
            setTimeout(() => {
                el.classList.remove('dug');
                saveGame();
            }, 1000); // 1秒后复原土堆方便下次
        }

        // --- 中间：种植与成长 ---
        function renderGarden() {
            const grid = document.getElementById('garden-container');
            grid.innerHTML = '';

            state.plots.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `plot ${p ? 'occupied' : ''}`;

                if(!p) {
                    div.innerHTML = `<span style="font-size:30px;color:#ccc;">➕</span><span style="font-size:12px;color:#aaa;">播种</span>`;
                    div.onclick = () => openSeedSelect(idx);
                } else {
                    const info = PLANTS[p.pid];
                    const now = Date.now();
                    const elapsed = (now - p.start) / 1000;
                    const timeLeft = Math.max(0, p.duration - elapsed);
                    const progress = Math.min(1, elapsed / p.duration);
                    
                    // 计算阶段
                    let stageIdx = 0;
                    if(progress > 1) stageIdx = 3; // 成熟
                    else if(progress > 0.6) stageIdx = 2; // 成年
                    else if(progress > 0.3) stageIdx = 1; // 幼年
                    else stageIdx = 0; // 发芽
                    
                    const isMature = progress >= 1;
                    const stageName = isMature ? '成熟' : ['发芽','幼苗','生长','成熟'][stageIdx];
                    const icon = info.stages[stageIdx];

                    div.innerHTML = `
                        <div class="stage-tag">${stageName}</div>
                        <div class="plant-emoji">${icon}</div>
                        <div style="font-size:12px; font-weight:bold;">${info.name}</div>
                        ${isMature ? 
                            `<div class="plant-timer" style="background:gold; color:black;">可收获</div>` : 
                            `<div class="plant-timer">⏳ ${formatTime(timeLeft)}</div>`
                        }
                    `;
                    
                    // 点击事件：成熟收获，未成熟弹道具菜单
                    if(isMature) {
                        div.onclick = () => harvest(idx);
                        div.style.borderColor = 'gold';
                    } else {
                        div.onclick = () => useTool(idx);
                    }
                }
                grid.appendChild(div);
            });
        }

        function gameLoop() {
            // 每秒刷新一次种植区和倒计时
            renderGarden();
        }

        function formatTime(sec) {
            const h = Math.floor(sec / 3600).toString().padStart(2,'0');
            const m = Math.floor((sec % 3600) / 60).toString().padStart(2,'0');
            const s = Math.floor(sec % 60).toString().padStart(2,'0');
            return `${h}:${m}:${s}`;
        }

        function openSeedSelect(idx) {
            activePlotIdx = idx;
            const list = document.getElementById('seed-select-list');
            list.innerHTML = '';
            
            let hasSeed = false;
            for(let id in state.inventory.seeds) {
                if(state.inventory.seeds[id] > 0) {
                    hasSeed = true;
                    const info = PLANTS[id];
                    list.innerHTML += `
                        <div class="game-item rarity-${info.rarity}" onclick="plant(${id})">
                            <div style="font-size:24px;">${info.emoji}</div>
                            <div>${info.name}</div>
                            <div style="font-size:10px;">x${state.inventory.seeds[id]}</div>
                        </div>
                    `;
                }
            }
            if(!hasSeed) list.innerHTML = '<div>🎒 背包里没有种子</div>';
            openModal('seedSelectModal');
        }

        function plant(pid) {
            state.inventory.seeds[pid]--;
            const info = PLANTS[pid];
            state.plots[activePlotIdx] = {
                id: Date.now(),
                pid: pid,
                start: Date.now(),
                duration: info.time
            };
            closeModal('seedSelectModal');
            saveGame();
            renderAll();
        }

        function useTool(idx) {
            // 简单处理：点击未成熟植物直接施肥（如果背包有）
            if(state.inventory.tools['fertilizer'] > 0) {
                if(confirm('使用⚡速效肥加速30%？')) {
                    state.inventory.tools['fertilizer']--;
                    const p = state.plots[idx];
                    const reduce = p.duration * 0.3;
                    // 实际上是把开始时间往前推
                    p.start -= reduce * 1000;
                    showToast('⚡ 施肥成功！');
                    saveGame();
                    renderGarden();
                }
            } else {
                if(confirm('给它浇点水吗？(免费加速10秒)')) {
                    const p = state.plots[idx];
                    p.start -= 10000;
                    showToast('💧 浇水成功！');
                    renderGarden();
                }
            }
        }

        function harvest(idx) {
            const p = state.plots[idx];
            const info = PLANTS[p.pid];
            
            // 奖励
            state.coins += info.reward;
            addItem('fruits', p.pid, 1);
            addXP(info.xp);
            
            // 解锁图鉴
            if(!state.unlocked.includes('p'+p.pid)) {
                state.unlocked.push('p'+p.pid);
                showToast(`🔓 解锁图鉴：${info.name}`);
            }

            // 随机掉落纪念品
            if(Math.random() < 0.05) {
                const sKey = Object.keys(SOUVENIRS)[Math.floor(Math.random()*Object.keys(SOUVENIRS).length)];
                addSouvenir(sKey);
            }

            state.plots[idx] = null;
            showToast(`收获 ${info.name}! +${info.reward}金币 +${info.xp}XP`);
            saveGame();
            renderAll();
        }

        // --- 右侧：展览与图鉴 ---
        function switchRightTab(tab) {
            document.getElementById('tab-exhibit').style.display = tab === 'exhibit' ? 'block' : 'none';
            document.getElementById('tab-gallery').style.display = tab === 'gallery' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(tab === 'gallery') renderGallery();
            if(tab === 'exhibit') renderExhibit();
        }

        function renderExhibit() {
            const grid = document.getElementById('exhibition-grid');
            grid.innerHTML = '';
            // 展位数量随等级增加，每2级加1个，基础2个，最多4个
            const slots = Math.min(4, 2 + Math.floor((state.level-1)/2));
            
            for(let i=0; i<4; i++) {
                if(i < slots) {
                    const content = state.exhibition[i];
                    let inner = '<span style="color:#ccc; font-size:20px;">➕</span>';
                    if(content) {
                        // 内容可能是 p+id (植物) 或 s+key (纪念品)
                        if(content.startsWith('p')) {
                            const info = PLANTS[content.substring(1)];
                            inner = `<span style="font-size:30px;">${info.emoji}</span><span style="font-size:10px;">${info.name}</span>`;
                        } else {
                            const info = SOUVENIRS[content.substring(1)];
                            inner = `<span style="font-size:30px;">${info.emoji}</span><span style="font-size:10px;">${info.name}</span>`;
                        }
                    }
                    grid.innerHTML += `<div class="exhibit-slot" onclick="setExhibit(${i})">${inner}</div>`;
                } else {
                    grid.innerHTML += `<div class="exhibit-slot locked"><span style="font-size:10px; color:#999;">Lv.${(i-1)*2 + 1}解锁</span></div>`;
                }
            }
        }

        function setExhibit(idx) {
            activeExhibitIdx = idx;
            // 弹出选择框，显示已解锁的植物和纪念品
            const list = document.getElementById('exhibit-select-list');
            list.innerHTML = `<div class="game-item" onclick="clearExhibit()">🚫 清空</div>`;
            
            state.unlocked.forEach(uKey => {
                if(uKey.startsWith('p')) {
                    const info = PLANTS[uKey.substring(1)];
                    list.innerHTML += getItemHtml(info.emoji, info.name, '', `rarity-${info.rarity}`, `selectExhibitItem('${uKey}')`);
                }
            });
            state.inventory.souvenirs.forEach(sKey => {
                const info = SOUVENIRS[sKey];
                list.innerHTML += getItemHtml(info.emoji, info.name, '', 'rarity-S', `selectExhibitItem('s${sKey}')`);
            });
            
            openModal('exhibitSelectModal');
        }

        function selectExhibitItem(key) {
            state.exhibition[activeExhibitIdx] = key;
            saveGame();
            closeModal('exhibitSelectModal');
            renderExhibit();
        }
        
        function clearExhibit() {
            state.exhibition[activeExhibitIdx] = null;
            saveGame();
            closeModal('exhibitSelectModal');
            renderExhibit();
        }

        function renderGallery() {
            const list = document.getElementById('gallery-list');
            list.innerHTML = '';
            // 植物图鉴
            for(let pid in PLANTS) {
                const unlocked = state.unlocked.includes('p'+pid);
                const p = PLANTS[pid];
                list.innerHTML += `
                    <div class="game-item ${unlocked ? 'rarity-'+p.rarity : ''}" style="opacity:${unlocked?1:0.3}">
                        <div style="font-size:20px;">${unlocked ? p.emoji : '❓'}</div>
                        <div style="font-size:10px;">${p.name}</div>
                    </div>
                `;
            }
            // 纪念品图鉴
            for(let skey in SOUVENIRS) {
                const has = state.inventory.souvenirs.includes(skey);
                const s = SOUVENIRS[skey];
                list.innerHTML += `
                    <div class="game-item ${has ? 'rarity-S' : ''}" style="opacity:${has?1:0.3}">
                        <div style="font-size:20px;">${has ? s.emoji : '❓'}</div>
                        <div style="font-size:10px;">${has ? s.name : '???'}</div>
                    </div>
                `;
            }
        }

        // --- 通用系统 ---
        function addXP(amount) {
            state.xp += amount;
            if(state.level < CONFIG.levelCap && state.xp >= CONFIG.xpTable[state.level]) {
                state.level++;
                showToast(`🎉 升级啦！当前等级 Lv.${state.level}`);
            }
            updateHeader();
            renderLeftPanel();
        }

        function addItem(cat, id, amount) {
            if(!state.inventory[cat]) state.inventory[cat] = {};
            if(!state.inventory[cat][id]) state.inventory[cat][id] = 0;
            state.inventory[cat][id] += amount;
        }

        function addSouvenir(key) {
            if(!state.inventory.souvenirs.includes(key)) {
                state.inventory.souvenirs.push(key);
                // 弹窗
                const s = SOUVENIRS[key];
                document.getElementById('pop-emoji').innerText = s.emoji;
                document.getElementById('pop-name').innerText = s.name;
                document.getElementById('pop-desc').innerText = s.desc;
                document.getElementById('souvenirPopup').classList.add('show');
            }
        }
        
        function closeSouvenirPopup() {
            document.getElementById('souvenirPopup').classList.remove('show');
        }

        function showToast(msg) {
            const d = document.getElementById('dig-msg');
            d.innerText = msg;
            setTimeout(() => d.innerText = '', 3000);
        }

        // --- 背包与商城 ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; renderInventory(); renderShop(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function filterBag(type, btn) {
            document.querySelectorAll('.bag-tabs .filter-chip').forEach(c=>c.classList.remove('active'));
            btn.classList.add('active');
            renderInventory(type);
        }

        function renderInventory(filter = 'all') {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';

            // 种子
            if(filter === 'all' || filter === 'seed') {
                for(let id in state.inventory.seeds) {
                    if(state.inventory.seeds[id]>0) {
                        const i = PLANTS[id];
                        list.innerHTML += getItemHtml(i.emoji, i.name, state.inventory.seeds[id], 'rarity-'+i.rarity);
                    }
                }
            }
            // 果实
            if(filter === 'all' || filter === 'fruit') {
                for(let id in state.inventory.fruits) {
                    if(state.inventory.fruits[id]>0) {
                        const i = PLANTS[id];
                        list.innerHTML += getItemHtml(i.emoji, i.name+'果', state.inventory.fruits[id], '');
                    }
                }
            }
            // 道具
            if(filter === 'all' || filter === 'tool') {
                for(let k in state.inventory.tools) {
                    if(state.inventory.tools[k]>0) {
                        const i = TOOLS[k];
                        list.innerHTML += getItemHtml(i.emoji, i.name, state.inventory.tools[k], '');
                    }
                }
            }
            // 纪念品
            if(filter === 'all' || filter === 'souvenir') {
                state.inventory.souvenirs.forEach(k => {
                    const s = SOUVENIRS[k];
                    list.innerHTML += getItemHtml(s.emoji, s.name, 1, 'rarity-S');
                });
            }
        }

        function getItemHtml(emoji, name, count, cls, onClick='') {
            return `
                <div class="game-item ${cls}" onclick="${onClick}">
                    ${count > 1 ? `<span class="badge-count">${count}</span>` : ''}
                    <div style="font-size:24px;">${emoji}</div>
                    <div style="font-size:12px;">${name}</div>
                </div>
            `;
        }

        function filterShop(type, btn) {
            document.querySelectorAll('.shop-tabs .filter-chip').forEach(c=>c.classList.remove('active'));
            btn.classList.add('active');
            renderShop(type);
        }

        function renderShop(type = 'seed') {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            
            if(type === 'seed') {
                for(let pid in PLANTS) {
                    const p = PLANTS[pid];
                    // 树木要等级高一点才能买
                    if(p.type === 2 && state.level < 3) continue; 
                    const price = p.reward * 0.5; // 假定价格
                    list.innerHTML += getShopHtml(p.emoji, p.name, Math.floor(price), `buySeed(${pid}, ${price})`);
                }
            } else if (type === 'tool') {
                for(let k in TOOLS) {
                    const t = TOOLS[k];
                    if(t.price > 0) list.innerHTML += getShopHtml(t.emoji, t.name, t.price, `buyTool('${k}', ${t.price})`);
                }
            } else if (type === 'chance') {
                list.innerHTML += getShopHtml('⛏️', '5次挖掘', 50, `buyDigs(50)`);
                list.innerHTML += getShopHtml('🎫', '经验卡(+50)', 100, `buyXP(100)`);
            }
        }

        function getShopHtml(emoji, name, price, action) {
            return `
                <div class="game-item" onclick="${action}">
                    <div style="font-size:24px;">${emoji}</div>
                    <div style="font-size:12px; font-weight:bold;">${name}</div>
                    <div style="font-size:12px; color:var(--accent);">💰${price}</div>
                </div>
            `;
        }

        function buySeed(pid, price) {
            if(state.coins >= price) {
                state.coins -= price;
                addItem('seeds', pid, 1);
                showToast('购买成功');
                updateHeader(); saveGame();
            } else showToast('金币不足');
        }
        function buyTool(key, price) {
            if(state.coins >= price) {
                state.coins -= price;
                addItem('tools', key, 1);
                showToast('购买成功');
                updateHeader(); saveGame();
            } else showToast('金币不足');
        }
        function buyDigs(price) {
            if(state.coins >= price) {
                state.coins -= price;
                state.digs += 5;
                showToast('体力充沛！挖掘+5');
                updateHeader(); renderLeftPanel(); saveGame();
            } else showToast('金币不足');
        }
        function buyXP(price) {
            if(state.coins >= price) {
                state.coins -= price;
                addXP(50);
                showToast('知识增加！经验+50');
                updateHeader(); saveGame();
            } else showToast('金币不足');
        }

        // --- 开发者 ---
        function openDevAuth() {
            const p = prompt('请输入开发者密码:');
            if(p === '597') document.getElementById('devModal').style.display = 'flex';
        }
        function devAddCoins() { state.coins += 1000; updateHeader(); saveGame(); }
        function devAddXP() { addXP(100); saveGame(); }
        function devAddDigs() { state.digs = 99; renderLeftPanel(); saveGame(); }
        function devSpeedUp() { state.plots.forEach(p => { if(p) p.start -= p.duration * 1000; }); renderGarden(); saveGame(); }
        function devGetSouvenir() { const k = Object.keys(SOUVENIRS)[0]; addSouvenir(k); saveGame(); }
        function hardReset() { localStorage.removeItem('garden_pro_v1'); location.reload(); }

    </script>
</body>
</html>
