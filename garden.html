<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的神秘花园</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 浅色模式 (默认) */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --primary: #4CAF50;
            --accent: #FF9800;
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            /* 深色模式 */
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --card-bg: rgba(30, 30, 30, 0.9);
            --text-main: #ecf0f1;
            --text-sub: #bdc3c7;
            --primary: #2ecc71;
            --accent: #f39c12;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* 稀有度颜色 */
        .rarity-1 { color: #7f8c8d; border-color: #7f8c8d; } /* 白色 */
        .rarity-2 { color: #2ecc71; border-color: #2ecc71; } /* 绿色 */
        .rarity-3 { color: #3498db; border-color: #3498db; } /* 蓝色 */
        .rarity-4 { color: #9b59b6; border-color: #9b59b6; } /* 紫色 */
        .rarity-5 { color: #f1c40f; border-color: #f1c40f; text-shadow: 0 0 5px #f1c40f; } /* 金色 */

        * { box-sizing: border-box; transition: all 0.3s ease; }
        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden; /* 防止双滚动条 */
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .nav-right { display: flex; gap: 10px; }
        .icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .icon-btn:hover { background: rgba(0,0,0,0.1); }

        /* 三栏布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
            height: calc(100vh - 100px);
        }

        .panel {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }

        /* 左侧：挖土区 */
        .dig-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .soil-pile {
            aspect-ratio: 1;
            background: #8D6E63;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            position: relative;
            overflow: hidden;
        }
        .soil-pile:hover { transform: scale(1.05); background: #795548; }
        .soil-pile.dug { background: #5D4037; cursor: default; }
        
        /* 中间：种植区 */
        .garden-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 10px;
        }
        .plot {
            aspect-ratio: 1;
            background: rgba(139, 69, 19, 0.1);
            border: 2px dashed var(--text-sub);
            border-radius: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .plot.occupied { border-style: solid; background: rgba(255,255,255,0.5); }
        .plant-emoji { font-size: 48px; margin-bottom: 5px; }
        .plant-status { font-size: 12px; font-weight: bold; }
        .progress-bar {
            width: 80%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s; }
        
        /* 操作菜单（悬浮在植物上） */
        .plot-actions {
            position: absolute;
            bottom: 5px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .plot:hover .plot-actions { opacity: 1; }
        .action-mini-btn {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            color: white;
        }

        /* 右侧：树林图鉴 */
        .forest-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .forest-item {
            display: flex;
            align-items: center;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            border-left: 4px solid transparent;
        }
        
        /* 弹窗通用 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            animation: popIn 0.3s;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* 种子选择列表 */
        .seed-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .seed-item {
            text-align: center;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 12px;
            cursor: pointer;
        }
        .seed-item:hover { background: #f0f0f0; }

        /* 开发者面板 */
        .dev-row { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .dev-input { width: 60px; padding: 5px; border-radius: 8px; border: 1px solid #ccc; }

        /* 响应式 */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; height: auto; display: block; }
            .panel { margin-bottom: 20px; height: auto; min-height: 300px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="top-bar">
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="index.html" style="text-decoration:none; font-size:20px;">🏠</a>
            <h1 style="margin:0; font-size:20px;">我的神秘花园</h1>
        </div>
        <div class="nav-right">
            <span id="coin-display" style="padding:8px; font-weight:bold; color:var(--accent);">💰 0</span>
            <button class="icon-btn" onclick="openModal('inventoryModal')" title="背包">🎒</button>
            <button class="icon-btn" onclick="openModal('shopModal')" title="商城">🛒</button>
            <button class="icon-btn" onclick="toggleTheme()" title="切换主题">🌗</button>
            <button class="icon-btn" onclick="openDevAuth()" title="开发者模式">🛠️</button>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        
        <!-- 左侧：挖土 -->
        <div class="panel">
            <h2>⛏️ 挖宝 (<span id="dig-chances">5</span>/5)</h2>
            <p style="font-size:12px; color:var(--text-sub);">每天刷新，五选一挖出神秘种子！</p>
            <div id="soil-container" class="dig-grid">
                <!-- JS生成土堆 -->
            </div>
            <div id="dig-msg" style="margin-top:20px; text-align:center; min-height:20px; font-size:14px;"></div>
        </div>

        <!-- 中间：种植 -->
        <div class="panel">
            <h2>🌱 种植区</h2>
            <div id="garden-container" class="garden-grid">
                <!-- JS生成土地 -->
            </div>
        </div>

        <!-- 右侧：树林 -->
        <div class="panel">
            <h2>🌳 皇家树林</h2>
            <p style="font-size:12px; color:var(--text-sub);">展示你培育出的珍稀植物</p>
            <div id="forest-container" class="forest-list">
                <!-- JS生成展示 -->
            </div>
        </div>
    </div>

    <!-- 模态框：背包 -->
    <div id="inventoryModal" class="modal">
        <div class="modal-content">
            <h3>🎒 我的背包</h3>
            <div id="inventory-list" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;"></div>
            <button onclick="closeModal('inventoryModal')" style="width:100%; margin-top:20px; padding:10px;">关闭</button>
        </div>
    </div>

    <!-- 模态框：商城 -->
    <div id="shopModal" class="modal">
        <div class="modal-content">
            <h3>🛒 农资商城</h3>
            <div class="dev-row">
                <span>💧 强力营养液 (减少30%时间)</span>
                <button onclick="buyItem('fertilizer', 50)">50💰</button>
            </div>
            <div class="dev-row">
                <span>💊 治愈药剂 (治疗生病)</span>
                <button onclick="buyItem('medicine', 30)">30💰</button>
            </div>
            <div class="dev-row">
                <span>☀️ 人造小太阳 (加速10%)</span>
                <button onclick="buyItem('sun', 20)">20💰</button>
            </div>
            <button onclick="closeModal('shopModal')" style="width:100%; margin-top:20px; padding:10px;">离开</button>
        </div>
    </div>

    <!-- 模态框：种子选择 -->
    <div id="seedSelectModal" class="modal">
        <div class="modal-content">
            <h3>🌱 选择种子播种</h3>
            <div id="seed-select-list" class="seed-list"></div>
            <button onclick="closeModal('seedSelectModal')" style="width:100%; margin-top:20px; padding:10px;">取消</button>
        </div>
    </div>

    <!-- 模态框：开发者验证 -->
    <div id="devAuthModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h3>🛡️ 开发者验证</h3>
            <input type="password" id="dev-pwd" placeholder="输入密码" style="padding:10px; width:80%; margin:10px 0;">
            <button onclick="checkDevPwd()" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:10px;">确认</button>
            <button onclick="closeModal('devAuthModal')" style="margin-top:10px; background:none; border:none;">取消</button>
        </div>
    </div>

    <!-- 模态框：开发者控制台 -->
    <div id="devPanelModal" class="modal">
        <div class="modal-content">
            <h3>🛠️ 上帝模式</h3>
            <div class="dev-row">
                <label>每日挖掘次数</label>
                <input type="number" id="cfg-dig-limit" class="dev-input">
            </div>
            <div class="dev-row">
                <label>基础生长速度 (ms)</label>
                <input type="number" id="cfg-growth-speed" class="dev-input">
            </div>
            <div class="dev-row">
                <label>金种子概率 (%)</label>
                <input type="number" id="cfg-gold-rate" class="dev-input">
            </div>
            <div class="dev-row">
                <label>增加金币</label>
                <button onclick="addCoins(1000)">+1000💰</button>
            </div>
            <div class="dev-row">
                <label>重置挖掘</label>
                <button onclick="resetDigging()">重置</button>
            </div>
            <div class="dev-row">
                <label>清除所有数据</label>
                <button onclick="hardReset()" style="background:red; color:white;">⚠️清除</button>
            </div>
            <button onclick="saveDevConfig()" style="width:100%; margin-top:20px; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px;">保存并生效</button>
        </div>
    </div>

    <script>
        // ================= 配置与数据 =================
        let CONFIG = {
            dailyDigLimit: 5,
            growthSpeedBase: 1000, // 基础生长tick (1秒)
            probabilities: { 1: 50, 2: 30, 3: 15, 4: 4, 5: 1 }, // 白绿蓝紫金
            maxPlots: 6
        };

        const PLANT_TYPES = {
            1: { name: '狗尾草', emoji: '🌿', time: 60, reward: 10 },    // 1分钟
            2: { name: '向日葵', emoji: '🌻', time: 180, reward: 30 },   // 3分钟
            3: { name: '蓝玫瑰', emoji: '🌹', time: 600, reward: 80 },   // 10分钟
            4: { name: '水晶兰', emoji: '🪷', time: 1800, reward: 200 },  // 30分钟
            5: { name: '生命树', emoji: '🌳', time: 3600, reward: 1000 }  // 1小时
        };

        let gameState = {
            coins: 100,
            digsLeft: 5,
            lastDigDate: new Date().toDateString(),
            inventory: { seeds: {}, fruits: {}, tools: { fertilizer: 0, medicine: 0, sun: 0 } },
            plots: [], // { id, plantId, startTime, duration, status: 'growing'|'sick'|'ripe', health: 100 }
            forest: [] // 展示已收获的高级植物
        };

        let currentActivePlotIndex = -1;

        // ================= 初始化 =================
        window.onload = function() {
            loadGame();
            checkDailyReset();
            renderAll();
            startGameLoop();
        };

        function loadGame() {
            const saved = localStorage.getItem('my_plants_data');
            if (saved) {
                gameState = JSON.parse(saved);
                // 确保数据结构完整
                if(!gameState.forest) gameState.forest = [];
            } else {
                // 初始化地块
                for(let i=0; i<CONFIG.maxPlots; i++) gameState.plots.push(null);
            }
            
            // 加载配置
            const savedConfig = localStorage.getItem('my_plants_config');
            if(savedConfig) CONFIG = JSON.parse(savedConfig);

            // 应用主题
            const theme = localStorage.getItem('theme');
            if(theme === 'dark') document.body.setAttribute('data-theme', 'dark');
        }

        function saveGame() {
            localStorage.setItem('my_plants_data', JSON.stringify(gameState));
        }

        function checkDailyReset() {
            const today = new Date().toDateString();
            if (gameState.lastDigDate !== today) {
                gameState.digsLeft = CONFIG.dailyDigLimit;
                gameState.lastDigDate = today;
                resetSoilUI(); // 重置土堆UI状态
                saveGame();
            }
        }

        // ================= 渲染系统 =================
        function renderAll() {
            renderHeader();
            renderSoil();
            renderGarden();
            renderForest();
        }

        function renderHeader() {
            document.getElementById('coin-display').innerText = `💰 ${gameState.coins}`;
            document.getElementById('dig-chances').innerText = gameState.digsLeft;
        }

        // --- 挖土模块 ---
        function renderSoil() {
            const container = document.getElementById('soil-container');
            container.innerHTML = '';
            
            // 每次生成5个土堆，如果当天挖过了，保持挖过的状态需要更复杂的逻辑，
            // 这里简化为：每次刷新页面土堆重置，但扣除次数。次数为0则不能点。
            for (let i = 0; i < 5; i++) { // 这里固定显示4个格子稍微美观些，改成4个或6个更好，按需求是5选1
                // 为了布局好看，我们用CSS Grid 2列，所以生成4个或者6个比较好。
                // 需求说5选1，那我们生成5个，最后一个单独一行或者用Grid排版
            }
            // 重新修正：需求是5次机会，每次挖土是5选1。
            // 逻辑：点击“开始挖掘” -> 弹出5个土堆 -> 选择一个 -> 获得奖励 -> 扣除次数。
            
            // 简化版逻辑：左侧直接显示4个常驻土堆（模拟田地），点击直接挖。
            // 为了符合“5选1”的感觉，我们生成6个土堆格子（Grid 2列，3行），最后一次机会。
            
            let html = '';
            for(let i=0; i<4; i++) { // 保持界面整洁，放4个土堆图形
                html += `<div class="soil-pile" onclick="digAction(this)">🕳️</div>`;
            }
            container.innerHTML = html;
        }

        function digAction(el) {
            if (gameState.digsLeft <= 0) {
                showToast("😫 今天的力气用光了，明天再来吧！");
                return;
            }
            if (el.classList.contains('dug')) return;

            el.classList.add('dug');
            el.innerHTML = '✨';
            
            gameState.digsLeft--;
            
            // 计算掉落
            const seed = generateRandomSeed();
            addInventory('seeds', seed, 1);
            
            setTimeout(() => {
                showToast(`🎉 挖到了：<span class="rarity-${seed}">Lv.${seed} ${PLANT_TYPES[seed].name}种子</span>`);
                el.innerHTML = '🕳️'; // 恢复，为了游戏性
                el.classList.remove('dug');
                renderHeader();
                saveGame();
            }, 500);
        }

        function generateRandomSeed() {
            const rand = Math.random() * 100;
            let sum = 0;
            for (let lv = 1; lv <= 5; lv++) {
                sum += CONFIG.probabilities[lv];
                if (rand <= sum) return lv;
            }
            return 1;
        }

        // --- 种植模块 ---
        function renderGarden() {
            const container = document.getElementById('garden-container');
            container.innerHTML = '';

            gameState.plots.forEach((plot, index) => {
                const div = document.createElement('div');
                div.className = `plot ${plot ? 'occupied' : ''}`;
                
                if (!plot) {
                    div.innerHTML = `<span style="font-size:30px; color:#ccc;">➕</span><span style="font-size:12px; color:#999;">播种</span>`;
                    div.onclick = () => openSeedSelect(index);
                } else {
                    const plantInfo = PLANT_TYPES[plot.plantId];
                    const now = Date.now();
                    const elapsed = (now - plot.startTime) / 1000;
                    const progress = Math.min(100, (elapsed / plot.duration) * 100);
                    
                    let statusIcon = plantInfo.emoji;
                    let statusText = '生长中...';
                    
                    // 阶段显示
                    if (progress < 30) statusIcon = '🌱';
                    else if (progress < 60) statusIcon = '🌿';
                    else if (progress < 100) statusIcon = '🪴';

                    if (plot.status === 'sick') {
                        statusIcon = '🥀';
                        statusText = '生病了(需治疗)';
                    } else if (progress >= 100) {
                        statusIcon = plantInfo.emoji; // 成熟显示本体
                        statusText = '✨ 可收获 ✨';
                        div.style.borderColor = 'gold';
                    }

                    div.innerHTML = `
                        <div class="plant-emoji">${statusIcon}</div>
                        <div class="plant-status rarity-${plot.plantId}">${plantInfo.name}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                        <div class="plant-status" style="margin-top:2px;">${statusText}</div>
                        
                        <div class="plot-actions">
                            ${plot.status === 'sick' 
                                ? `<button class="action-mini-btn" style="background:#ff7675" onclick="treatPlant(${index})">💊 治疗</button>` 
                                : progress >= 100 
                                    ? `<button class="action-mini-btn" style="background:#f1c40f; color:black;" onclick="harvest(${index})">🪝 收获</button>`
                                    : `
                                        <button class="action-mini-btn" style="background:#3498db" onclick="useItemOnPlot(${index}, 'water')">💧</button>
                                        <button class="action-mini-btn" style="background:#2ecc71" onclick="useItemOnPlot(${index}, 'fertilizer')">⚡</button>
                                        <button class="action-mini-btn" style="background:#e67e22" onclick="useItemOnPlot(${index}, 'sun')">☀️</button>
                                      `
                            }
                            <button class="action-mini-btn" style="background:#636e72" onclick="clearPlot(${index})">❌</button>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
        }

        // --- 逻辑循环 ---
        function startGameLoop() {
            setInterval(() => {
                let needRender = false;
                gameState.plots.forEach(plot => {
                    if (plot && plot.status === 'growing') {
                        // 随机生病逻辑 (0.5%概率每秒)
                        if (Math.random() < 0.005) {
                            plot.status = 'sick';
                            needRender = true;
                        }
                        // 检查是否刚刚成熟
                        const now = Date.now();
                        if ((now - plot.startTime) / 1000 >= plot.duration && !plot.isMature) {
                            plot.isMature = true;
                            needRender = true;
                        }
                        // 仅为了更新进度条
                        needRender = true; 
                    }
                });
                if (needRender) renderGarden();
            }, CONFIG.growthSpeedBase); // 基础刷新率
        }

        // --- 交互动作 ---
        function openSeedSelect(index) {
            currentActivePlotIndex = index;
            const list = document.getElementById('seed-select-list');
            list.innerHTML = '';
            
            let hasSeed = false;
            for (let id in gameState.inventory.seeds) {
                const count = gameState.inventory.seeds[id];
                if (count > 0) {
                    hasSeed = true;
                    const info = PLANT_TYPES[id];
                    list.innerHTML += `
                        <div class="seed-item rarity-${id}" onclick="plantSeed(${id})">
                            <div style="font-size:24px;">${info.emoji}</div>
                            <div>${info.name}</div>
                            <div style="font-size:12px;">库存: ${count}</div>
                        </div>
                    `;
                }
            }
            if (!hasSeed) list.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:#999;">背包里没有种子，快去挖土吧！</div>';
            openModal('seedSelectModal');
        }

        function plantSeed(seedId) {
            if (currentActivePlotIndex === -1) return;
            
            gameState.inventory.seeds[seedId]--;
            const info = PLANT_TYPES[seedId];
            
            gameState.plots[currentActivePlotIndex] = {
                id: Date.now(),
                plantId: seedId,
                startTime: Date.now(),
                duration: info.time, // 秒
                status: 'growing',
                isMature: false
            };
            
            closeModal('seedSelectModal');
            saveGame();
            renderAll();
        }

        function useItemOnPlot(index, type) {
            const plot = gameState.plots[index];
            if (!plot) return;

            // 检查是否有道具 (除了水，水是免费的)
            if (type !== 'water') {
                if (!gameState.inventory.tools[type] || gameState.inventory.tools[type] <= 0) {
                    showToast(`缺少道具: ${type === 'fertilizer'?'营养液':'小太阳'}，请去商城购买`);
                    return;
                }
                gameState.inventory.tools[type]--;
            }

            // 效果
            if (type === 'water') {
                // 浇水减少10秒
                plot.duration = Math.max(1, plot.duration - 10);
                showToast("💧 浇水成功，加速成长！");
            } else if (type === 'fertilizer') {
                // 肥料减少30%剩余时间
                const elapsed = (Date.now() - plot.startTime) / 1000;
                const remaining = plot.duration - elapsed;
                plot.startTime -= (remaining * 0.3) * 1000; // 倒推开始时间来模拟加速
                showToast("⚡ 使用营养液，大幅加速！");
            } else if (type === 'sun') {
                // 太阳减少10%
                const elapsed = (Date.now() - plot.startTime) / 1000;
                const remaining = plot.duration - elapsed;
                plot.startTime -= (remaining * 0.1) * 1000;
                showToast("☀️ 阳光普照，暖洋洋的！");
            }

            saveGame();
            renderGarden();
        }

        function treatPlant(index) {
            const plot = gameState.plots[index];
            if (gameState.inventory.tools.medicine > 0) {
                gameState.inventory.tools.medicine--;
                plot.status = 'growing';
                // 治疗后补偿一点时间，防止刚治疗完就成熟没有中间态（如果已经过时）
                plot.startTime = Date.now() - ((Date.now() - plot.startTime)); 
                showToast("💊 植物治好了！");
                saveGame();
                renderGarden();
            } else {
                showToast("缺少治愈药剂，请去商城购买");
            }
        }

        function harvest(index) {
            const plot = gameState.plots[index];
            if (!plot) return;
            
            const info = PLANT_TYPES[plot.plantId];
            
            // 奖励
            gameState.coins += info.reward;
            addInventory('fruits', plot.plantId, 1);
            
            // 几率掉落特殊道具或种子
            if (Math.random() > 0.7) {
                const backSeed = plot.plantId;
                addInventory('seeds', backSeed, 1);
                showToast(`♻️ 意外收获了一颗${info.name}种子！`);
            }

            // 记录到森林 (只记录稀有度3及以上)
            if (plot.plantId >= 3) {
                addToForest(plot.plantId);
            }

            showToast(`收获 ${info.name}! 金币 +${info.reward}`);
            
            // 清空土地
            gameState.plots[index] = null;
            saveGame();
            renderAll();
        }

        function clearPlot(index) {
            if(confirm('确定要铲除这株植物吗？不会获得任何奖励。')) {
                gameState.plots[index] = null;
                saveGame();
                renderGarden();
            }
        }

        // --- 森林 & 背包 ---
        function addToForest(plantId) {
            // 简单的添加记录，实际可以做成去重或者计数
            gameState.forest.unshift({
                plantId: plantId,
                date: new Date().toLocaleDateString()
            });
            // 限制展示数量
            if(gameState.forest.length > 20) gameState.forest.pop();
        }

        function renderForest() {
            const div = document.getElementById('forest-container');
            if (gameState.forest.length === 0) {
                div.innerHTML = '<div style="text-align:center; color:#999; margin-top:20px;">空空如也...<br>快去种植稀有植物吧！</div>';
                return;
            }
            div.innerHTML = gameState.forest.map(item => {
                const info = PLANT_TYPES[item.plantId];
                return `
                    <div class="forest-item rarity-${item.plantId}" style="border-left-color: currentColor;">
                        <span style="font-size:24px; margin-right:10px;">${info.emoji}</span>
                        <div>
                            <div style="font-weight:bold;">${info.name}</div>
                            <div style="font-size:10px; color:#999;">${item.date}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addInventory(cat, id, amount) {
            if (!gameState.inventory[cat]) gameState.inventory[cat] = {};
            if (!gameState.inventory[cat][id]) gameState.inventory[cat][id] = 0;
            gameState.inventory[cat][id] += amount;
            // 刷新背包UI如果打开着
            if(document.getElementById('inventoryModal').style.display === 'flex') {
                renderInventory();
            }
        }

        function renderInventory() {
            const list = document.getElementById('inventory-list');
            list.innerHTML = '';
            
            // 种子
            for(let id in gameState.inventory.seeds) {
                if(gameState.inventory.seeds[id] > 0) {
                    const info = PLANT_TYPES[id];
                    list.innerHTML += getItemHtml(info.emoji, info.name + '种子', gameState.inventory.seeds[id], `rarity-${id}`);
                }
            }
            // 果实
            for(let id in gameState.inventory.fruits) {
                if(gameState.inventory.fruits[id] > 0) {
                    const info = PLANT_TYPES[id];
                    list.innerHTML += getItemHtml(info.emoji, info.name + '果实', gameState.inventory.fruits[id], '');
                }
            }
            // 道具
            const toolsMap = { 'fertilizer': '⚡ 营养液', 'medicine': '💊 药剂', 'sun': '☀️ 小太阳' };
            for(let key in gameState.inventory.tools) {
                if(gameState.inventory.tools[key] > 0) {
                    list.innerHTML += getItemHtml('🔧', toolsMap[key], gameState.inventory.tools[key], '');
                }
            }
        }

        function getItemHtml(icon, name, count, cls) {
            return `
                <div style="text-align:center; border:1px solid #eee; border-radius:10px; padding:5px;" class="${cls}">
                    <div style="font-size:20px;">${icon}</div>
                    <div style="font-size:12px;">${name}</div>
                    <div style="font-size:10px; font-weight:bold;">x${count}</div>
                </div>
            `;
        }

        // --- 商城 ---
        function buyItem(itemKey, price) {
            if (gameState.coins >= price) {
                gameState.coins -= price;
                if (!gameState.inventory.tools[itemKey]) gameState.inventory.tools[itemKey] = 0;
                gameState.inventory.tools[itemKey]++;
                showToast("购买成功！");
                renderHeader();
                saveGame();
            } else {
                showToast("金币不足！");
            }
        }

        // ================= 辅助功能 =================
        function showToast(msg) {
            const div = document.getElementById('dig-msg');
            div.innerHTML = msg;
            div.style.opacity = 1;
            setTimeout(() => { div.style.opacity = 0; }, 3000);
        }

        function openModal(id) {
            document.getElementById(id).style.display = 'flex';
            if (id === 'inventoryModal') renderInventory();
            if (id === 'devPanelModal') loadDevConfigToUI();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleTheme() {
            const body = document.body;
            if (body.hasAttribute('data-theme')) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // ================= 开发者模式 =================
        function openDevAuth() {
            openModal('devAuthModal');
        }

        function checkDevPwd() {
            const pwd = document.getElementById('dev-pwd').value;
            if (pwd === '597') {
                closeModal('devAuthModal');
                openModal('devPanelModal');
            } else {
                alert('密码错误');
            }
        }

        function loadDevConfigToUI() {
            document.getElementById('cfg-dig-limit').value = CONFIG.dailyDigLimit;
            document.getElementById('cfg-growth-speed').value = CONFIG.growthSpeedBase;
            document.getElementById('cfg-gold-rate').value = CONFIG.probabilities[5];
        }

        function saveDevConfig() {
            CONFIG.dailyDigLimit = parseInt(document.getElementById('cfg-dig-limit').value);
            CONFIG.growthSpeedBase = parseInt(document.getElementById('cfg-growth-speed').value);
            // 简单修改概率：修改金种子概率，其他相应减少
            const goldRate = parseInt(document.getElementById('cfg-gold-rate').value);
            CONFIG.probabilities[5] = goldRate;
            CONFIG.probabilities[1] = Math.max(0, 100 - goldRate - 30 - 15 - 4); // 粗暴平衡白种子概率

            localStorage.setItem('my_plants_config', JSON.stringify(CONFIG));
            closeModal('devPanelModal');
            alert('配置已保存，部分设置需刷新生效');
            renderHeader(); // 更新显示的挖土上限
        }

        function addCoins(amount) {
            gameState.coins += amount;
            renderHeader();
        }

        function resetDigging() {
            gameState.digsLeft = CONFIG.dailyDigLimit;
            renderHeader();
            resetSoilUI();
        }
        
        function resetSoilUI() {
            const piles = document.querySelectorAll('.soil-pile');
            piles.forEach(p => {
                p.classList.remove('dug');
                p.innerHTML = '🕳️';
            });
        }

        function hardReset() {
            if(confirm('确定要删档重来吗？')) {
                localStorage.removeItem('my_plants_data');
                localStorage.removeItem('my_plants_config');
                location.reload();
            }
        }

    </script>
</body>
</html>
