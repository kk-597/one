<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的超级便签</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --card-bg: rgba(255,255,255,0.15);
            --text: white;
            --border: rgba(255,255,255,0.2);
            --hover: rgba(255,255,255,0.25);
            --accent: #FFD700;
            --editor-bg: #ffffff;
            --editor-text: #333333;
        }

        body.night-mode {
            --bg-start: #1a1a2e;
            --bg-end: #16213e;
            --card-bg: rgba(0,0,0,0.4);
            --text: #e0e0e0;
            --border: rgba(255,255,255,0.1);
            --hover: rgba(255,255,255,0.1);
            --editor-bg: #1e1e1e;
            --editor-text: #d4d4d4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            color: var(--text);
            padding: 20px;
            overflow: hidden; /* 防止双滚动条 */
        }

        /* 顶部导航 */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 12px 25px; border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2); border: 1px solid transparent;
            color: var(--text); padding: 8px 16px; border-radius: 12px; cursor: pointer;
            transition: 0.2s; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
        }
        .nav-btn:hover { background: var(--hover); border-color: var(--accent); }
        .nav-right { display: flex; gap: 10px; }

        /* 主布局 */
        .main-layout { display: flex; gap: 20px; height: calc(100vh - 100px); }
        
        /* 左侧边栏 */
        .sidebar {
            width: 260px; background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid var(--border); padding: 15px;
            display: flex; flex-direction: column;
        }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .folder-list { flex: 1; overflow-y: auto; list-style: none; }
        .folder-item {
            padding: 10px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 5px; transition: 0.2s;
        }
        .folder-item:hover { background: var(--hover); }
        .folder-item.active { background: var(--accent); color: #333; font-weight: bold; }
        .folder-count { font-size: 12px; opacity: 0.7; background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 10px; }

        /* 右侧内容 */
        .content-area {
            flex: 1; background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid var(--border); padding: 20px;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .notes-toolbar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .notes-grid {
            flex: 1; overflow-y: auto; display: grid; gap: 15px;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            align-content: start; padding-bottom: 20px;
        }
        
        /* 便签卡片 */
        .note-card {
            background: rgba(255,255,255,0.1); border: 1px solid var(--border);
            border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.2s;
            position: relative; height: 180px; display: flex; flex-direction: column;
        }
        .note-card:hover { transform: translateY(-3px); border-color: var(--accent); background: rgba(255,255,255,0.2); }
        .note-title { font-weight: bold; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .note-preview { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; overflow: hidden; line-height: 1.5; }
        .note-meta { font-size: 10px; opacity: 0.6; margin-top: 10px; display: flex; justify-content: space-between; }
        .note-badge { position: absolute; top: 10px; right: 10px; font-size: 12px; }
        .drag-handle { cursor: move; padding: 5px; opacity: 0; position: absolute; top: 5px; right: 5px; }
        .note-card:hover .drag-handle { opacity: 1; }

        /* 全屏编辑器 */
        .editor-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--editor-bg); color: var(--editor-text); z-index: 2000;
            display: none; flex-direction: column; animation: slideUp 0.3s;
        }
        .editor-modal.show { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .editor-top {
            padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center;
            background: var(--editor-bg);
        }
        .editor-toolbar-row {
            padding: 8px 20px; background: #f5f5f5; border-bottom: 1px solid #ddd;
            display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
        }
        .night-mode .editor-toolbar-row { background: #2d2d2d; border-color: #444; }
        
        .toolbar-btn {
            border: 1px solid transparent; background: none; padding: 6px; border-radius: 6px;
            cursor: pointer; font-size: 16px; color: var(--editor-text);
        }
        .toolbar-btn:hover { background: rgba(0,0,0,0.1); }
        
        .editor-container {
            flex: 1; position: relative; overflow: hidden; display: flex; justify-content: center;
            /* 背景处理 */
            background-size: cover; background-position: center; background-repeat: no-repeat;
        }
        #editor-content {
            width: 100%; max-width: 850px; height: 100%; padding: 40px;
            overflow-y: auto; outline: none; font-size: 16px; line-height: 1.8;
            background: transparent; /* 为了显示底层背景 */
        }
        
        /* 阅读模式 */
        .reading-mode .editor-top, .reading-mode .editor-toolbar-row { display: none; }
        .reading-mode #editor-content { max-width: 900px; padding: 60px; font-size: 18px; }
        .exit-read-btn {
            position: fixed; bottom: 20px; right: 20px; padding: 10px 20px;
            background: rgba(0,0,0,0.5); color: white; border-radius: 20px; cursor: pointer; display: none; z-index: 2100;
        }
        .reading-mode .exit-read-btn { display: block; }

        /* Checkbox 样式 */
        .todo-item { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
        .todo-item input { width: 16px; height: 16px; cursor: pointer; }
        .todo-item.done span { text-decoration: line-through; color: #888; }

        /* 模态框 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; display: none;
            justify-content: center; align-items: center;
        }
        .modal-box {
            background: white; width: 400px; padding: 25px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: popIn 0.3s;
            color: #333;
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-header { font-weight: bold; font-size: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .modal-body input, .modal-body select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .modal-footer { text-align: right; margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end; }
        .btn-primary { background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }
        .btn-cancel { background: #eee; color: #333; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; }

        /* 调整条 */
        .range-wrap { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .range-wrap input { flex: 1; }

    </style>
</head>
<body>

    <!-- 顶栏 -->
    <div class="top-bar">
        <div class="nav-right">
            <a href="index.html" class="nav-btn">⬅ 返回首页</a>
        </div>
        <div class="nav-right">
            <button class="nav-btn" onclick="openThemeSettings()">🎨 主题</button>
            <button class="nav-btn" onclick="toggleNightMode()">🌙 夜间模式</button>
            <button class="nav-btn" onclick="openSettings()">⚙️ 设置</button>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-layout">
        <!-- 侧边栏：分组 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>📁 分组</h3>
                <button class="nav-btn" style="padding:4px 8px;" onclick="addFolder()">+</button>
            </div>
            <ul class="folder-list" id="folder-list">
                <!-- JS生成 -->
            </ul>
            <div style="margin-top:auto; padding-top:10px; border-top:1px solid var(--border);">
                <button class="nav-btn" style="width:100%" onclick="openRecycleBin()">🗑️ 回收箱</button>
            </div>
        </div>

        <!-- 内容区 -->
        <div class="content-area">
            <div class="notes-toolbar">
                <h2 id="current-folder-title">全部便签</h2>
                <div style="display:flex; gap:10px;">
                    <button class="nav-btn" style="background:var(--accent); color:#333; font-weight:bold;" onclick="createNote('text')">➕ 新建便签</button>
                    <button class="nav-btn" style="background:#4CAF50; color:white;" onclick="createNote('markdown')">📝 新建Markdown</button>
                </div>
            </div>
            <div class="notes-grid" id="notes-grid">
                <!-- JS生成 -->
            </div>
        </div>
    </div>

    <!-- 全屏编辑器 -->
    <div id="editor-modal" class="editor-modal">
        <div class="editor-top">
            <div style="display:flex; gap:10px; align-items:center;">
                <button class="nav-btn" style="color:var(--editor-text); border:1px solid #ddd;" onclick="closeEditor()">⬅ 退出</button>
                <input type="text" id="note-title" placeholder="无标题" style="border:none; background:transparent; font-size:18px; font-weight:bold; color:var(--editor-text); width:300px;">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="nav-btn" style="background:#2196F3; color:white;" onclick="enterReadMode()">📖 阅读模式</button>
                <button class="nav-btn" style="background:#9C27B0; color:white;" onclick="openBgSettings()">🖼️ 背景设置</button>
                <button class="nav-btn" style="background:#4CAF50; color:white;" onclick="saveNote()">💾 保存</button>
                <button class="nav-btn" style="background:#FF9800; color:white;" onclick="openExportModal()">📤 导出</button>
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="editor-toolbar-row" id="toolbar-row">
            <button class="toolbar-btn" onclick="execCmd('bold')" title="加粗"><b>B</b></button>
            <button class="toolbar-btn" onclick="execCmd('italic')" title="斜体"><i>I</i></button>
            <button class="toolbar-btn" onclick="execCmd('underline')" title="下划线"><u>U</u></button>
            <button class="toolbar-btn" onclick="execCmd('strikeThrough')" title="删除线"><s>S</s></button>
            <div style="width:1px; height:20px; background:#ccc; margin:0 5px;"></div>
            
            <button class="toolbar-btn" onclick="insertImage()" title="插入图片">🖼️</button>
            <input type="file" id="img-upload" hidden accept="image/*">
            
            <button class="toolbar-btn" onclick="insertCheckbox()" title="代办事项">☑️</button>
            <button class="toolbar-btn" onclick="insertTime()" title="插入时间">🕒</button>
            <button class="toolbar-btn" onclick="insertLocation()" title="插入地点">📍</button>
            <button class="toolbar-btn" onclick="openNameHelper()" title="取名助手">🎲</button>
            
            <div style="width:1px; height:20px; background:#ccc; margin:0 5px;"></div>
            <button class="toolbar-btn" onclick="convertChinese(0)" title="转简体">简</button>
            <button class="toolbar-btn" onclick="convertChinese(1)" title="转繁体">繁</button>
            
            <div style="width:1px; height:20px; background:#ccc; margin:0 5px;"></div>
            <span style="font-size:12px; color:#666;">行距:</span>
            <select onchange="changeLineHeight(this.value)" style="padding:2px; border-radius:4px;">
                <option value="1.5">1.5</option>
                <option value="1.0">1.0</option>
                <option value="2.0">2.0</option>
                <option value="3.0">3.0</option>
            </select>
        </div>

        <div class="editor-container" id="editor-container">
            <div id="editor-content" contenteditable="true"></div>
        </div>
        
        <div class="exit-read-btn" onclick="exitReadMode()">退出全屏阅读</div>
    </div>

    <!-- 背景设置弹窗 -->
    <div id="bg-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">便签背景设置 <span onclick="closeModal('bg-modal')" style="cursor:pointer">×</span></div>
            <div class="modal-body">
                <p>纯色背景</p>
                <input type="color" id="bg-color-picker" onchange="setSolidBg(this.value)">
                
                <p style="margin-top:15px;">图片背景</p>
                <input type="file" id="bg-img-upload" accept="image/*" onchange="uploadBgImg(this)">
                
                <div class="range-wrap">
                    <span>透明度</span>
                    <input type="range" min="0" max="1" step="0.1" value="1" oninput="setBgOpacity(this.value)">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="clearBg()">清除背景</button>
                <button class="btn-primary" onclick="closeModal('bg-modal')">完成</button>
            </div>
        </div>
    </div>

    <!-- 取名助手弹窗 -->
    <div id="name-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">取名助手 <span onclick="closeModal('name-modal')" style="cursor:pointer">×</span></div>
            <div class="modal-body">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <select id="name-len"><option value="2">二字</option><option value="3">三字</option></select>
                    <select id="name-gender"><option value="unisex">中性</option><option value="male">男性</option><option value="female">女性</option></select>
                    <select id="name-style"><option value="modern">现代</option><option value="ancient">古风</option><option value="retro">年代感</option></select>
                </div>
                <div id="name-result" style="margin-top:15px; padding:15px; background:#f5f5f5; text-align:center; font-size:24px; font-weight:bold; letter-spacing:5px; border-radius:8px;">???</div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="generateName()">生成</button>
                <button class="btn-primary" onclick="insertName()">插入</button>
            </div>
        </div>
    </div>

    <script>
        // ================= 数据管理 =================
        const DB_KEY = 'super_notes_v2';
        let data = {
            folders: [
                { id: 'default', name: '默认便签' },
                { id: 'trash', name: '回收箱', locked: true }
            ],
            notes: [], // { id, title, content, type: 'text'|'markdown', folderId, bg: {color, img, opacity}, time }
            settings: { dateFormat: 'YYYY/MM/DD' }
        };

        let currentFolderId = 'default';
        let currentNoteId = null;
        let isMarkdown = false;

        // 初始化
        window.onload = function() {
            try {
                const saved = localStorage.getItem(DB_KEY);
                if (saved) data = JSON.parse(saved);
                
                // 修复旧数据结构
                if (!data.folders.find(f => f.id === 'default')) data.folders.unshift({ id: 'default', name: '默认便签' });
                
                renderFolders();
                renderNotes();
                
                // 拖拽初始化
                new Sortable(document.getElementById('notes-grid'), {
                    animation: 150,
                    handle: '.note-card', // 整个卡片可拖
                    onEnd: function (evt) {
                        // 简单处理：仅UI效果，实际需更新数组顺序
                        const itemEl = evt.item;
                        // 真正复杂的排序逻辑略过，保持基本拖拽体验
                    }
                });
            } catch(e) {
                console.error('初始化失败', e);
            }
        };

        function saveData() {
            localStorage.setItem(DB_KEY, JSON.stringify(data));
        }

        // ================= 渲染逻辑 =================
        function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = data.folders.filter(f => f.id !== 'trash').map(f => `
                <li class="folder-item ${currentFolderId === f.id ? 'active' : ''}" onclick="switchFolder('${f.id}')">
                    <span>📁 ${f.name}</span>
                    <span class="folder-count">${data.notes.filter(n => n.folderId === f.id && !n.deleted).length}</span>
                </li>
            `).join('');
            
            document.getElementById('current-folder-title').innerText = data.folders.find(f=>f.id===currentFolderId)?.name || '便签';
        }

        function renderNotes() {
            const grid = document.getElementById('notes-grid');
            let notesToShow = [];
            
            if (currentFolderId === 'trash') {
                notesToShow = data.notes.filter(n => n.deleted);
            } else {
                notesToShow = data.notes.filter(n => n.folderId === currentFolderId && !n.deleted);
            }

            if (notesToShow.length === 0) {
                grid.innerHTML = '<div style="text-align:center; grid-column:1/-1; color:rgba(255,255,255,0.5); margin-top:50px;">空空如也 🍃</div>';
                return;
            }

            grid.innerHTML = notesToShow.map(n => {
                // 提取纯文本做预览
                let previewText = n.content.replace(/<[^>]+>/g, '').substring(0, 50);
                if(n.type === 'markdown') previewText = '[Markdown] ' + previewText;
                
                return `
                    <div class="note-card" onclick="openNote('${n.id}')" data-id="${n.id}">
                        <div class="note-badge">${n.type === 'markdown' ? '📝' : '📄'}</div>
                        <div class="note-title">${n.title || '无标题'}</div>
                        <div class="note-preview">${previewText}</div>
                        <div class="note-meta">
                            <span>${new Date(n.time).toLocaleDateString()}</span>
                            ${currentFolderId === 'trash' ? 
                                `<span onclick="event.stopPropagation(); restoreNote('${n.id}')">♻️ 恢复</span>` : 
                                `<span onclick="event.stopPropagation(); deleteNote('${n.id}')">🗑️</span>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function switchFolder(id) {
            currentFolderId = id;
            renderFolders();
            renderNotes();
        }

        function openRecycleBin() {
            currentFolderId = 'trash';
            document.getElementById('current-folder-title').innerText = '回收箱';
            // 更新侧边栏高亮状态
            document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));
            renderNotes();
        }

        // ================= 编辑器逻辑 =================
        function createNote(type) {
            const newNote = {
                id: Date.now().toString(),
                title: '',
                content: '',
                type: type,
                folderId: currentFolderId === 'trash' ? 'default' : currentFolderId,
                time: Date.now(),
                deleted: false,
                bg: { color: '', img: '', opacity: 1 }
            };
            data.notes.unshift(newNote);
            saveData();
            openNote(newNote.id);
        }

        function openNote(id) {
            const note = data.notes.find(n => n.id === id);
            if (!note) return;
            currentNoteId = id;
            isMarkdown = note.type === 'markdown';

            document.getElementById('note-title').value = note.title;
            const editor = document.getElementById('editor-content');
            
            // 恢复内容
            if (isMarkdown) {
                editor.innerText = note.content; // Markdown显示源码
                // 隐藏富文本工具栏，显示Markdown提示
                document.getElementById('toolbar-row').style.display = 'none'; 
            } else {
                editor.innerHTML = note.content;
                document.getElementById('toolbar-row').style.display = 'flex';
            }

            // 恢复背景
            applyBackground(note.bg);

            document.getElementById('editor-modal').classList.add('show');
        }

        function closeEditor() {
            saveNote();
            document.getElementById('editor-modal').classList.remove('show');
            exitReadMode(); // 确保退出阅读模式
            renderNotes();
            renderFolders();
        }

        function saveNote() {
            const note = data.notes.find(n => n.id === currentNoteId);
            if (!note) return;

            note.title = document.getElementById('note-title').value;
            note.content = isMarkdown ? 
                document.getElementById('editor-content').innerText : 
                document.getElementById('editor-content').innerHTML;
            note.time = Date.now();
            
            saveData();
        }

        // --- 编辑器功能 ---
        function execCmd(cmd, val=null) {
            document.execCommand(cmd, false, val);
            document.getElementById('editor-content').focus();
        }

        function insertImage() {
            document.getElementById('img-upload').click();
        }

        document.getElementById('img-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    // 行内插入图片核心逻辑
                    const img = `<img src="${evt.target.result}" style="max-width:100%; vertical-align:middle; border-radius:8px;">`;
                    if (isMarkdown) {
                        insertTextAtCursor(`![image](${evt.target.result})`);
                    } else {
                        execCmd('insertHTML', img);
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        function insertCheckbox() {
            const checkboxHtml = `<div class="todo-item"><input type="checkbox" onclick="this.parentElement.classList.toggle('done')"> <span>待办事项</span></div>`;
            execCmd('insertHTML', checkboxHtml);
        }

        function changeLineHeight(val) {
            document.getElementById('editor-content').style.lineHeight = val;
        }

        // 简繁转换 (内置字典)
        const SIMP = "万与丑专业丛东丝丢两严丧个丬丰临丽举么义乌乐乔习乡书买乱争于亏云亘亚产亩亲亵亸亿什仅仆仇币仍佛仔仪们";
        const TRAD = "萬與醜專業叢東絲丟兩嚴喪個爿豐臨麗舉麼義烏樂喬習鄉書買亂爭於虧雲亙亞產畝親褻嚲億什僅僕仇幣仍佛仔儀們";
        
        function convertChinese(type) {
            // type 0: 转简, 1: 转繁
            const editor = document.getElementById('editor-content');
            let txt = editor.innerHTML;
            let result = '';
            for (let i = 0; i < txt.length; i++) {
                const c = txt[i];
                if (type === 0) { // 繁转简
                    const idx = TRAD.indexOf(c);
                    result += (idx > -1) ? SIMP[idx] : c;
                } else { // 简转繁
                    const idx = SIMP.indexOf(c);
                    result += (idx > -1) ? TRAD[idx] : c;
                }
            }
            editor.innerHTML = result;
        }

        // --- 背景系统 ---
        function openBgSettings() { document.getElementById('bg-modal').style.display = 'flex'; }
        
        function setSolidBg(color) {
            updateBg({ color: color, img: '', opacity: 1 });
        }
        
        function uploadBgImg(input) {
            const file = input.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    updateBg({ img: e.target.result, color: '', opacity: 1 });
                };
                reader.readAsDataURL(file);
            }
        }

        function setBgOpacity(val) {
            const note = data.notes.find(n => n.id === currentNoteId);
            if(note && note.bg) {
                note.bg.opacity = val;
                applyBackground(note.bg);
            }
        }

        function clearBg() {
            updateBg({ color: '', img: '', opacity: 1 });
        }

        function updateBg(bgObj) {
            const note = data.notes.find(n => n.id === currentNoteId);
            if(note) {
                note.bg = { ...note.bg, ...bgObj };
                applyBackground(note.bg);
            }
        }

        function applyBackground(bg) {
            if(!bg) return;
            const container = document.getElementById('editor-container');
            const editor = document.getElementById('editor-content');
            
            container.style.backgroundColor = bg.color || '#ffffff';
            container.style.backgroundImage = bg.img ? `url(${bg.img})` : 'none';
            
            // 为了实现透明度，我们调整内容的背景色，而不是容器的opacity
            // 这里为了简单，我们假定背景图是在底层，文字层是透明的
            // 如果要实现背景图变淡，可以通过 overlay 实现，这里简化处理
            if(bg.img) {
                // 使用伪元素或遮罩比较复杂，这里用rgba叠加层模拟变淡
                // 实际上 css background-image 不支持 opacity 属性
                // 我们直接设置 content 的背景色透明度
                editor.style.backgroundColor = `rgba(255,255,255, ${1 - bg.opacity})`;
            } else {
                editor.style.backgroundColor = 'transparent';
            }
        }

        // --- 快捷插入 ---
        function insertTime() {
            const now = new Date();
            // 这里可以做一个设置，简单起见用标准格式
            const timeStr = now.toLocaleString();
            insertTextAtCursor(timeStr);
        }

        function insertLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    // 模拟位置，实际需要调用地图API转地址
                    insertTextAtCursor(`📍 [${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}]`);
                }, () => alert('无法获取位置'));
            }
        }

        function insertTextAtCursor(text) {
            if (isMarkdown) {
                const el = document.getElementById('editor-content');
                // ContentEditable 插入文本比较麻烦，简化为追加
                el.innerText += text;
            } else {
                execCmd('insertText', text);
            }
        }

        // --- 取名助手 ---
        function openNameHelper() { document.getElementById('name-modal').style.display = 'flex'; }
        
        function generateName() {
            const len = document.getElementById('name-len').value;
            const gender = document.getElementById('name-gender').value;
            
            const surnames = "赵钱孙李周吴郑王冯陈褚卫蒋沈韩杨朱秦尤许何吕施张孔曹严华金魏陶姜";
            const male = "伟刚勇毅俊峰强军平保东文辉力明永健世广志义兴良海山仁波宁贵福生龙元全国胜学祥才发武新利清飞彬富顺信子杰涛昌成康星光天达安岩中茂进林有坚和彪博诚先敬震振壮会思群豪心邦承乐绍功松善厚庆磊民友裕河哲江超浩亮政谦亨奇固之轮翰朗伯宏言若鸣朋斌梁栋维启克伦翔旭鹏泽晨辰士以建家致树炎德行时泰盛雄琛钧冠策腾楠榕风航弘";
            const female = "秀娟英华慧巧婷玉萍红娥玲芬芳燕彩春菊兰凤洁梅琳素云莲真环雪荣爱妹霞香月莺媛艳瑞凡佳嘉琼勤珍贞莉桂娣叶璧璐娅琦晶妍茜秋珊莎锦黛青倩婷姣婉娴瑾颖露瑶怡婵雁蓓纨仪荷丹蓉眉君琴蕊薇菁梦岚苑婕馨瑗琰韵融园艺咏卿聪澜纯毓悦昭冰爽琬茗羽希宁欣飘育滢馥筠柔竹霭凝晓欢霄枫芸菲寒伊亚宜可姬舒影荔枝思丽";
            
            let surname = surnames[Math.floor(Math.random() * surnames.length)];
            let name = "";
            let chars = gender === 'male' ? male : (gender === 'female' ? female : male + female);
            
            for(let i=0; i<len-1; i++) {
                name += chars[Math.floor(Math.random() * chars.length)];
            }
            
            document.getElementById('name-result').innerText = surname + name;
        }

        function insertName() {
            const n = document.getElementById('name-result').innerText;
            if(n && n !== '???') insertTextAtCursor(n);
            closeModal('name-modal');
        }

        // --- 导出与阅读 ---
        function enterReadMode() {
            document.getElementById('editor-modal').classList.add('reading-mode');
        }
        function exitReadMode() {
            document.getElementById('editor-modal').classList.remove('reading-mode');
        }

        function openExportModal() {
            if(confirm('是否导出为包含背景的长图片？')) {
                const el = document.getElementById('editor-container');
                html2canvas(el, {
                    backgroundColor: null, // 保留透明度
                    useCORS: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'note_export.png';
                    link.href = canvas.toDataURL();
                    link.click();
                });
            }
        }

        // --- 基础 ---
        function deleteNote(id) {
            const note = data.notes.find(n => n.id === id);
            if(note) {
                note.deleted = true;
                saveData();
                renderNotes();
            }
        }
        function restoreNote(id) {
            const note = data.notes.find(n => n.id === id);
            if(note) {
                note.deleted = false;
                saveData();
                openRecycleBin(); // 刷新视图
            }
        }
        function addFolder() {
            const name = prompt("输入分组名称:");
            if(name) {
                data.folders.push({ id: 'f_'+Date.now(), name });
                saveData();
                renderFolders();
            }
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        // 主题切换
        function toggleNightMode() {
            document.body.classList.toggle('night-mode');
        }

    </script>
</body>
</html>
