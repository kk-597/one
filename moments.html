<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的动态空间</title>
    <!-- 引入优雅的圆体字库 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 配色方案：柔和、现代、高级 */
            --primary: #6C5CE7;       /* 主色调：普罗旺斯紫 */
            --primary-light: #A29BFE; /* 辅色：淡紫 */
            --accent: #FF7675;        /* 强调色：珊瑚红 */
            --bg-color: #DFE6E9;      /* 背景：云雾灰 */
            --card-bg: #FFFFFF;       /* 卡片白 */
            --text-main: #2D3436;     /* 主文字 */
            --text-sub: #636E72;      /* 副文字 */
            --radius-lg: 24px;        /* 大圆角 */
            --radius-md: 16px;        /* 中圆角 */
            --radius-sm: 10px;        /* 小圆角 */
            --shadow: 0 10px 30px rgba(0,0,0,0.05); /* 悬浮阴影 */
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Nunito', 'Noto Sans SC', sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- 顶部导航栏 --- */
        .nav-bar {
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }

        .btn-ghost {
            background: #f1f2f6;
            color: var(--text-sub);
        }
        .btn-ghost:hover { background: #dfe4ea; }

        /* --- 核心三栏布局 --- */
        .layout-grid {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        /* --- 通用卡片 --- */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }

        .card-header {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f5f6fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- 左侧：数据与日历 --- */
        .stats-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: center;
        }
        .stat-num { font-size: 20px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-sub); margin-top: 4px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 15px;
        }
        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-sub);
        }
        .cal-day:hover { background: #eee; }
        .cal-day.today { border: 2px solid var(--primary); font-weight: bold; color: var(--primary); }
        .cal-day.has-data { background: var(--accent); color: white; }

        .memory-card {
            background: linear-gradient(135deg, #a8e063, #56ab2f);
            color: white;
        }
        .memory-text { font-size: 14px; line-height: 1.5; opacity: 0.95; font-style: italic; }

        /* --- 中间：动态流 --- */
        .feed-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            align-items: center;
        }

        .moment-item {
            position: relative;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .moment-top {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
        }

        .avatar-frame {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            background: #f5f6fa;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .user-info h4 { margin: 0 0 4px 0; font-size: 16px; }
        .user-info p { margin: 0; font-size: 12px; color: var(--text-sub); }

        .info-badges {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            background: #f1f2f6;
            color: var(--text-sub);
        }

        .moment-text {
            font-size: 15px;
            line-height: 1.6;
            color: #2d3436;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .moment-imgs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 15px;
        }
        .moment-imgs img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: var(--radius-md);
            cursor: zoom-in;
        }

        .moment-actions {
            border-top: 1px solid #f1f2f6;
            padding-top: 12px;
            display: flex;
            gap: 20px;
        }
        .action-icon {
            cursor: pointer;
            font-size: 14px;
            color: var(--text-sub);
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .action-icon:hover { color: var(--primary); }
        .action-icon.active { color: var(--accent); font-weight: bold; }

        /* --- 右侧：功能区 --- */
        .collection-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 8px;
        }
        .collection-item:hover { background: #f5f6fa; }
        .collection-item.active { background: #eef2ff; color: var(--primary); font-weight: 600; }
        .folder-icon { margin-right: 12px; font-size: 18px; }

        /* 右侧身份矩阵 - 圆框设计 */
        .identity-matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 5px;
        }
        .id-circle-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .id-avatar-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: white;
            border: 2px solid #eee;
            transition: all 0.2s;
            margin-bottom: 6px;
        }
        .id-circle-wrap:hover .id-avatar-circle { transform: scale(1.1); border-color: var(--primary); }
        .id-name-limit {
            font-size: 11px;
            width: 100%;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* 文字出框修复：超出显示省略号 */
            color: var(--text-sub);
        }

        /* --- 搜索框 --- */
        .search-bar {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #f1f2f6;
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--primary); }

        /* --- 全屏编辑器 (新版布局) --- */
        .editor-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .editor-modal.show { opacity: 1; }

        .editor-container {
            width: 900px;
            height: 600px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            display: flex;
            overflow: hidden;
            border: 1px solid #eee;
        }

        /* 编辑器左侧 */
        .editor-left {
            flex: 1.8;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #f5f6fa;
        }
        .editor-textarea {
            flex: 1;
            border: none;
            resize: none;
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 20px;
        }
        .preview-zone { display: flex; gap: 10px; overflow-x: auto; height: 90px; padding: 5px; }
        .preview-img { height: 80px; width: 80px; border-radius: 12px; object-fit: cover; }

        /* 编辑器右侧 */
        .editor-right {
            flex: 1.2;
            padding: 30px;
            background: #FAFBFC;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }

        .section-label { font-size: 12px; font-weight: 700; color: #b2bec3; margin-bottom: 10px; letter-spacing: 1px; }

        /* 第一行：身份选择 (圆头像横向滚动) */
        .avatar-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .avatar-option {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .avatar-option.selected { border-color: var(--primary); background: #eef2ff; transform: scale(1.1); }

        /* 第二行：环境信息 */
        .env-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .select-styled {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #dfe6e9;
            background: white;
            font-size: 13px;
        }

        /* 第三行：标签与收藏 */
        .tag-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dfe6e9;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 10px;
        }

        /* 响应式适配 */
        @media (max-width: 900px) {
            .layout-grid { grid-template-columns: 1fr; }
            .editor-container { flex-direction: column; width: 100%; height: 100%; border-radius: 0; }
            .editor-left { height: 50%; }
            .editor-right { height: 50%; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="nav-bar">
        <div class="brand">
            <span style="font-size: 28px;">🦄</span> 我的动态空间
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-ghost" onclick="resetAll()">🧹 清空重置</button>
            <button class="btn btn-primary" onclick="showEditor()">✨ 写动态</button>
        </div>
    </nav>

    <!-- 主布局 -->
    <div class="layout-grid">
        
        <!-- 左侧：统计区 -->
        <aside>
            <div class="card">
                <div class="card-header">📊 记录统计</div>
                <div class="stats-box">
                    <div>
                        <div class="stat-num" id="count-moments">0</div>
                        <div class="stat-label">总动态</div>
                    </div>
                    <div>
                        <div class="stat-num" id="count-likes">0</div>
                        <div class="stat-label">获赞数</div>
                    </div>
                    <div>
                        <div class="stat-num" id="count-days">0</div>
                        <div class="stat-label">记录天数</div>
                    </div>
                    <div>
                        <div class="stat-num" id="current-year">2026</div>
                        <div class="stat-label">年份</div>
                    </div>
                </div>
            </div>

            <!-- 去年今天功能 -->
            <div class="card memory-card">
                <div class="card-header" style="border-color: rgba(255,255,255,0.2); color:white;">🕰️ 去年今天</div>
                <div id="last-year-content" class="memory-text">
                    正在检索时空碎片...
                </div>
            </div>

            <!-- 日历 -->
            <div class="card">
                <div class="card-header">
                    <span id="cal-title">📅 日历</span>
                    <div style="font-size: 14px;">
                        <span onclick="switchMonth(-1)" style="cursor:pointer">◀</span>
                        <span onclick="switchMonth(1)" style="cursor:pointer; margin-left:10px;">▶</span>
                    </div>
                </div>
                <div class="calendar-grid" id="calendar-view"></div>
            </div>
        </aside>

        <!-- 中间：内容流 -->
        <main>
            <div class="feed-controls">
                <h3 style="margin:0;">⏳ 时间轴</h3>
                <button class="btn btn-ghost" onclick="toggleSort()" id="sort-btn">⬇️ 时间倒序</button>
            </div>
            <div id="feed-container"></div>
        </main>

        <!-- 右侧：功能区 -->
        <aside>
            <!-- 收藏夹 -->
            <div class="card">
                <div class="card-header">📁 收藏夹</div>
                <div id="collection-list">
                    <div class="collection-item active" onclick="setFilter('all', this)">
                        <span class="folder-icon">📑</span> 全部动态
                    </div>
                    <div class="collection-item" onclick="setFilter('favorites', this)">
                        <span class="folder-icon">⭐</span> 默认收藏夹
                    </div>
                    <div id="custom-albums"></div>
                </div>
            </div>

            <!-- 身份矩阵 (圆框修复版) -->
            <div class="card">
                <div class="card-header">
                    <span>👥 身份管理</span>
                    <span style="font-size:12px; color:var(--primary); cursor:pointer;" onclick="createNewIdentity()">+新增</span>
                </div>
                <div class="identity-matrix" id="sidebar-identities">
                    <!-- JS 生成 -->
                </div>
            </div>

            <!-- 搜索 -->
            <div class="card">
                <div class="card-header">🔍 搜索</div>
                <input type="text" class="search-bar" placeholder="搜索内容或标签..." oninput="handleSearch(this.value)">
            </div>
        </aside>

    </div>

    <!-- 全屏编辑器 (完全修复版) -->
    <div class="editor-modal" id="editor" style="display: none;">
        <div class="editor-container">
            <!-- 左侧：输入区 -->
            <div class="editor-left">
                <h2 style="margin-top:0; color:var(--primary);">📝 记录当下</h2>
                <textarea id="post-content" class="editor-textarea" placeholder="此刻在想什么？..."></textarea>
                
                <div class="preview-zone" id="post-previews"></div>
                
                <div style="margin-top: auto; display: flex; gap: 15px; align-items: center;">
                    <button class="btn btn-ghost" onclick="document.getElementById('file-input').click()">📷 添加图片</button>
                    <input type="file" id="file-input" hidden multiple accept="image/*" onchange="processImages(this)">
                    <div style="flex:1"></div>
                    <button class="btn btn-ghost" onclick="hideEditor()">取消</button>
                    <button class="btn btn-primary" onclick="submitPost()">🚀 发布</button>
                </div>
            </div>

            <!-- 右侧：设置区 -->
            <div class="editor-right">
                <!-- 第一行：身份选择 -->
                <div>
                    <div class="section-label">选择身份</div>
                    <div class="avatar-scroll" id="editor-identities">
                        <!-- JS 填充 -->
                    </div>
                </div>

                <!-- 第二行：心情/天气/地点 -->
                <div>
                    <div class="section-label">状态 & 环境</div>
                    <div class="env-grid">
                        <select id="post-mood" class="select-styled">
                            <option value="😊">😊 开心</option>
                            <option value="😐">😐 平淡</option>
                            <option value="😔">😔 难过</option>
                            <option value="😡">😡 生气</option>
                            <option value="😴">😴 疲惫</option>
                            <option value="🥳">🥳 狂欢</option>
                        </select>
                        <select id="post-weather" class="select-styled">
                            <option value="☀️">☀️ 晴朗</option>
                            <option value="☁️">☁️ 多云</option>
                            <option value="🌧️">🌧️ 下雨</option>
                            <option value="❄️">❄️ 下雪</option>
                            <option value="⛈️">⛈️ 雷阵雨</option>
                        </select>
                    </div>
                    <input type="text" id="post-location" class="select-styled" placeholder="📍 地点 (可选)" style="margin-top:10px;">
                </div>

                <!-- 第三行：归档 -->
                <div>
                    <div class="section-label">归档分类</div>
                    <input type="text" id="post-tags" class="tag-input" placeholder="#标签 (空格分隔)">
                    <select id="post-album" class="select-styled">
                        <option value="">📂 选择动态册 (默认)</option>
                        <option value="日常琐事">🥗 日常琐事</option>
                        <option value="特别纪念">🎁 特别纪念</option>
                        <option value="灵感笔记">💡 灵感笔记</option>
                        <option value="旅行日记">✈️ 旅行日记</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 数据核心 ===
        const STORAGE_KEY = 'my_space_data_v3'; // 独立存储键
        let db = {
            moments: [],
            identities: [
                { id: 1, name: '我', avatar: '🐱', color: '#6C5CE7' },
                { id: 2, name: '工作状态', avatar: '💼', color: '#0984e3' }
            ],
            albums: ['日常琐事', '特别纪念', '灵感笔记', '旅行日记']
        };

        let tempImages = [];
        let viewState = {
            sortDesc: true,
            filterType: 'all', // 'all', 'favorites', or albumName
            searchQuery: '',
            calDate: new Date()
        };

        // === 初始化 ===
        window.onload = function() {
            loadData();
            refreshUI();
            
            // 修复年份显示
            document.getElementById('current-year').textContent = new Date().getFullYear();
        };

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                db = JSON.parse(saved);
            }
            // 确保每个动态都有收藏字段
            db.moments.forEach(m => {
                if (m.isFavorite === undefined) m.isFavorite = false;
            });
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
            refreshUI();
        }

        function resetAll() {
            if (confirm('确定要清空所有数据吗？此操作不可撤销！')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function refreshUI() {
            renderFeed();
            renderStats();
            renderCalendar();
            renderLastYear();
            renderSidebarIdentities();
            renderAlbums();
        }

        // === 渲染逻辑 ===
        function renderFeed() {
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            let list = db.moments.filter(m => {
                // 搜索过滤
                const matchSearch = m.content.toLowerCase().includes(viewState.searchQuery.toLowerCase()) || 
                                    (m.tags && m.tags.some(t => t.includes(viewState.searchQuery)));
                if (!matchSearch) return false;

                // 分类过滤
                if (viewState.filterType === 'all') return true;
                if (viewState.filterType === 'favorites') return m.isFavorite;
                return m.album === viewState.filterType;
            });

            // 排序
            list.sort((a, b) => viewState.sortDesc ? b.time - a.time : a.time - b.time);

            if (list.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#b2bec3;">
                    📭 暂无内容，去写一条吧~
                </div>`;
                return;
            }

            list.forEach(m => {
                const identity = db.identities.find(i => i.id === m.identityId) || db.identities[0];
                const date = new Date(m.time);
                const timeStr = `${date.getMonth()+1}月${date.getDate()}日 ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
                
                const el = document.createElement('div');
                el.className = 'card moment-item';
                el.innerHTML = `
                    <div class="moment-top">
                        <div class="avatar-frame" style="color:${identity.color}">
                            ${identity.avatar}
                        </div>
                        <div class="user-info">
                            <h4 style="color:${identity.color}">${identity.name}</h4>
                            <p>${timeStr} ${m.location ? '· ' + m.location : ''}</p>
                            <div class="info-badges">
                                <span class="badge">${m.mood}</span>
                                <span class="badge">${m.weather}</span>
                                ${m.album ? `<span class="badge" style="background:#e3f2fd; color:#0984e3">${m.album}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="moment-text">${m.content}</div>
                    ${m.images && m.images.length ? `
                        <div class="moment-imgs">
                            ${m.images.map(src => `<img src="${src}">`).join('')}
                        </div>
                    ` : ''}
                    <div style="display:flex; gap:8px; margin-bottom:10px;">
                        ${(m.tags||[]).map(t => `<span style="font-size:12px; color:var(--primary)">#${t}</span>`).join('')}
                    </div>
                    <div class="moment-actions">
                        <div class="action-icon ${m.isLiked ? 'active' : ''}" onclick="toggleLike(${m.id})">
                            ${m.isLiked ? '❤️' : '🤍'} ${m.likes || 0}
                        </div>
                        <div class="action-icon ${m.isFavorite ? 'active' : ''}" onclick="toggleFavorite(${m.id})">
                            ${m.isFavorite ? '⭐ 已收藏' : '☆ 收藏'}
                        </div>
                        <div class="action-icon" style="margin-left:auto; color:#fab1a0;" onclick="deleteMoment(${m.id})">
                            🗑️ 删除
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        // === 编辑器逻辑 (核心修复) ===
        let selectedIdentityId = null;

        function showEditor() {
            const modal = document.getElementById('editor');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
            
            // 重置表单
            document.getElementById('post-content').value = '';
            document.getElementById('post-previews').innerHTML = '';
            document.getElementById('post-location').value = '';
            document.getElementById('post-tags').value = '';
            tempImages = [];
            
            // 渲染编辑器内的身份列表
            renderEditorIdentities();
        }

        function hideEditor() {
            const modal = document.getElementById('editor');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function renderEditorIdentities() {
            const container = document.getElementById('editor-identities');
            container.innerHTML = db.identities.map((i, idx) => `
                <div class="avatar-option ${idx === 0 ? 'selected' : ''}" 
                     onclick="selectEditorIdentity(this, ${i.id})"
                     style="color:${i.color}">
                    ${i.avatar}
                </div>
            `).join('');
            selectedIdentityId = db.identities[0].id; // 默认选中第一个
        }

        function selectEditorIdentity(el, id) {
            document.querySelectorAll('.avatar-option').forEach(e => e.classList.remove('selected'));
            el.classList.add('selected');
            selectedIdentityId = id;
        }

        function processImages(input) {
            const files = Array.from(input.files);
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    tempImages.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    document.getElementById('post-previews').appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function submitPost() {
            const content = document.getElementById('post-content').value;
            if (!content && tempImages.length === 0) {
                alert("写点什么再发布吧~");
                return;
            }

            const rawTags = document.getElementById('post-tags').value;
            const tags = rawTags.split(' ').filter(t => t.trim() !== '');
            const album = document.getElementById('post-album').value;

            // 如果选择了新动态册，保存它
            if (album && !db.albums.includes(album)) {
                db.albums.push(album);
            }

            const newMoment = {
                id: Date.now(),
                time: Date.now(),
                identityId: selectedIdentityId,
                content: content,
                images: [...tempImages],
                mood: document.getElementById('post-mood').value,
                weather: document.getElementById('post-weather').value,
                location: document.getElementById('post-location').value,
                tags: tags,
                album: album,
                likes: 0,
                isLiked: false,
                isFavorite: false
            };

            db.moments.unshift(newMoment);
            saveData();
            hideEditor();
        }

        // === 交互功能 ===
        function toggleLike(id) {
            const m = db.moments.find(x => x.id === id);
            if (m) {
                m.isLiked = !m.isLiked;
                m.likes = m.isLiked ? (m.likes || 0) + 1 : (m.likes || 0) - 1;
                saveData();
            }
        }

        function toggleFavorite(id) {
            const m = db.moments.find(x => x.id === id);
            if (m) {
                m.isFavorite = !m.isFavorite;
                saveData();
            }
        }

        function deleteMoment(id) {
            if (confirm('确定删除这条动态吗？')) {
                db.moments = db.moments.filter(x => x.id !== id);
                saveData();
            }
        }

        function handleSearch(val) {
            viewState.searchQuery = val;
            renderFeed();
        }

        function toggleSort() {
            viewState.sortDesc = !viewState.sortDesc;
            document.getElementById('sort-btn').innerText = viewState.sortDesc ? "⬇️ 时间倒序" : "⬆️ 时间正序";
            renderFeed();
        }

        function setFilter(type, el) {
            viewState.filterType = type;
            // 更新选中样式
            document.querySelectorAll('.collection-item').forEach(e => e.classList.remove('active'));
            if(el) el.classList.add('active');
            renderFeed();
        }

        // === 侧边栏功能 ===
        function renderSidebarIdentities() {
            const box = document.getElementById('sidebar-identities');
            box.innerHTML = db.identities.map(i => `
                <div class="id-circle-wrap">
                    <div class="id-avatar-circle" style="color:${i.color}">
                        ${i.avatar}
                    </div>
                    <div class="id-name-limit">${i.name}</div>
                </div>
            `).join('');
        }

        function createNewIdentity() {
            const name = prompt("输入新身份名字:");
            if (name) {
                const avatar = prompt("输入一个Emoji作为头像:", "🐯");
                db.identities.push({
                    id: Date.now(),
                    name: name,
                    avatar: avatar || "👤",
                    color: '#' + Math.floor(Math.random()*16777215).toString(16)
                });
                saveData();
            }
        }

        function renderAlbums() {
            const box = document.getElementById('custom-albums');
            box.innerHTML = db.albums.map(a => `
                <div class="collection-item ${viewState.filterType === a ? 'active' : ''}" 
                     onclick="setFilter('${a}', this)">
                    <span class="folder-icon">📂</span> ${a}
                </div>
            `).join('');
        }

        function renderStats() {
            document.getElementById('count-moments').innerText = db.moments.length;
            const likes = db.moments.reduce((acc, cur) => acc + (cur.likes || 0), 0);
            document.getElementById('count-likes').innerText = likes;
            
            // 计算记录天数
            const dates = new Set(db.moments.map(m => new Date(m.time).toDateString()));
            document.getElementById('count-days').innerText = dates.size;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-view');
            grid.innerHTML = '';
            
            const year = viewState.calDate.getFullYear();
            const month = viewState.calDate.getMonth();
            
            document.getElementById('cal-title').innerText = `📅 ${year}年${month+1}月`;
            
            const firstDay = new Date(year, month, 1).getDay(); // 0 is Sun
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const offset = firstDay === 0 ? 6 : firstDay - 1; // Start Mon
            
            for(let i=0; i<offset; i++) grid.innerHTML += '<div></div>';
            
            const activeDays = new Set(db.moments.map(m => {
                const d = new Date(m.time);
                if (d.getFullYear() === year && d.getMonth() === month) return d.getDate();
            }));

            const today = new Date();

            for(let i=1; i<=daysInMonth; i++) {
                let cls = 'cal-day';
                if (activeDays.has(i)) cls += ' has-data';
                if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cls += ' today';
                grid.innerHTML += `<div class="${cls}">${i}</div>`;
            }
        }

        function switchMonth(delta) {
            viewState.calDate.setMonth(viewState.calDate.getMonth() + delta);
            renderCalendar();
        }

        function renderLastYear() {
            const today = new Date();
            const lastYearMoment = db.moments.find(m => {
                const d = new Date(m.time);
                return d.getDate() === today.getDate() && 
                       d.getMonth() === today.getMonth() && 
                       d.getFullYear() !== today.getFullYear();
            });

            const box = document.getElementById('last-year-content');
            if (lastYearMoment) {
                const d = new Date(lastYearMoment.time);
                box.innerHTML = `
                    <div style="font-weight:bold; margin-bottom:5px;">${d.getFullYear()}年的今天：</div>
                    "${lastYearMoment.content.substring(0, 40)}..."
                `;
            } else {
                box.innerHTML = "历史上的今天暂无记录，创造一些新回忆吧！";
            }
        }
    </script>
</body>
</html>
