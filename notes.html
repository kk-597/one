<!DOCTYPE html>
<html>
<head>
    <title>我的便签</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #FFD700;
            color: #333;
        }

        /* 主布局 - 两栏 */
        .main-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        /* 左侧索引栏 */
        .left-index {
            width: 250px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            overflow-y: auto;
        }
        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .index-header h3 {
            font-size: 16px;
            color: #FFD700;
        }
        .add-folder-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        .folder-list {
            list-style: none;
        }
        .folder-item {
            margin-bottom: 5px;
        }
        .folder-content {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .folder-content:hover {
            background: rgba(255,255,255,0.2);
        }
        .folder-content.selected {
            background: #FFD700;
            color: #333;
        }
        .folder-icon {
            margin-right: 8px;
        }
        .folder-name {
            flex: 1;
            font-size: 14px;
        }
        .folder-count {
            font-size: 12px;
            opacity: 0.7;
        }
        .folder-children {
            margin-left: 20px;
            list-style: none;
        }
        .default-folders {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        /* 右侧内容区 */
        .right-content {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            overflow-y: auto;
        }
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .notes-header h2 {
            font-size: 20px;
            color: #FFD700;
        }
        .notes-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 便签网格 */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }
        .note-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .note-card:hover {
            transform: translateY(-2px);
            border-color: #FFD700;
            background: rgba(255,255,255,0.1);
        }
        .note-card .note-time {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        .note-card .note-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #FFD700;
        }
        .note-card .note-preview {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            max-height: 100px;
            overflow: hidden;
        }
        .note-card .note-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
        }
        .note-card:hover .note-actions {
            display: flex;
        }
        .note-card .note-action-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .note-card .note-action-btn:hover {
            background: #FFD700;
            color: #333;
        }

        /* 全屏编辑器 */
        .fullscreen-editor {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 2000;
            padding: 30px;
            display: none;
            flex-direction: column;
        }
        .fullscreen-editor.show {
            display: flex;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        .editor-header-left {
            display: flex;
            gap: 10px;
        }
        .editor-header-right {
            display: flex;
            gap: 10px;
        }
        .editor-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .editor-btn.back {
            background: #666;
            color: white;
        }
        .editor-btn.save {
            background: #4CAF50;
            color: white;
        }
        .editor-btn.export {
            background: #9C27B0;
            color: white;
        }
        .editor-btn.settings {
            background: #FF9800;
            color: white;
        }
        .editor-toolbar {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .editor-toolbar button {
            padding: 8px 16px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: move;
            min-width: 40px;
        }
        .editor-toolbar button.active {
            background: #4CAF50;
            color: white;
        }
        #editor {
            flex: 1;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 16px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }

        /* 文件夹弹窗 */
        .folder-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2100;
            display: none;
            width: 350px;
        }
        .folder-modal.show {
            display: block;
        }
        .folder-modal input, .folder-modal select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 12px;
        }
        .folder-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .folder-modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .folder-modal-btn.confirm {
            background: #4CAF50;
            color: white;
        }
        .folder-modal-btn.cancel {
            background: #999;
            color: white;
        }

        /* 导出弹窗 */
        .export-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2100;
            display: none;
            width: 350px;
        }
        .export-modal.show {
            display: block;
        }
        .export-options {
            margin: 20px 0;
        }
        .export-option {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .export-option:hover {
            background: #e0e0e0;
        }
        .export-option-icon {
            font-size: 24px;
            margin-right: 15px;
        }
        .export-option-info {
            flex: 1;
        }
        .export-option-title {
            font-weight: bold;
            margin-bottom: 3px;
        }
        .export-option-desc {
            font-size: 12px;
            color: #666;
        }

        .version-tag {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
    <!-- 引入拖拽库 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- 引入简繁转换库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/opencc/1.1.4/opencc.min.js"></script>
    <!-- 引入html2canvas (用于导出长图) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="index.html"><button class="back-btn">← 返回首页</button></a>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchView('notes')">📝 便签</button>
            <button class="nav-btn active" onclick="switchView('folders')">📁 分组</button>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧索引栏 -->
        <div class="left-index">
            <div class="index-header">
                <h3>📁 所有分组</h3>
                <button class="add-folder-btn" onclick="showAddFolderModal()">+</button>
            </div>
            
            <!-- 默认文件夹 -->
            <div class="default-folders">
                <div class="folder-item">
                    <div class="folder-content selected" onclick="selectFolder('all')">
                        <span class="folder-icon">📋</span>
                        <span class="folder-name">全部便签</span>
                        <span class="folder-count" id="allCount">0</span>
                    </div>
                </div>
                <div class="folder-item">
                    <div class="folder-content" onclick="selectFolder('default')">
                        <span class="folder-icon">📄</span>
                        <span class="folder-name">默认便签</span>
                        <span class="folder-count" id="defaultCount">0</span>
                    </div>
                </div>
            </div>

            <!-- 自定义文件夹树 -->
            <ul class="folder-list" id="folderTree"></ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="right-content">
            <div class="notes-header">
                <h2 id="currentFolderTitle">全部便签</h2>
                <div class="notes-actions">
                    <button class="action-btn" onclick="showNewNote()">➕ 新建</button>
                </div>
            </div>
            <div class="notes-grid" id="notesGrid"></div>
        </div>
    </div>

    <!-- 全屏编辑器 -->
    <div id="fullscreenEditor" class="fullscreen-editor">
        <div class="editor-header">
            <div class="editor-header-left">
                <button class="editor-btn back" onclick="exitEditor()">← 退出</button>
                <button class="editor-btn save" onclick="saveAndStay()">💾 保存</button>
            </div>
            <div class="editor-header-right">
                <button class="editor-btn export" onclick="showExportModal()">📤 导出</button>
                <button class="editor-btn settings" onclick="showSettings()">⚙️ 设置</button>
            </div>
        </div>
        
        <div class="editor-toolbar" id="editorToolbar"></div>
        
        <div id="editor" contenteditable="true"></div>
        <div id="imagePreview"></div>
    </div>

    <!-- 添加文件夹弹窗 -->
    <div id="addFolderModal" class="folder-modal">
        <h3 style="margin-top:0;">📁 新建分组</h3>
        <input type="text" id="folderName" placeholder="分组名称">
        <select id="parentFolder">
            <option value="root">根目录</option>
        </select>
        <div class="folder-modal-buttons">
            <button class="folder-modal-btn confirm" onclick="addFolder()">创建</button>
            <button class="folder-modal-btn cancel" onclick="closeAddFolderModal()">取消</button>
        </div>
    </div>

    <!-- 导出弹窗 -->
    <div id="exportModal" class="export-modal">
        <h3 style="margin-top:0; text-align:center;">📤 导出便签</h3>
        <div class="export-options">
            <div class="export-option" onclick="exportAsImage()">
                <span class="export-option-icon">🖼️</span>
                <div class="export-option-info">
                    <div class="export-option-title">导出为长图</div>
                    <div class="export-option-desc">将当前便签保存为图片</div>
                </div>
            </div>
            <div class="export-option" onclick="exportAsTxt()">
                <span class="export-option-icon">📄</span>
                <div class="export-option-info">
                    <div class="export-option-title">导出为TXT</div>
                    <div class="export-option-desc">保存为文本文件</div>
                </div>
            </div>
        </div>
        <div style="text-align: right;">
            <button onclick="closeExportModal()" style="padding:10px 20px; background:#999; color:white; border:none; border-radius:12px;">取消</button>
        </div>
    </div>

    <div class="version-tag">v9.0 - 便签分组+复制+导出</div>

    <script>
        // 数据存储
        let notes = [];
        let folders = [];
        let currentFolder = 'all';
        let currentEditIndex = -1;
        
        // 历史记录
        let history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;
        
        // 工具栏设置
        let toolbarSettings = JSON.parse(localStorage.getItem('toolbarSettings') || '{}');
        let toolbarOrder = JSON.parse(localStorage.getItem('toolbarOrder') || '[]');
        
        // 所有工具栏项目
        const allToolbarItems = [
            { id: 'undo', text: '↩️', title: '撤销' },
            { id: 'redo', text: '↪️', title: '反撤销' },
            { id: 'bold', text: 'B', title: '加粗', style: 'font-weight:bold' },
            { id: 'italic', text: 'I', title: '倾斜', style: 'font-style:italic' },
            { id: 'underline', text: 'U', title: '下划线', style: 'text-decoration:underline' },
            { id: 'strike', text: 'S', title: '删除线', style: 'text-decoration:line-through' },
            { id: 'color', text: '🎨', title: '文字颜色' },
            { id: 'bgcolor', text: '🖍️', title: '背景颜色' },
            { id: 'fontsize', text: '🔤', title: '字体大小' },
            { id: 'justifyLeft', text: '⬅️', title: '居左' },
            { id: 'justifyCenter', text: '⏺️', title: '居中' },
            { id: 'justifyRight', text: '➡️', title: '居右' },
            { id: 'insertOrderedList', text: '①', title: '有序列表' },
            { id: 'insertUnorderedList', text: '•', title: '无序列表' },
            { id: 'formatBlock', text: 'H', title: '标题' },
            { id: 'horizontalRule', text: '―', title: '分割线' },
            { id: 'indent', text: '↦', title: '缩进' },
            { id: 'findReplace', text: '🔍', title: '查找替换' },
            { id: 'chineseConvert', text: '简/繁', title: '简繁转换' },
            { id: 'insertImage', text: '🖼️', title: '插入图片' }
        ];

        // 初始化
        function init() {
            loadData();
            renderFolderTree();
            renderNotes();
            initToolbar();
        }

        // ==================== 数据管理 ====================
        function loadData() {
            // 加载便签
            const savedNotes = localStorage.getItem('myNotes');
            if (savedNotes) {
                notes = JSON.parse(savedNotes);
            } else {
                notes = [];
            }
            
            // 加载文件夹
            const savedFolders = localStorage.getItem('noteFolders');
            if (savedFolders) {
                folders = JSON.parse(savedFolders);
            } else {
                folders = [
                    { id: 'default', name: '默认便签', parent: null, children: [] }
                ];
            }
            
            // 确保每个便签都有folder字段
            notes = notes.map((note, index) => {
                if (!note.folder) {
                    note.folder = 'default';
                }
                if (!note.id) {
                    note.id = Date.now() + index;
                }
                return note;
            });
            
            saveData();
        }

        function saveData() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
            localStorage.setItem('noteFolders', JSON.stringify(folders));
        }

        // ==================== 文件夹树 ====================
        function renderFolderTree() {
            const container = document.getElementById('folderTree');
            
            // 更新计数
            document.getElementById('allCount').textContent = notes.length;
            document.getElementById('defaultCount').textContent = notes.filter(n => n.folder === 'default').length;
            
            // 渲染自定义文件夹
            const rootFolders = folders.filter(f => !f.parent);
            container.innerHTML = rootFolders.map(f => renderFolder(f)).join('');
        }

        function renderFolder(folder, level = 0) {
            const folderNotes = notes.filter(n => n.folder === folder.id).length;
            const children = folders.filter(f => f.parent === folder.id);
            
            return `
                <li class="folder-item">
                    <div class="folder-content ${currentFolder === folder.id ? 'selected' : ''}" 
                         onclick="selectFolder('${folder.id}')">
                        <span class="folder-icon">📂</span>
                        <span class="folder-name">${folder.name}</span>
                        <span class="folder-count">${folderNotes}</span>
                    </div>
                    ${children.length > 0 ? `
                        <ul class="folder-children">
                            ${children.map(c => renderFolder(c, level + 1)).join('')}
                        </ul>
                    ` : ''}
                </li>
            `;
        }

        function selectFolder(folderId) {
            currentFolder = folderId;
            
            // 更新选中样式
            document.querySelectorAll('.folder-content').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // 更新标题
            let title = '全部便签';
            if (folderId === 'default') title = '默认便签';
            else {
                const folder = findFolder(folderId);
                if (folder) title = folder.name;
            }
            document.getElementById('currentFolderTitle').textContent = title;
            
            renderNotes();
        }

        function findFolder(id) {
            for (let f of folders) {
                if (f.id === id) return f;
            }
            return null;
        }

        // ==================== 文件夹管理 ====================
        function showAddFolderModal() {
            // 填充父文件夹选项
            const select = document.getElementById('parentFolder');
            select.innerHTML = '<option value="root">根目录</option>';
            
            const addFolderOptions = (folder, prefix = '') => {
                const option = document.createElement('option');
                option.value = folder.id;
                option.textContent = prefix + folder.name;
                select.appendChild(option);
                
                folders.filter(f => f.parent === folder.id).forEach(child => {
                    addFolderOptions(child, prefix + '　');
                });
            };
            
            folders.filter(f => !f.parent).forEach(f => addFolderOptions(f));
            
            document.getElementById('addFolderModal').classList.add('show');
        }

        function closeAddFolderModal() {
            document.getElementById('addFolderModal').classList.remove('show');
            document.getElementById('folderName').value = '';
        }

        function addFolder() {
            const name = document.getElementById('folderName').value.trim();
            const parentId = document.getElementById('parentFolder').value;
            
            if (!name) {
                alert('请输入文件夹名称');
                return;
            }
            
            const newFolder = {
                id: 'folder_' + Date.now(),
                name: name,
                parent: parentId === 'root' ? null : parentId,
                children: []
            };
            
            folders.push(newFolder);
            saveData();
            renderFolderTree();
            closeAddFolderModal();
        }

        // ==================== 便签显示 ====================
        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            
            let filteredNotes = [];
            if (currentFolder === 'all') {
                filteredNotes = notes;
            } else if (currentFolder === 'default') {
                filteredNotes = notes.filter(n => !n.folder || n.folder === 'default');
            } else {
                filteredNotes = notes.filter(n => n.folder === currentFolder);
            }
            
            if (filteredNotes.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:60px; color:rgba(255,255,255,0.5);">暂无便签</div>';
                return;
            }
            
            grid.innerHTML = filteredNotes.map((note, index) => {
                const content = note.content || note;
                const textOnly = content.replace(/<[^>]*>/g, '').substring(0, 50);
                const time = note.time || '未知时间';
                
                return `
                    <div class="note-card" onclick="editNote(${notes.indexOf(note)})">
                        <div class="note-time">${time}</div>
                        <div class="note-title">${note.title || '无标题'}</div>
                        <div class="note-preview">${textOnly}${textOnly.length >= 50 ? '...' : ''}</div>
                        <div class="note-actions">
                            <button class="note-action-btn" onclick="event.stopPropagation(); copyNote(${notes.indexOf(note)})" title="复制">📋</button>
                            <button class="note-action-btn" onclick="event.stopPropagation(); moveNote(${notes.indexOf(note)})" title="移动">📂</button>
                            <button class="note-action-btn" onclick="event.stopPropagation(); deleteNote(${notes.indexOf(note)})" title="删除">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==================== 便签操作 ====================
        function showNewNote() {
            currentEditIndex = -1;
            document.getElementById('editor').innerHTML = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('fullscreenEditor').classList.add('show');
            document.getElementById('listView').style.display = 'none';
            
            history = [];
            historyIndex = -1;
            saveToHistory();
        }

        function editNote(index) {
            const note = notes[index];
            currentEditIndex = index;
            
            if (typeof note === 'string') {
                document.getElementById('editor').innerHTML = note;
            } else {
                document.getElementById('editor').innerHTML = note.content || '';
                if (note.images && note.images.length > 0) {
                    document.getElementById('imagePreview').innerHTML = note.images.map(img => 
                        `<img src="${img}" style="max-width:100px; margin:5px;">`
                    ).join('');
                }
            }
            
            document.getElementById('fullscreenEditor').classList.add('show');
            
            history = [];
            historyIndex = -1;
            saveToHistory();
        }

        function exitEditor() {
            saveNote();
            document.getElementById('fullscreenEditor').classList.remove('show');
            renderNotes();
        }

        function saveAndStay() {
            saveNote();
            showToast('✅ 已保存');
        }

        function saveNote() {
            const content = document.getElementById('editor').innerHTML.trim();
            if (!content || content === '<br>') return;
            
            const images = [];
            document.querySelectorAll('#imagePreview img').forEach(img => {
                images.push(img.src);
            });
            
            // 提取标题（第一行文字）
            const textContent = content.replace(/<[^>]*>/g, '').trim();
            const title = textContent.split('\n')[0].substring(0, 20);
            
            const newNote = {
                id: currentEditIndex === -1 ? Date.now() : notes[currentEditIndex].id,
                title: title || '无标题',
                content: content,
                time: new Date().toLocaleString(),
                images: images,
                folder: currentEditIndex === -1 ? (currentFolder === 'all' ? 'default' : currentFolder) : notes[currentEditIndex].folder
            };
            
            if (currentEditIndex === -1) {
                notes.push(newNote);
            } else {
                notes[currentEditIndex] = newNote;
            }
            
            saveData();
        }

        function copyNote(index) {
            const note = notes[index];
            const copy = JSON.parse(JSON.stringify(note));
            copy.id = Date.now();
            copy.time = new Date().toLocaleString();
            copy.title = copy.title + ' (副本)';
            
            notes.push(copy);
            saveData();
            renderNotes();
            showToast('📋 已复制');
        }

        function moveNote(index) {
            // 简单起见，弹出文件夹选择
            const folderList = folders.map(f => f.name).join('\n');
            const folderName = prompt('输入目标文件夹名称:\n' + folderList);
            if (!folderName) return;
            
            const targetFolder = folders.find(f => f.name === folderName);
            if (!targetFolder) {
                alert('文件夹不存在');
                return;
            }
            
            notes[index].folder = targetFolder.id;
            saveData();
            renderNotes();
            renderFolderTree();
            showToast('📂 已移动');
        }

        function deleteNote(index) {
            if (!confirm('确定删除这条便签吗？')) return;
            notes.splice(index, 1);
            saveData();
            renderNotes();
            renderFolderTree();
        }

        // ==================== 导出功能 ====================
        function showExportModal() {
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function exportAsImage() {
            const editor = document.getElementById('editor');
            
            // 创建一个临时容器用于导出
            const container = document.createElement('div');
            container.style.padding = '40px';
            container.style.background = 'white';
            container.style.maxWidth = '800px';
            container.style.margin = '0 auto';
            container.style.fontFamily = 'Arial';
            container.style.lineHeight = '1.6';
            container.innerHTML = editor.innerHTML;
            
            document.body.appendChild(container);
            
            html2canvas(container, {
                scale: 2,
                backgroundColor: '#ffffff'
            }).then(canvas => {
                // 创建下载链接
                const link = document.createElement('a');
                link.download = `便签-${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                document.body.removeChild(container);
                closeExportModal();
                showToast('🖼️ 已导出为图片');
            });
        }

        function exportAsTxt() {
            const content = document.getElementById('editor').innerText;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.download = `便签-${new Date().toLocaleDateString()}.txt`;
            link.href = URL.createObjectURL(blob);
            link.click();
            closeExportModal();
            showToast('📄 已导出为TXT');
        }

        // ==================== 编辑器功能 ====================
        function initToolbar() {
            const toolbar = document.getElementById('editorToolbar');
            let html = '';
            
            let enabledItems = allToolbarItems.filter(item => toolbarSettings[item.id] !== false);
            
            if (toolbarOrder.length > 0) {
                enabledItems.sort((a, b) => {
                    const indexA = toolbarOrder.indexOf(a.id);
                    const indexB = toolbarOrder.indexOf(b.id);
                    
                    if (indexA === -1 && indexB === -1) return 0;
                    if (indexA === -1) return 1;
                    if (indexB === -1) return -1;
                    return indexA - indexB;
                });
            }
            
            enabledItems.forEach(item => {
                html += `<button onclick="toolbarClick('${item.id}')" title="${item.title}" id="btn-${item.id}" style="${item.style || ''}">${item.text}</button>`;
            });
            
            toolbar.innerHTML = html;
        }

        function toolbarClick(action) {
            switch(action) {
                case 'undo': undo(); break;
                case 'redo': redo(); break;
                case 'bold': formatText('bold'); break;
                case 'italic': formatText('italic'); break;
                case 'underline': formatText('underline'); break;
                case 'strike': formatText('strikeThrough'); break;
                case 'color': showColorPicker('color'); break;
                case 'bgcolor': showColorPicker('bgcolor'); break;
                case 'fontsize': showFontSizePicker(); break;
                case 'justifyLeft': formatText('justifyLeft'); break;
                case 'justifyCenter': formatText('justifyCenter'); break;
                case 'justifyRight': formatText('justifyRight'); break;
                case 'insertOrderedList': formatText('insertOrderedList'); break;
                case 'insertUnorderedList': formatText('insertUnorderedList'); break;
                case 'formatBlock': insertHeading(); break;
                case 'horizontalRule': formatText('insertHorizontalRule'); break;
                case 'indent': formatText('indent'); break;
                case 'findReplace': showFindReplace(); break;
                case 'chineseConvert': convertChinese(); break;
                case 'insertImage': insertImage(); break;
            }
        }

        function saveToHistory() {
            const editor = document.getElementById('editor');
            if (!editor) return;
            
            const current = editor.innerHTML;
            
            if (history.length > 0 && history[history.length - 1] === current) return;
            
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            
            history.push(current);
            historyIndex = history.length - 1;
            
            if (history.length > MAX_HISTORY) {
                history.shift();
                historyIndex--;
            }
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                document.getElementById('editor').innerHTML = history[historyIndex];
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                document.getElementById('editor').innerHTML = history[historyIndex];
            }
        }

        function formatText(command) {
            document.execCommand(command, false, null);
            document.getElementById('editor').focus();
            saveToHistory();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #4CAF50;
                color: white;
                padding: 10px 20px;
                border-radius: 20px;
                z-index: 3000;
                animation: fadeOut 2s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 2000);
        }

        // 颜色选择器、字体大小等函数保持与原代码一致
        // 由于篇幅限制，这里省略，实际使用时需要完整复制之前的函数

        // 初始化
        window.onload = init;
    </script>
</body>
</html>
