<!DOCTYPE html>
<html>
<head>
    <title>我的便签</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* 主题变量 */
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: rgba(255,255,255,0.1);
            --text-color: white;
            --border-color: rgba(255,255,255,0.2);
            --hover-bg: rgba(255,255,255,0.2);
            --selected-bg: #FFD700;
            --selected-text: #333;
        }

        /* 夜间模式 */
        body.night-mode {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: rgba(0,0,0,0.3);
            --text-color: #e0e0e0;
            --border-color: rgba(255,255,255,0.1);
            --hover-bg: rgba(255,255,255,0.1);
            --selected-bg: #4a4a4a;
            --selected-text: white;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: var(--selected-bg);
            color: var(--selected-text);
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-left: 10px;
        }

        /* 主布局 - 两栏 */
        .main-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        /* 左侧索引栏 */
        .left-index {
            width: 280px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .index-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .index-header h3 {
            font-size: 16px;
            color: #FFD700;
        }
        .add-folder-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--text-color);
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
        .batch-edit-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }
        .folder-tree {
            list-style: none;
        }
        .folder-item {
            margin-bottom: 2px;
        }
        .folder-content {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .folder-content:hover {
            background: var(--hover-bg);
        }
        .folder-content.selected {
            background: var(--selected-bg);
            color: var(--selected-text);
        }
        .folder-icon {
            margin-right: 8px;
        }
        .folder-name {
            flex: 1;
            font-size: 14px;
        }
        .folder-count {
            font-size: 12px;
            opacity: 0.7;
            margin-right: 8px;
        }
        .folder-actions {
            display: none;
            gap: 5px;
        }
        .folder-content:hover .folder-actions {
            display: flex;
        }
        .folder-action-btn {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 4px;
        }
        .folder-action-btn:hover {
            background: rgba(0,0,0,0.2);
        }
        .folder-children {
            margin-left: 20px;
            list-style: none;
        }

        /* 右侧内容区 */
        .right-content {
            flex: 1;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border-color);
            overflow-y: auto;
        }
        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .notes-header h2 {
            font-size: 20px;
            color: #FFD700;
        }
        .notes-actions {
            display: flex;
            gap: 10px;
        }
        .action-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .action-btn:hover {
            background: var(--hover-bg);
        }
        .action-btn.danger {
            background: rgba(244,67,54,0.8);
        }
        .action-btn.danger:hover {
            background: #f44336;
        }

        /* 便签网格 - 文件和文件夹混合显示 */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .grid-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border-color);
            position: relative;
        }
        .grid-item:hover {
            transform: translateY(-2px);
            border-color: #FFD700;
            background: rgba(255,255,255,0.1);
        }
        .grid-item.folder-item {
            background: rgba(255,215,0,0.1);
        }
        .grid-item.selected {
            border: 2px solid #FFD700;
            background: rgba(255,215,0,0.2);
        }
        .grid-item .item-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        .grid-item .item-name {
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-word;
        }
        .grid-item .item-info {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .grid-item .item-checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: none;
        }
        .grid-item.batch-mode .item-checkbox {
            display: block;
        }
        .grid-item .item-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
            gap: 5px;
        }
        .grid-item:hover .item-actions {
            display: flex;
        }
        .grid-item.batch-mode:hover .item-actions {
            display: none;
        }
        .item-action-btn {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-action-btn:hover {
            background: #FFD700;
            color: #333;
        }

        /* 全屏编辑器 */
        .fullscreen-editor {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 2000;
            padding: 30px;
            display: none;
            flex-direction: column;
        }
        .fullscreen-editor.show {
            display: flex;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #667eea;
        }
        .editor-header-left {
            display: flex;
            gap: 10px;
        }
        .editor-header-right {
            display: flex;
            gap: 10px;
        }
        .editor-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .editor-btn.back {
            background: #666;
            color: white;
        }
        .editor-btn.save {
            background: #4CAF50;
            color: white;
        }
        .editor-btn.export {
            background: #9C27B0;
            color: white;
        }
        .editor-btn.settings {
            background: #FF9800;
            color: white;
        }
        .editor-toolbar {
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        #editor {
            flex: 1;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 16px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.6;
            outline: none;
        }

        /* 弹窗样式 */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2100;
            display: none;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            color: #333;
        }
        .modal.show {
            display: block;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #333;
        }
        .modal input, .modal select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 14px;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-btn.confirm {
            background: #4CAF50;
            color: white;
        }
        .modal-btn.cancel {
            background: #999;
            color: white;
        }
        .modal-btn.danger {
            background: #f44336;
            color: white;
        }

        /* 主题选择器 */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .theme-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-color:hover {
            transform: scale(1.1);
        }
        .theme-color.selected {
            border-color: #333;
        }
        .color-picker {
            width: 100%;
            height: 50px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
        }

        .version-tag {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
    <!-- 引入拖拽库 -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- 引入简繁转换库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/opencc/1.1.4/opencc.min.js"></script>
    <!-- 引入html2canvas (用于导出长图) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="index.html"><button class="back-btn">← 返回首页</button></a>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="switchView('notes')">📝 便签</button>
            <button class="nav-btn active" onclick="switchView('folders')">📁 分组</button>
            <button class="theme-btn" onclick="showThemeModal()">🎨 主题</button>
            <button class="theme-btn" onclick="toggleNightMode()">🌙 夜间</button>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧索引栏 -->
        <div class="left-index">
            <div class="index-header">
                <h3>📁 所有分组</h3>
                <div>
                    <button class="batch-edit-btn" onclick="toggleBatchMode()" id="batchModeBtn">✏️ 批量</button>
                    <button class="add-folder-btn" onclick="showAddFolderModal()">+</button>
                </div>
            </div>
            
            <ul class="folder-tree" id="folderTree"></ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="right-content">
            <div class="notes-header">
                <h2 id="currentFolderTitle">全部便签</h2>
                <div class="notes-actions" id="notesActions">
                    <button class="action-btn" onclick="showNewNote()">➕ 新建</button>
                </div>
            </div>
            <div class="notes-grid" id="notesGrid"></div>
        </div>
    </div>

    <!-- 全屏编辑器 -->
    <div id="fullscreenEditor" class="fullscreen-editor">
        <div class="editor-header">
            <div class="editor-header-left">
                <button class="editor-btn back" onclick="exitEditor()">← 退出</button>
                <button class="editor-btn save" onclick="saveAndStay()">💾 保存</button>
            </div>
            <div class="editor-header-right">
                <button class="editor-btn export" onclick="showExportModal()">📤 导出</button>
                <button class="editor-btn settings" onclick="showSettings()">⚙️ 设置</button>
            </div>
        </div>
        
        <div class="editor-toolbar" id="editorToolbar"></div>
        
        <div id="editor" contenteditable="true"></div>
        <div id="imagePreview"></div>
    </div>

    <!-- 添加文件夹弹窗 -->
    <div id="addFolderModal" class="modal">
        <h3>📁 新建分组</h3>
        <input type="text" id="folderName" placeholder="分组名称">
        <select id="parentFolder">
            <option value="root">根目录</option>
        </select>
        <div class="modal-buttons">
            <button class="modal-btn confirm" onclick="addFolder()">创建</button>
            <button class="modal-btn cancel" onclick="closeAddFolderModal()">取消</button>
        </div>
    </div>

    <!-- 删除文件夹确认弹窗 -->
    <div id="deleteFolderModal" class="modal">
        <h3>⚠️ 删除文件夹</h3>
        <p>删除后，文件夹内的便签将移至"默认便签"</p>
        <div class="modal-buttons">
            <button class="modal-btn danger" onclick="confirmDeleteFolder()">确认删除</button>
            <button class="modal-btn cancel" onclick="closeDeleteFolderModal()">取消</button>
        </div>
    </div>

    <!-- 批量移动弹窗 -->
    <div id="batchMoveModal" class="modal">
        <h3>📂 批量移动</h3>
        <p>已选择 <span id="selectedCount">0</span> 个便签</p>
        <select id="moveTargetFolder">
            <option value="">选择目标文件夹</option>
        </select>
        <div class="modal-buttons">
            <button class="modal-btn confirm" onclick="batchMove()">移动</button>
            <button class="modal-btn cancel" onclick="closeBatchMoveModal()">取消</button>
        </div>
    </div>

    <!-- 批量删除确认弹窗 -->
    <div id="batchDeleteModal" class="modal">
        <h3>⚠️ 批量删除</h3>
        <p>确定删除选中的 <span id="deleteCount">0</span> 个便签吗？</p>
        <div class="modal-buttons">
            <button class="modal-btn danger" onclick="batchDelete()">确认删除</button>
            <button class="modal-btn cancel" onclick="closeBatchDeleteModal()">取消</button>
        </div>
    </div>

    <!-- 主题选择弹窗 -->
    <div id="themeModal" class="modal">
        <h3>🎨 选择主题</h3>
        <div class="theme-grid">
            <div class="theme-color" style="background: #667eea" onclick="setTheme('gradient', '#667eea', '#764ba2')"></div>
            <div class="theme-color" style="background: #ff6b6b" onclick="setTheme('gradient', '#ff6b6b', '#ff8e8e')"></div>
            <div class="theme-color" style="background: #4CAF50" onclick="setTheme('gradient', '#4CAF50', '#8BC34A')"></div>
            <div class="theme-color" style="background: #FF9800" onclick="setTheme('gradient', '#FF9800', '#FFB74D')"></div>
            <div class="theme-color" style="background: #9C27B0" onclick="setTheme('gradient', '#9C27B0', '#BA68C8')"></div>
            <div class="theme-color" style="background: #00BCD4" onclick="setTheme('gradient', '#00BCD4', '#4DD0E1')"></div>
            <div class="theme-color" style="background: #795548" onclick="setTheme('gradient', '#795548', '#A1887F')"></div>
            <div class="theme-color" style="background: #607D8B" onclick="setTheme('gradient', '#607D8B', '#90A4AE')"></div>
            <div class="theme-color" style="background: #E91E63" onclick="setTheme('gradient', '#E91E63', '#F06292')"></div>
            <div class="theme-color" style="background: #3F51B5" onclick="setTheme('gradient', '#3F51B5', '#5C6BC0')"></div>
        </div>
        <p>自定义颜色</p>
        <input type="color" id="customColorStart" class="color-picker" value="#667eea" onchange="updateCustomTheme()">
        <input type="color" id="customColorEnd" class="color-picker" value="#764ba2" onchange="updateCustomTheme()">
        <div class="modal-buttons">
            <button class="modal-btn confirm" onclick="applyCustomTheme()">应用</button>
            <button class="modal-btn cancel" onclick="closeThemeModal()">取消</button>
        </div>
    </div>

    <!-- 导出弹窗 -->
    <div id="exportModal" class="modal">
        <h3>📤 导出便签</h3>
        <div style="margin: 20px 0;">
            <div class="shop-item" onclick="exportAsImage()" style="display:flex; align-items:center; padding:15px; background:#f5f5f5; border-radius:16px; margin-bottom:10px; cursor:pointer;">
                <span style="font-size:24px; margin-right:15px;">🖼️</span>
                <div>
                    <div style="font-weight:bold;">导出为长图</div>
                    <div style="font-size:12px; color:#666;">将当前便签保存为图片</div>
                </div>
            </div>
            <div class="shop-item" onclick="exportAsTxt()" style="display:flex; align-items:center; padding:15px; background:#f5f5f5; border-radius:16px; margin-bottom:10px; cursor:pointer;">
                <span style="font-size:24px; margin-right:15px;">📄</span>
                <div>
                    <div style="font-weight:bold;">导出为TXT</div>
                    <div style="font-size:12px; color:#666;">保存为文本文件</div>
                </div>
            </div>
        </div>
        <div style="text-align: right;">
            <button onclick="closeExportModal()" style="padding:10px 20px; background:#999; color:white; border:none; border-radius:12px;">取消</button>
        </div>
    </div>

    <div class="version-tag">v10.0 - 完整版</div>

    <script>
        // 数据存储
        let notes = [];
        let folders = [];
        let currentFolder = 'all';
        let currentEditIndex = -1;
        let isBatchMode = false;
        let selectedNotes = new Set();
        let folderToDelete = null;
        
        // 历史记录
        let history = [];
        let historyIndex = -1;
        const MAX_HISTORY = 50;
        
        // 工具栏设置
        let toolbarSettings = JSON.parse(localStorage.getItem('toolbarSettings') || '{}');
        let toolbarOrder = JSON.parse(localStorage.getItem('toolbarOrder') || '[]');
        
        // 所有工具栏项目
        const allToolbarItems = [
            { id: 'undo', text: '↩️', title: '撤销' },
            { id: 'redo', text: '↪️', title: '反撤销' },
            { id: 'bold', text: 'B', title: '加粗', style: 'font-weight:bold' },
            { id: 'italic', text: 'I', title: '倾斜', style: 'font-style:italic' },
            { id: 'underline', text: 'U', title: '下划线', style: 'text-decoration:underline' },
            { id: 'strike', text: 'S', title: '删除线', style: 'text-decoration:line-through' },
            { id: 'color', text: '🎨', title: '文字颜色' },
            { id: 'bgcolor', text: '🖍️', title: '背景颜色' },
            { id: 'fontsize', text: '🔤', title: '字体大小' },
            { id: 'justifyLeft', text: '⬅️', title: '居左' },
            { id: 'justifyCenter', text: '⏺️', title: '居中' },
            { id: 'justifyRight', text: '➡️', title: '居右' },
            { id: 'insertOrderedList', text: '①', title: '有序列表' },
            { id: 'insertUnorderedList', text: '•', title: '无序列表' },
            { id: 'formatBlock', text: 'H', title: '标题' },
            { id: 'horizontalRule', text: '―', title: '分割线' },
            { id: 'indent', text: '↦', title: '缩进' },
            { id: 'findReplace', text: '🔍', title: '查找替换' },
            { id: 'chineseConvert', text: '简/繁', title: '简繁转换' },
            { id: 'insertImage', text: '🖼️', title: '插入图片' }
        ];

        // 初始化
        function init() {
            loadData();
            loadTheme();
            renderFolderTree();
            renderNotes();
            initToolbar();
        }

        // ==================== 数据管理 ====================
        function loadData() {
            // 加载便签
            const savedNotes = localStorage.getItem('myNotes');
            if (savedNotes) {
                notes = JSON.parse(savedNotes);
            } else {
                notes = [];
            }
            
            // 加载文件夹
            const savedFolders = localStorage.getItem('noteFolders');
            if (savedFolders) {
                folders = JSON.parse(savedFolders);
            } else {
                folders = [
                    { id: 'default', name: '默认便签', parent: null, path: '/默认便签' }
                ];
            }
            
            // 确保每个便签都有必要字段
            notes = notes.map((note, index) => {
                if (!note.id) note.id = Date.now() + index;
                if (!note.folder) note.folder = 'default';
                if (!note.path) note.path = '/默认便签/' + (note.title || '未命名');
                return note;
            });
            
            saveData();
        }

        function saveData() {
            localStorage.setItem('myNotes', JSON.stringify(notes));
            localStorage.setItem('noteFolders', JSON.stringify(folders));
        }

        // ==================== 文件夹树 ====================
        function renderFolderTree() {
            const container = document.querySelector('.folder-tree');
            
            // 构建树形结构
            const rootFolders = folders.filter(f => !f.parent);
            
            let html = `
                <li class="folder-item">
                    <div class="folder-content ${currentFolder === 'all' ? 'selected' : ''}" onclick="selectFolder('all')">
                        <span class="folder-icon">📋</span>
                        <span class="folder-name">全部便签</span>
                        <span class="folder-count">${notes.length}</span>
                    </div>
                </li>
                <li class="folder-item">
                    <div class="folder-content ${currentFolder === 'default' ? 'selected' : ''}" onclick="selectFolder('default')">
                        <span class="folder-icon">📄</span>
                        <span class="folder-name">默认便签</span>
                        <span class="folder-count">${notes.filter(n => n.folder === 'default').length}</span>
                    </div>
                </li>
            `;
            
            rootFolders.forEach(folder => {
                if (folder.id !== 'default') {
                    html += renderFolderItem(folder);
                }
            });
            
            container.innerHTML = html;
        }

        function renderFolderItem(folder, level = 0) {
            const folderNotes = notes.filter(n => n.folder === folder.id).length;
            const children = folders.filter(f => f.parent === folder.id);
            const indent = level * 20;
            
            return `
                <li class="folder-item">
                    <div class="folder-content ${currentFolder === folder.id ? 'selected' : ''}" 
                         onclick="selectFolder('${folder.id}')"
                         style="padding-left: ${indent + 8}px">
                        <span class="folder-icon">📂</span>
                        <span class="folder-name">${folder.name}</span>
                        <span class="folder-count">${folderNotes}</span>
                        <div class="folder-actions">
                            <button class="folder-action-btn" onclick="event.stopPropagation(); showDeleteFolderModal('${folder.id}')">🗑️</button>
                        </div>
                    </div>
                    ${children.length > 0 ? `
                        <ul class="folder-children">
                            ${children.map(c => renderFolderItem(c, level + 1)).join('')}
                        </ul>
                    ` : ''}
                </li>
            `;
        }

        function selectFolder(folderId) {
            currentFolder = folderId;
            
            // 更新选中样式
            document.querySelectorAll('.folder-content').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // 更新标题
            let title = '全部便签';
            if (folderId === 'default') title = '默认便签';
            else if (folderId !== 'all') {
                const folder = findFolder(folderId);
                if (folder) title = folder.name;
            }
            document.getElementById('currentFolderTitle').textContent = title;
            
            renderNotes();
        }

        function findFolder(id) {
            for (let f of folders) {
                if (f.id === id) return f;
            }
            return null;
        }

        // ==================== 文件夹管理 ====================
        function showAddFolderModal() {
            // 填充父文件夹选项
            const select = document.getElementById('parentFolder');
            select.innerHTML = '<option value="root">根目录</option>';
            
            const addFolderOptions = (folder, prefix = '') => {
                const option = document.createElement('option');
                option.value = folder.id;
                option.textContent = prefix + folder.name;
                select.appendChild(option);
                
                folders.filter(f => f.parent === folder.id).forEach(child => {
                    addFolderOptions(child, prefix + '　');
                });
            };
            
            folders.filter(f => !f.parent && f.id !== 'default').forEach(f => addFolderOptions(f));
            
            document.getElementById('addFolderModal').classList.add('show');
        }

        function closeAddFolderModal() {
            document.getElementById('addFolderModal').classList.remove('show');
            document.getElementById('folderName').value = '';
        }

        function addFolder() {
            const name = document.getElementById('folderName').value.trim();
            const parentId = document.getElementById('parentFolder').value;
            
            if (!name) {
                alert('请输入文件夹名称');
                return;
            }
            
            // 构建路径
            let path = '/' + name;
            if (parentId !== 'root') {
                const parent = findFolder(parentId);
                if (parent) {
                    path = parent.path + '/' + name;
                }
            }
            
            const newFolder = {
                id: 'folder_' + Date.now(),
                name: name,
                parent: parentId === 'root' ? null : parentId,
                path: path
            };
            
            folders.push(newFolder);
            saveData();
            renderFolderTree();
            closeAddFolderModal();
        }

        function showDeleteFolderModal(folderId) {
            folderToDelete = folderId;
            document.getElementById('deleteFolderModal').classList.add('show');
        }

        function closeDeleteFolderModal() {
            document.getElementById('deleteFolderModal').classList.remove('show');
            folderToDelete = null;
        }

        function confirmDeleteFolder() {
            if (!folderToDelete) return;
            
            // 将该文件夹下的所有便签移到默认文件夹
            notes.forEach(note => {
                if (note.folder === folderToDelete) {
                    note.folder = 'default';
                }
            });
            
            // 删除文件夹
            folders = folders.filter(f => f.id !== folderToDelete);
            
            saveData();
            renderFolderTree();
            renderNotes();
            closeDeleteFolderModal();
        }

        // ==================== 便签显示 ====================
        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            
            let items = [];
            
            if (currentFolder === 'all') {
                // 显示所有便签和文件夹
                items = [
                    ...folders.filter(f => f.id !== 'default' && !f.parent).map(f => ({ type: 'folder', data: f })),
                    ...notes.map(n => ({ type: 'note', data: n }))
                ];
            } else if (currentFolder === 'default') {
                // 只显示默认文件夹的便签
                items = notes.filter(n => n.folder === 'default').map(n => ({ type: 'note', data: n }));
            } else {
                // 显示当前文件夹的便签和子文件夹
                const currentFolderData = findFolder(currentFolder);
                if (currentFolderData) {
                    items = [
                        ...folders.filter(f => f.parent === currentFolder).map(f => ({ type: 'folder', data: f })),
                        ...notes.filter(n => n.folder === currentFolder).map(n => ({ type: 'note', data: n }))
                    ];
                }
            }
            
            if (items.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:60px; color:rgba(255,255,255,0.5);">暂无内容</div>';
                return;
            }
            
            grid.innerHTML = items.map(item => {
                if (item.type === 'folder') {
                    return `
                        <div class="grid-item folder-item" onclick="selectFolder('${item.data.id}')">
                            <div class="item-icon">📁</div>
                            <div class="item-name">${item.data.name}</div>
                            <div class="item-info">文件夹</div>
                            ${isBatchMode ? '' : `
                                <div class="item-actions">
                                    <button class="item-action-btn" onclick="event.stopPropagation(); showDeleteFolderModal('${item.data.id}')" title="删除文件夹">🗑️</button>
                                </div>
                            `}
                        </div>
                    `;
                } else {
                    const note = item.data;
                    const content = note.content || '';
                    const textOnly = content.replace(/<[^>]*>/g, '').substring(0, 30);
                    const isSelected = selectedNotes.has(note.id);
                    
                    return `
                        <div class="grid-item ${isBatchMode ? 'batch-mode' : ''} ${isSelected ? 'selected' : ''}" 
                             onclick="${isBatchMode ? 'toggleNoteSelect(' + note.id + ')' : 'editNote(' + notes.indexOf(note) + ')'}">
                            ${isBatchMode ? `<input type="checkbox" class="item-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleNoteSelect(${note.id})">` : ''}
                            <div class="item-icon">📝</div>
                            <div class="item-name">${note.title || '无标题'}</div>
                            <div class="item-info">${note.time || '未知时间'}</div>
                            ${isBatchMode ? '' : `
                                <div class="item-actions">
                                    <button class="item-action-btn" onclick="event.stopPropagation(); copyNote(${notes.indexOf(note)})" title="复制">📋</button>
                                    <button class="item-action-btn" onclick="event.stopPropagation(); deleteNote(${notes.indexOf(note)})" title="删除">🗑️</button>
                                </div>
                            `}
                        </div>
                    `;
                }
            }).join('');
            
            // 更新批量操作按钮
            updateBatchActions();
        }

        // ==================== 便签操作 ====================
        function showNewNote() {
            currentEditIndex = -1;
            document.getElementById('editor').innerHTML = '';
            document.getElementById('imagePreview').innerHTML = '';
            document.getElementById('fullscreenEditor').classList.add('show');
            
            history = [];
            historyIndex = -1;
            saveToHistory();
        }

        function editNote(index) {
            const note = notes[index];
            currentEditIndex = index;
            
            if (typeof note === 'string') {
                document.getElementById('editor').innerHTML = note;
            } else {
                document.getElementById('editor').innerHTML = note.content || '';
                if (note.images && note.images.length > 0) {
                    document.getElementById('imagePreview').innerHTML = note.images.map(img => 
                        `<img src="${img}" style="max-width:100px; margin:5px;">`
                    ).join('');
                }
            }
            
            document.getElementById('fullscreenEditor').classList.add('show');
            
            history = [];
            historyIndex = -1;
            saveToHistory();
        }

        function exitEditor() {
            saveNote();
            document.getElementById('fullscreenEditor').classList.remove('show');
            renderNotes();
        }

        function saveAndStay() {
            saveNote();
            showToast('✅ 已保存');
        }

        function saveNote() {
            const content = document.getElementById('editor').innerHTML.trim();
            if (!content || content === '<br>') return;
            
            const images = [];
            document.querySelectorAll('#imagePreview img').forEach(img => {
                images.push(img.src);
            });
            
            // 提取标题（第一行文字）
            const textContent = content.replace(/<[^>]*>/g, '').trim();
            const title = textContent.split('\n')[0].substring(0, 20) || '无标题';
            
            // 构建路径
            let path = '/默认便签/' + title;
            if (currentFolder !== 'all' && currentFolder !== 'default') {
                const folder = findFolder(currentFolder);
                if (folder) {
                    path = folder.path + '/' + title;
                }
            }
            
            const newNote = {
                id: currentEditIndex === -1 ? Date.now() : notes[currentEditIndex].id,
                title: title,
                content: content,
                time: new Date().toLocaleString(),
                images: images,
                folder: currentEditIndex === -1 ? (currentFolder === 'all' ? 'default' : currentFolder) : notes[currentEditIndex].folder,
                path: path
            };
            
            if (currentEditIndex === -1) {
                notes.push(newNote);
                currentEditIndex = notes.length - 1; // 设置当前编辑索引，防止重复保存
            } else {
                notes[currentEditIndex] = newNote;
            }
            
            saveData();
        }

        function copyNote(index) {
            const note = notes[index];
            const copy = JSON.parse(JSON.stringify(note));
            copy.id = Date.now();
            copy.time = new Date().toLocaleString();
            copy.title = copy.title + ' (副本)';
            copy.path = copy.path + ' (副本)';
            
            notes.push(copy);
            saveData();
            renderNotes();
            showToast('📋 已复制');
        }

        function deleteNote(index) {
            if (!confirm('确定删除这条便签吗？')) return;
            notes.splice(index, 1);
            saveData();
            renderNotes();
            renderFolderTree();
        }

        // ==================== 批量操作 ====================
        function toggleBatchMode() {
            isBatchMode = !isBatchMode;
            document.getElementById('batchModeBtn').textContent = isBatchMode ? '✅ 完成' : '✏️ 批量';
            selectedNotes.clear();
            renderNotes();
            
            if (isBatchMode) {
                // 显示批量操作按钮
                const actions = document.getElementById('notesActions');
                actions.innerHTML = `
                    <button class="action-btn" onclick="showBatchMoveModal()">📂 移动</button>
                    <button class="action-btn danger" onclick="showBatchDeleteModal()">🗑️ 删除</button>
                    <button class="action-btn" onclick="toggleBatchMode()">取消</button>
                `;
            } else {
                // 恢复正常按钮
                document.getElementById('notesActions').innerHTML = '<button class="action-btn" onclick="showNewNote()">➕ 新建</button>';
            }
        }

        function toggleNoteSelect(noteId) {
            if (selectedNotes.has(noteId)) {
                selectedNotes.delete(noteId);
            } else {
                selectedNotes.add(noteId);
            }
            renderNotes();
            updateBatchActions();
        }

        function updateBatchActions() {
            const count = selectedNotes.size;
            if (isBatchMode) {
                document.getElementById('notesActions').innerHTML = `
                    <span style="color:#FFD700;">已选 ${count}</span>
                    <button class="action-btn" onclick="showBatchMoveModal()">📂 移动</button>
                    <button class="action-btn danger" onclick="showBatchDeleteModal()">🗑️ 删除</button>
                    <button class="action-btn" onclick="toggleBatchMode()">取消</button>
                `;
            }
        }

        function showBatchMoveModal() {
            if (selectedNotes.size === 0) {
                alert('请先选择要移动的便签');
                return;
            }
            
            document.getElementById('selectedCount').textContent = selectedNotes.size;
            
            // 填充目标文件夹选项
            const select = document.getElementById('moveTargetFolder');
            select.innerHTML = '<option value="">选择目标文件夹</option>';
            
            folders.forEach(folder => {
                if (folder.id !== 'default') {
                    const option = document.createElement('option');
                    option.value = folder.id;
                    option.textContent = folder.name;
                    select.appendChild(option);
                }
            });
            
            document.getElementById('batchMoveModal').classList.add('show');
        }

        function closeBatchMoveModal() {
            document.getElementById('batchMoveModal').classList.remove('show');
        }

        function batchMove() {
            const targetFolder = document.getElementById('moveTargetFolder').value;
            if (!targetFolder) {
                alert('请选择目标文件夹');
                return;
            }
            
            notes.forEach(note => {
                if (selectedNotes.has(note.id)) {
                    note.folder = targetFolder;
                    
                    // 更新路径
                    const folder = findFolder(targetFolder);
                    if (folder) {
                        note.path = folder.path + '/' + note.title;
                    }
                }
            });
            
            saveData();
            selectedNotes.clear();
            toggleBatchMode();
            renderNotes();
            renderFolderTree();
            closeBatchMoveModal();
            showToast('📂 移动完成');
        }

        function showBatchDeleteModal() {
            if (selectedNotes.size === 0) {
                alert('请先选择要删除的便签');
                return;
            }
            
            document.getElementById('deleteCount').textContent = selectedNotes.size;
            document.getElementById('batchDeleteModal').classList.add('show');
        }

        function closeBatchDeleteModal() {
            document.getElementById('batchDeleteModal').classList.remove('show');
        }

        function batchDelete() {
            notes = notes.filter(note => !selectedNotes.has(note.id));
            saveData();
            selectedNotes.clear();
            toggleBatchMode();
            renderNotes();
            renderFolderTree();
            closeBatchDeleteModal();
            showToast('🗑️ 删除完成');
        }

        // ==================== 主题管理 ====================
        function loadTheme() {
            const savedTheme = localStorage.getItem('noteTheme');
            if (savedTheme) {
                const theme = JSON.parse(savedTheme);
                document.documentElement.style.setProperty('--bg-gradient-start', theme.start);
                document.documentElement.style.setProperty('--bg-gradient-end', theme.end);
            }
            
            const nightMode = localStorage.getItem('nightMode') === 'true';
            if (nightMode) {
                document.body.classList.add('night-mode');
            }
        }

        function showThemeModal() {
            document.getElementById('themeModal').classList.add('show');
        }

        function closeThemeModal() {
            document.getElementById('themeModal').classList.remove('show');
        }

        function setTheme(type, start, end) {
            document.documentElement.style.setProperty('--bg-gradient-start', start);
            document.documentElement.style.setProperty('--bg-gradient-end', end);
            
            localStorage.setItem('noteTheme', JSON.stringify({ start, end }));
        }

        function updateCustomTheme() {
            // 实时预览
            const start = document.getElementById('customColorStart').value;
            const end = document.getElementById('customColorEnd').value;
            document.documentElement.style.setProperty('--bg-gradient-start', start);
            document.documentElement.style.setProperty('--bg-gradient-end', end);
        }

        function applyCustomTheme() {
            const start = document.getElementById('customColorStart').value;
            const end = document.getElementById('customColorEnd').value;
            
            localStorage.setItem('noteTheme', JSON.stringify({ start, end }));
            closeThemeModal();
        }

        function toggleNightMode() {
            document.body.classList.toggle('night-mode');
            localStorage.setItem('nightMode', document.body.classList.contains('night-mode'));
        }

        // ==================== 导出功能 ====================
        function showExportModal() {
            document.getElementById('exportModal').classList.add('show');
        }

        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('show');
        }

        function exportAsImage() {
            const editor = document.getElementById('editor');
            
            const container = document.createElement('div');
            container.style.padding = '40px';
            container.style.background = 'white';
            container.style.maxWidth = '800px';
            container.style.margin = '0 auto';
            container.style.fontFamily = 'Arial';
            container.style.lineHeight = '1.6';
            container.innerHTML = editor.innerHTML;
            
            document.body.appendChild(container);
            
            html2canvas(container, {
                scale: 2,
                backgroundColor: '#ffffff'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `便签-${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                document.body.removeChild(container);
                closeExportModal();
                showToast('🖼️ 已导出为图片');
            });
        }

        function exportAsTxt() {
            const content = document.getElementById('editor').innerText;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.download = `便签-${new Date().toLocaleDateString()}.txt`;
            link.href = URL.createObjectURL(blob);
            link.click();
            closeExportModal();
            showToast('📄 已导出为TXT');
        }

        // ==================== 编辑器功能 ====================
        function initToolbar() {
            const toolbar = document.getElementById('editorToolbar');
            let html = '';
            
            let enabledItems = allToolbarItems.filter(item => toolbarSettings[item.id] !== false);
            
            if (toolbarOrder.length > 0) {
                enabledItems.sort((a, b) => {
                    const indexA = toolbarOrder.indexOf(a.id);
                    const indexB = toolbarOrder.indexOf(b.id);
                    
                    if (indexA === -1 && indexB === -1) return 0;
                    if (indexA === -1) return 1;
                    if (indexB === -1) return -1;
                    return indexA - indexB;
                });
            }
            
            enabledItems.forEach(item => {
                html += `<button onclick="toolbarClick('${item.id}')" title="${item.title}" id="btn-${item.id}" style="${item.style || ''}">${item.text}</button>`;
            });
            
            toolbar.innerHTML = html;
        }

        function toolbarClick(action) {
            switch(action) {
                case 'undo': undo(); break;
                case 'redo': redo(); break;
                case 'bold': formatText('bold'); break;
                case 'italic': formatText('italic'); break;
                case 'underline': formatText('underline'); break;
                case 'strike': formatText('strikeThrough'); break;
                case 'color': showColorPicker('color'); break;
                case 'bgcolor': showColorPicker('bgcolor'); break;
                case 'fontsize': showFontSizePicker(); break;
                case 'justifyLeft': formatText('justifyLeft'); break;
                case 'justifyCenter': formatText('justifyCenter'); break;
                case 'justifyRight': formatText('justifyRight'); break;
                case 'insertOrderedList': formatText('insertOrderedList'); break;
                case 'insertUnorderedList': formatText('insertUnorderedList'); break;
                case 'formatBlock': insertHeading(); break;
                case 'horizontalRule': formatText('insertHorizontalRule'); break;
                case 'indent': formatText('indent'); break;
                case 'findReplace': showFindReplace(); break;
                case 'chineseConvert': convertChinese(); break;
                case 'insertImage': insertImage(); break;
            }
        }

        function saveToHistory() {
            const editor = document.getElementById('editor');
            if (!editor) return;
            
            const current = editor.innerHTML;
            
            if (history.length > 0 && history[history.length - 1] === current) return;
            
            if (historyIndex < history.length - 1) {
                history = history.slice(0, historyIndex + 1);
            }
            
            history.push(current);
            historyIndex = history.length - 1;
            
            if (history.length > MAX_HISTORY) {
                history.shift();
                historyIndex--;
            }
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                document.getElementById('editor').innerHTML = history[historyIndex];
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                document.getElementById('editor').innerHTML = history[historyIndex];
            }
        }

        function formatText(command) {
            document.execCommand(command, false, null);
            document.getElementById('editor').focus();
            saveToHistory();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #4CAF50;
                color: white;
                padding: 10px 20px;
                border-radius: 20px;
                z-index: 3000;
                animation: fadeOut 2s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 2000);
        }

        // 初始化
        window.onload = init;
    </script>
</body>
</html>
