<!DOCTYPE html>
<html>
<head>
    <title>我的动物庄园</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* 主题变量 */
        :root {
            --bg-gradient-start: #1a472a;
            --bg-gradient-end: #2d6a4f;
            --card-bg: rgba(255,255,255,0.1);
            --text-color: white;
            --border-color: rgba(255,255,255,0.2);
            --hover-bg: rgba(255,255,255,0.2);
            --selected-bg: #FFD700;
            --selected-text: #333;
        }

        /* 夜间模式 */
        body.night-mode {
            --bg-gradient-start: #0a1f0a;
            --bg-gradient-end: #1a3a1a;
            --card-bg: rgba(0,0,0,0.5);
            --text-color: #e0e0e0;
            --border-color: rgba(255,255,255,0.1);
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            padding: 20px;
            color: var(--text-color);
            transition: all 0.3s;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
        }
        .points-display {
            font-size: 18px;
            font-weight: bold;
        }
        .points-display span {
            color: #FFD700;
            font-size: 24px;
            margin-left: 10px;
        }
        .nav-buttons {
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .nav-btn.active {
            background: #FFD700;
            color: #333;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: var(--text-color);
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        /* 三栏布局 */
        .main-layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* 左侧栏 */
        .left-column {
            width: 250px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 签到卡片 */
        .sign-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .sign-title {
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .sign-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sign-points {
            font-size: 20px;
            font-weight: bold;
        }
        .sign-btn {
            padding: 8px 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 16px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
        }
        .sign-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 抽蛋卡片 */
        .gacha-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .gacha-title {
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 15px;
        }
        .gacha-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .gacha-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gacha-btn.single {
            background: linear-gradient(135deg, #FFD700, #FFA500);
        }
        .gacha-btn.ten {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
        }
        .gacha-btn:hover {
            transform: translateY(-2px);
        }

        /* 动物列表 */
        .animals-list-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            flex: 1;
        }
        .animals-list-title {
            font-size: 14px;
            color: #FFD700;
            margin-bottom: 15px;
        }
        .animals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .animal-item {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .animal-item:hover {
            border-color: #FFD700;
        }
        .animal-item.selected {
            border-color: #FFD700;
            background: rgba(255,215,0,0.1);
        }
        .animal-avatar {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 5px;
        }
        .animal-name {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }
        .animal-level {
            font-size: 10px;
            color: #FFD700;
        }

        /* 中间栏 - 动物抚养 */
        .middle-column {
            flex: 2;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border-color);
        }
        .pet-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }
        .pet-avatar {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 15px;
            border: 3px solid #FFD700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pet-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #FFD700;
        }
        .pet-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .pet-name:hover {
            color: #FFD700;
        }
        .pet-level {
            font-size: 16px;
            color: #FFD700;
            margin-bottom: 10px;
        }
        .exp-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .exp-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 0%;
            transition: width 0.3s;
        }
        .talent-display {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            font-size: 14px;
        }
        .talent-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .talent-label {
            font-size: 11px;
            color: #aaa;
        }
        .talent-value {
            font-weight: bold;
            color: #FFD700;
        }

        /* 属性条 */
        .stats-bars {
            width: 100%;
            margin: 20px 0;
        }
        .stat-bar {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .stat-label {
            width: 60px;
            font-size: 14px;
        }
        .bar-container {
            flex: 1;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 50%;
            transition: width 0.3s;
        }
        .stat-value {
            width: 50px;
            font-size: 14px;
        }

        /* 互动按钮 */
        .interaction-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .interact-btn {
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .interact-btn:hover {
            background: #FFD700;
            color: #333;
        }
        .interact-btn span {
            font-size: 20px;
            margin-bottom: 5px;
        }

        /* 右侧栏 */
        .right-column {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 背包卡片 */
        .backpack-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .backpack-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .backpack-title {
            font-size: 16px;
            color: #FFD700;
        }
        .backpack-tabs {
            display: flex;
            gap: 5px;
        }
        .backpack-tab {
            padding: 5px 10px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            font-size: 12px;
        }
        .backpack-tab.active {
            background: #FFD700;
            color: #333;
        }
        .backpack-content {
            min-height: 150px;
            max-height: 250px;
            overflow-y: auto;
        }
        .backpack-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        .backpack-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .backpack-item-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-right: 10px;
        }
        .backpack-item-info {
            flex: 1;
        }
        .backpack-item-name {
            font-size: 13px;
            font-weight: bold;
        }
        .backpack-item-desc {
            font-size: 11px;
            color: #aaa;
        }
        .backpack-item-count {
            font-size: 14px;
            color: #FFD700;
            font-weight: bold;
            margin-left: 10px;
        }

        /* 孵化器 */
        .incubator-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        .incubator-select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 16px;
            border: 1px solid #FFD700;
            background: rgba(255,255,255,0.1);
            color: var(--text-color);
            cursor: pointer;
        }
        .incubator-select option {
            background: #1a472a;
        }
        .incubator-box {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .incubator-box.hatching {
            border-color: #FFD700;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px #FFD700; }
            50% { box-shadow: 0 0 30px #FFD700; }
        }
        .incubator-egg {
            font-size: 60px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .incubator-timer {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin: 10px 0;
        }
        .incubator-progress {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 0%;
            transition: width 1s;
        }
        .incubator-btn {
            padding: 10px 20px;
            background: #FFD700;
            border: none;
            border-radius: 20px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* 抽奖结果弹窗 */
        .draw-result-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2100;
            display: none;
            width: 400px;
            text-align: center;
            animation: popIn 0.5s;
            color: #333;
        }
        .draw-result-modal.show {
            display: block;
        }
        .draw-result-modal.legendary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            animation: legendaryShake 0.5s;
        }
        .draw-result-modal.epic {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
            color: white;
        }
        .draw-result-modal.rare {
            background: linear-gradient(135deg, #2196F3, #1976D2);
            color: white;
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            80% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes legendaryShake {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-5deg) scale(1.1); }
            75% { transform: translate(-50%, -50%) rotate(5deg) scale(1.1); }
        }
        .result-emoji {
            font-size: 80px;
            margin: 20px 0;
        }
        .result-name {
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        .result-rarity {
            font-size: 18px;
            padding: 5px 15px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
        }

        /* 破壳命名弹窗 */
        .hatch-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2200;
            display: none;
            width: 400px;
            color: #333;
        }
        .hatch-modal.show {
            display: block;
        }
        .hatch-animal {
            text-align: center;
            margin: 20px 0;
        }
        .hatch-emoji {
            font-size: 100px;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .hatch-talent {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 16px;
        }
        .hatch-talent-item {
            text-align: center;
        }
        .hatch-talent-label {
            font-size: 12px;
            color: #666;
        }
        .hatch-talent-value {
            font-size: 18px;
            font-weight: bold;
            color: #FFD700;
        }
        .hatch-name-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border: 2px solid #FFD700;
            border-radius: 12px;
            font-size: 16px;
        }

        /* 主题选择弹窗 */
        .theme-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            z-index: 2300;
            display: none;
            width: 450px;
            color: #333;
        }
        .theme-modal.show {
            display: block;
        }
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .theme-color {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .theme-color:hover {
            transform: scale(1.1);
        }
        .theme-color.selected {
            border-color: #333;
        }
        .color-picker {
            width: 100%;
            height: 50px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 12px;
            cursor: pointer;
        }

        .version-tag {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="index.html"><button class="back-btn">← 返回首页</button></a>
        </div>
        <div class="points-display">
            积分 <span id="totalPoints">1000</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="switchView('animals')">🐾 动物</button>
            <button class="nav-btn" onclick="switchView('backpack')">🎒 背包</button>
            <button class="theme-btn" onclick="showThemeModal()">🎨 主题</button>
            <button class="theme-btn" onclick="toggleNightMode()">🌙 夜间</button>
        </div>
    </div>

    <!-- 三栏布局 -->
    <div class="main-layout">
        <!-- 左侧栏 -->
        <div class="left-column">
            <!-- 签到卡片 -->
            <div class="sign-card">
                <div class="sign-title">📅 每日签到</div>
                <div class="sign-content">
                    <span class="sign-points" id="todayPoints">0</span>
                    <button class="sign-btn" id="signBtn" onclick="signIn()">签到</button>
                </div>
            </div>

            <!-- 抽蛋卡片 -->
            <div class="gacha-card">
                <div class="gacha-title">🥚 抽取动物蛋</div>
                <div class="gacha-buttons">
                    <button class="gacha-btn single" onclick="drawEgg(1)">单抽 100</button>
                    <button class="gacha-btn ten" onclick="drawEgg(10)">十连 900</button>
                </div>
            </div>

            <!-- 我的动物列表 -->
            <div class="animals-list-card">
                <div class="animals-list-title">🐾 我的动物</div>
                <div class="animals-grid" id="animalsGrid"></div>
            </div>
        </div>

        <!-- 中间栏 - 动物抚养 -->
        <div class="middle-column">
            <div class="pet-area" id="petArea">
                <div class="pet-avatar" onclick="showRenameModal()" id="petAvatar">🥚</div>
                <div class="pet-name" onclick="showRenameModal()" id="petName">选择动物</div>
                <div class="pet-level" id="petLevel">Lv.1</div>
                <div class="exp-bar">
                    <div class="exp-fill" id="expBar" style="width: 0%"></div>
                </div>
                <div class="talent-display" id="talentDisplay">
                    <div class="talent-item">
                        <span class="talent-label">力量</span>
                        <span class="talent-value" id="talentStrength">10</span>
                    </div>
                    <div class="talent-item">
                        <span class="talent-label">敏捷</span>
                        <span class="talent-value" id="talentAgility">10</span>
                    </div>
                    <div class="talent-item">
                        <span class="talent-label">智力</span>
                        <span class="talent-value" id="talentIntelligence">10</span>
                    </div>
                    <div class="talent-item">
                        <span class="talent-label">魅力</span>
                        <span class="talent-value" id="talentCharm">10</span>
                    </div>
                </div>
            </div>

            <div class="stats-bars" id="statsBars">
                <div class="stat-bar">
                    <span class="stat-label">饱食</span>
                    <div class="bar-container"><div class="bar-fill" id="hungerBar" style="width: 0%"></div></div>
                    <span class="stat-value" id="hungerValue">0/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">水分</span>
                    <div class="bar-container"><div class="bar-fill" id="waterBar" style="width: 0%"></div></div>
                    <span class="stat-value" id="waterValue">0/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">心情</span>
                    <div class="bar-container"><div class="bar-fill" id="moodBar" style="width: 0%"></div></div>
                    <span class="stat-value" id="moodValue">0/100</span>
                </div>
                <div class="stat-bar">
                    <span class="stat-label">精力</span>
                    <div class="bar-container"><div class="bar-fill" id="energyBar" style="width: 0%"></div></div>
                    <span class="stat-value" id="energyValue">0/100</span>
                </div>
            </div>

            <div class="interaction-buttons" id="interactionButtons">
                <button class="interact-btn" onclick="interact('feed')"><span>🍖</span>喂食</button>
                <button class="interact-btn" onclick="interact('water')"><span>💧</span>喂水</button>
                <button class="interact-btn" onclick="interact('play')"><span>🎾</span>玩耍</button>

    <script>
        // 动物数据
        const ANIMALS = {

                { emoji: '🐶', name: '小狗', rarity: 'uncommon', hatchTime: 2,

            ],

                  baseStats: { hunger: 70, water: 70, mood: 70, energy: 70 },
                  baseTalents: { strength: 8, agility: 9, intelligence: 8, charm: 9 } },
                { emoji: '🐨', name: '考拉', rarity: 'rare', hatchTime: 3,
                  baseStats: { hunger: 60, water: 50, mood: 80, energy: 50 },
                  baseTalents: { strength: 7, agility: 5, intelligence: 7, charm: 10 } },
                { emoji: '🦔', name: '刺猬', rarity: 'rare', hatchTime: 3,
                  baseStats: { hunger: 70, water: 60, mood: 70, energy: 70 },
                  baseTalents: { strength: 7, agility: 6, intelligence: 7, charm: 6 } }
            ],
            epic: [
                { emoji: '🦅', name: '雄鹰', rarity: 'epic', hatchTime: 4,
                  baseStats: { hunger: 80, water: 70, mood: 80, energy: 90 },
                  baseTalents: { strength: 9, agility: 10, intelligence: 8, charm: 8 } },
                { emoji: '🐺', name: '狼', rarity: 'epic', hatchTime: 4,
                  baseStats: { hunger: 90, water: 70, mood: 70, energy: 80 },
                  baseTalents: { strength: 10, agility: 9, intelligence: 8, charm: 7 } },
                { emoji: '🐻', name: '熊', rarity: 'epic', hatchTime: 4,
                  baseStats: { hunger: 90, water: 60, mood: 70, energy: 70 },
                  baseTalents: { strength: 10, agility: 5, intelligence: 7, charm: 8 } }
            ],
            legendary: [
                { emoji: '🐉', name: '小龙', rarity: 'legendary', hatchTime: 6,
                  baseStats: { hunger: 100, water: 100, mood: 100, energy: 100 },
                  baseTalents: { strength: 12, agility: 10, intelligence: 11, charm: 12 } },
                { emoji: '🦄', name: '独角兽', rarity: 'legendary', hatchTime: 6,
                  baseStats: { hunger: 90, water: 90, mood: 100, energy: 90 },
                  baseTalents: { strength: 9, agility: 12, intelligence: 10, charm: 13 } },
                { emoji: '🐲', name: '麒麟', rarity: 'legendary', hatchTime: 6,
                  baseStats: { hunger: 100, water: 90, mood: 90, energy: 90 },
                  baseTalents: { strength: 11, agility: 10, intelligence: 12, charm: 11 } }
            ]
        };

        // 概率配置
        const PROBABILITIES = [
            { rarity: 'common', rate: 0.6 },
            { rarity: 'uncommon', rate: 0.25 },
            { rarity: 'rare', rate: 0.1 },
            { rarity: 'epic', rate: 0.04 },
            { rarity: 'legendary', rate: 0.01 }
        ];

        // 稀有度显示配置
        const RARITY_CONFIG = {
            common: { name: '⚪ 基础', color: '#ffffff' },
            uncommon: { name: '🔵 普通', color: '#2196F3' },
            rare: { name: '💙 稀有', color: '#3F51B5' },
            epic: { name: '💜 史诗', color: '#9C27B0' },
            legendary: { name: '🌟 传说', color: '#FFD700' }
        };

        // 等级经验配置
        const LEVEL_EXP = [0, 100, 250, 450, 700, 1000, 1350, 1750, 2200, 2700, 3250];

        // 游戏数据
        let gameData = JSON.parse(localStorage.getItem('animalGame') || JSON.stringify({
            totalPoints: 1000,
            lastSignDate: null,
            todayPoints: 0,
            eggs: [], // [{ id, rarity }]
            incubating: null, // { egg, startTime, endTime }
            animals: [], // [{ ...animal, id, name, level, exp, stats, talents, lastUpdate }]
            currentPet: null,
            items: {
                // 基础道具
                food_normal: 5,
                food_premium: 0,
                water_normal: 5,
                water_premium: 0,
                toy_ball: 2,
                toy_plush: 0,
                speed_potion: 0,
                medicine: 0,
                // 新道具
                strength_potion: 0,  // 力量药水
                agility_potion: 0,   // 敏捷药水
                intelligence_potion: 0, // 智力药水
                charm_potion: 0,      // 魅力药水
                exp_boost: 0,         // 经验加成
                happiness_candy: 0,    // 快乐糖果
                energy_drink: 0,       // 能量饮料
                miracle_food: 0,       // 神奇饲料
                golden_leaf: 0,        // 金叶子（复活道具）
                lucky_clover: 0        // 幸运草（增加抽蛋概率）
            }
        }));

        let incubatorTimer = null;
        let statsTimer = null;
        let selectedRarity = null;
        let hatchingEgg = null;
        let currentBackpackTab = 'eggs';

        // 初始化
        function init() {
            loadTheme();
            updatePointsDisplay();
            updateEggsDisplay();
            updateIncubatorSelect();
            updateIncubatorDisplay();
            updateAnimalsDisplay();
            updateCurrentPet();
            updateBackpack();
            checkSignStatus();
            startTimers();
        }

        // ==================== 主题管理 ====================
        function loadTheme() {
            const savedTheme = localStorage.getItem('animalTheme');
            if (savedTheme) {
                const theme = JSON.parse(savedTheme);
                document.documentElement.style.setProperty('--bg-gradient-start', theme.start);
                document.documentElement.style.setProperty('--bg-gradient-end', theme.end);
            }
            
            const nightMode = localStorage.getItem('animalNightMode') === 'true';
            if (nightMode) {
                document.body.classList.add('night-mode');
            }
        }

        function showThemeModal() {
            document.getElementById('themeModal').classList.add('show');
        }

        function closeThemeModal() {
            document.getElementById('themeModal').classList.remove('show');
        }

        function setTheme(start, end) {
            document.documentElement.style.setProperty('--bg-gradient-start', start);
            document.documentElement.style.setProperty('--bg-gradient-end', end);
            localStorage.setItem('animalTheme', JSON.stringify({ start, end }));
        }

        function applyCustomTheme() {
            const start = document.getElementById('customColorStart').value;
            const end = document.getElementById('customColorEnd').value;
            setTheme(start, end);
            closeThemeModal();
        }

        function toggleNightMode() {
            document.body.classList.toggle('night-mode');
            localStorage.setItem('animalNightMode', document.body.classList.contains('night-mode'));
        }

        // ==================== 签到系统 ====================
        function checkSignStatus() {
            const today = new Date().toDateString();
            const signBtn = document.getElementById('signBtn');
            
            if (gameData.lastSignDate === today) {
                signBtn.disabled = true;
                signBtn.textContent = '已签到';
            } else {
                signBtn.disabled = false;
                signBtn.textContent = '签到';
            }
            document.getElementById('todayPoints').textContent = gameData.todayPoints || 0;
        }

        function signIn() {
            const points = Math.floor(Math.random() * 101);
            const today = new Date().toDateString();
            
            gameData.totalPoints += points;
            gameData.lastSignDate = today;
            gameData.todayPoints = points;
            
            saveGameData();
            updatePointsDisplay();
            checkSignStatus();
            showToast(`✨ 签到成功 +${points}积分`);
        }

        // ==================== 抽蛋系统 ====================
        function drawEgg(count) {
            const cost = count === 10 ? 900 : 100;
            
            if (gameData.totalPoints < cost) {
                alert(`积分不足，需要 ${cost} 积分`);
                return;
            }
            
            gameData.totalPoints -= cost;
            
            let results = [];
            for (let i = 0; i < count; i++) {
                // 检查是否有幸运草加成
                let rateMultiplier = 1;
                if (gameData.items.lucky_clover > 0) {
                    rateMultiplier = 1.5;
                    gameData.items.lucky_clover--;
                }
                
                const rand = Math.random() / rateMultiplier;
                let cumulative = 0;
                let selectedRarity = null;
                
                for (const p of PROBABILITIES) {
                    cumulative += p.rate;
                    if (rand < cumulative) {
                        selectedRarity = p.rarity;
                        break;
                    }
                }
                
                gameData.eggs.push({
                    id: Date.now() + i + Math.random(),
                    rarity: selectedRarity
                });
                
                results.push(selectedRarity);
            }
            
            saveGameData();
            updatePointsDisplay();
            updateEggsDisplay();
            updateIncubatorSelect();
            updateBackpack();
            
            // 显示抽奖结果
            if (count === 1) {
                showDrawResult(results[0]);
            } else {
                const counts = {
                    legendary: results.filter(r => r === 'legendary').length,
                    epic: results.filter(r => r === 'epic').length,
                    rare: results.filter(r => r === 'rare').length
                };
                showDrawResult('ten', counts);
            }
        }

        function showDrawResult(rarity, counts) {
            const modal = document.getElementById('drawResultModal');
            const emoji = document.getElementById('resultEmoji');
            const nameEl = document.getElementById('resultName');
            const rarityEl = document.getElementById('resultRarity');
            
            if (rarity === 'ten') {
                emoji.textContent = '🎉';
                nameEl.textContent = '十连抽结果';
                let resultText = [];
                if (counts.legendary > 0) resultText.push(`🌟传说 x${counts.legendary}`);
                if (counts.epic > 0) resultText.push(`💜史诗 x${counts.epic}`);
                if (counts.rare > 0) resultText.push(`💙稀有 x${counts.rare}`);
                rarityEl.textContent = resultText.join('  ') || '暂无稀有';
                
                if (counts.legendary > 0) {
                    modal.className = 'draw-result-modal legendary';
                } else if (counts.epic > 0) {
                    modal.className = 'draw-result-modal epic';
                } else if (counts.rare > 0) {
                    modal.className = 'draw-result-modal rare';
                } else {
                    modal.className = 'draw-result-modal';
                }
            } else {
                emoji.textContent = ['🥚', '🥚', '🥚', '🥚', '🥚'][Math.floor(Math.random() * 5)];
                nameEl.textContent = RARITY_CONFIG[rarity].name;
                rarityEl.textContent = rarity;
                
                if (rarity === 'legendary') {
                    modal.className = 'draw-result-modal legendary';
                } else if (rarity === 'epic') {
                    modal.className = 'draw-result-modal epic';
                } else if (rarity === 'rare') {
                    modal.className = 'draw-result-modal rare';
                } else {
                    modal.className = 'draw-result-modal';
                }
            }
            
            modal.classList.add('show');
        }

        function closeDrawResult() {
            document.getElementById('drawResultModal').classList.remove('show');
        }

        // ==================== 孵化系统 ====================
        function updateIncubatorSelect() {
            const select = document.getElementById('incubatorSelect');
            select.innerHTML = '<option value="">选择蛋的等级...</option>';
            
            ['common', 'uncommon', 'rare', 'epic', 'legendary'].forEach(rarity => {
                const count = gameData.eggs.filter(e => e.rarity === rarity).length;
                if (count > 0) {
                    const option = document.createElement('option');
                    option.value = rarity;
                    option.textContent = `${RARITY_CONFIG[rarity].name} (${count}个)`;
                    select.appendChild(option);
                }
            });
        }

        function selectEggRarity() {
            const select = document.getElementById('incubatorSelect');
            selectedRarity = select.value;
            
            if (selectedRarity && !gameData.incubating) {
                document.getElementById('incubatorAction').disabled = false;
            } else {
                document.getElementById('incubatorAction').disabled = true;
            }
        }

        function handleIncubatorAction() {
            if (gameData.incubating) {
                if (Date.now() >= gameData.incubating.endTime) {
                    // 孵化
                    hatchEgg();
                } else {
                    // 加速
                    useSpeedPotion();
                }
            } else {
                startIncubation();
            }
        }

        function startIncubation() {
            if (!selectedRarity) {
                alert('请先选择蛋的等级');
                return;
            }
            
            if (gameData.incubating) {
                alert('已有正在孵化的蛋');
                return;
            }
            
            const eggIndex = gameData.eggs.findIndex(e => e.rarity === selectedRarity);
            if (eggIndex === -1) return;
            
            const egg = gameData.eggs[eggIndex];
            const hatchTime = ANIMALS[egg.rarity][0].hatchTime;
            const hatchTimeMs = hatchTime * 60 * 60 * 1000;
            const now = Date.now();
            
            gameData.incubating = {
                egg: egg,
                rarity: egg.rarity,
                startTime: now,
                endTime: now + hatchTimeMs
            };
            
            gameData.eggs.splice(eggIndex, 1);
            
            saveGameData();
            updateEggsDisplay();
            updateIncubatorSelect();
            updateIncubatorDisplay();
            updateBackpack();
        }

        function updateIncubatorDisplay() {
            const box = document.getElementById('incubatorBox');
            const eggEl = document.getElementById('incubatorEgg');
            const timerEl = document.getElementById('incubatorTimer');
            const progressEl = document.getElementById('incubatorProgress');
            const actionBtn = document.getElementById('incubatorAction');
            
            if (!gameData.incubating) {
                box.classList.remove('hatching');
                eggEl.textContent = '🥚';
                timerEl.textContent = '--:--';
                progressEl.style.width = '0%';
                actionBtn.textContent = '开始孵化';
                return;
            }
            
            box.classList.add('hatching');
            
            const now = Date.now();
            const remaining = Math.max(0, gameData.incubating.endTime - now);
            const total = gameData.incubating.endTime - gameData.incubating.startTime;
            const progress = ((total - remaining) / total) * 100;
            
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            
            eggEl.textContent = '🥚';
            timerEl.textContent = `${hours}:${minutes.toString().padStart(2, '0')}`;
            progressEl.style.width = progress + '%';
            
            if (remaining <= 0) {
                actionBtn.textContent = '🐣 孵化';
            } else {
                actionBtn.textContent = '⚡ 加速';
            }
        }

        function hatchEgg() {
            if (!gameData.incubating) return;
            
            const rarity = gameData.incubating.rarity;
            const rarityAnimals = ANIMALS[rarity];
            const animal = rarityAnimals[Math.floor(Math.random() * rarityAnimals.length)];
            
            // 生成随机天赋（基础值 + 随机波动）
            const talents = {
                strength: animal.baseTalents.strength + Math.floor(Math.random() * 5) - 2,
                agility: animal.baseTalents.agility + Math.floor(Math.random() * 5) - 2,
                intelligence: animal.baseTalents.intelligence + Math.floor(Math.random() * 5) - 2,
                charm: animal.baseTalents.charm + Math.floor(Math.random() * 5) - 2
            };
            
            // 确保天赋不低于1
            Object.keys(talents).forEach(key => {
                talents[key] = Math.max(1, talents[key]);
            });
            
            hatchingEgg = {
                ...animal,
                id: Date.now(),
                name: animal.name,
                level: 1,
                exp: 0,
                stats: { ...animal.baseStats },
                talents: talents,
                lastUpdate: Date.now()
            };
            
            gameData.incubating = null;
            
            saveGameData();
            updateIncubatorDisplay();
            showHatchModal();
        }

        function useSpeedPotion() {
            if (!gameData.incubating) {
                alert('没有正在孵化的蛋');
                return;
            }
            
            if (gameData.items.speed_potion <= 0) {
                alert('没有加速药水');
                return;
            }
            
            gameData.incubating.endTime -= 2 * 60 * 60 * 1000;
            gameData.items.speed_potion--;
            
            saveGameData();
            updateIncubatorDisplay();
            updateBackpack();
        }

        // ==================== 破壳命名 ====================
        function showHatchModal() {
            if (!hatchingEgg) return;
            
            const modal = document.getElementById('hatchModal');
            document.getElementById('hatchEmoji').textContent = hatchingEgg.emoji;
            document.getElementById('hatchName').textContent = hatchingEgg.name;
            
            const talentHtml = Object.entries(hatchingEgg.talents).map(([key, value]) => {
                const labels = { strength: '力量', agility: '敏捷', intelligence: '智力', charm: '魅力' };
                return `
                    <div class="hatch-talent-item">
                        <div class="hatch-talent-label">${labels[key]}</div>
                        <div class="hatch-talent-value">${value}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('hatchTalent').innerHTML = talentHtml;
            document.getElementById('hatchPetName').value = hatchingEgg.name;
            
            modal.classList.add('show');
        }

        function closeHatchModal() {
            document.getElementById('hatchModal').classList.remove('show');
            hatchingEgg = null;
        }

        function confirmHatch() {
            if (!hatchingEgg) return;
            
            const newName = document.getElementById('hatchPetName').value.trim();
            if (newName) {
                hatchingEgg.name = newName;
            }
            
            gameData.animals.push(hatchingEgg);
            
            if (!gameData.currentPet) {
                gameData.currentPet = hatchingEgg.id;
            }
            
            saveGameData();
            closeHatchModal();
            updateAnimalsDisplay();
            updateCurrentPet();
            updateBackpack();
            showToast(`🎉 欢迎 ${hatchingEgg.name} 加入！`);
        }

        // ==================== 动物系统 ====================
        function updateAnimalsDisplay() {
            const grid = document.getElementById('animalsGrid');
            
            if (gameData.animals.length === 0) {
                grid.innerHTML = '<div style="text-align:center; grid-column:span 2; color:#aaa;">暂无动物</div>';
                return;
            }
            
            grid.innerHTML = gameData.animals.map(animal => `
                <div class="animal-item ${animal.id === gameData.currentPet ? 'selected' : ''}" onclick="setCurrentPet(${animal.id})">
                    <div class="animal-avatar">${animal.emoji}</div>
                    <div class="animal-name">${animal.name}</div>
                    <div class="animal-level">Lv.${animal.level}</div>
                </div>
            `).join('');
        }

        function setCurrentPet(id) {
            gameData.currentPet = id;
            saveGameData();
            updateCurrentPet();
            updateAnimalsDisplay();
        }

        function updateCurrentPet() {
            if (!gameData.currentPet) {
                document.getElementById('petAvatar').textContent = '🥚';
                document.getElementById('petName').textContent = '选择动物';
                document.getElementById('petLevel').textContent = 'Lv.0';
                document.getElementById('expBar').style.width = '0%';
                return;
            }
            
            const pet = gameData.animals.find(a => a.id === gameData.currentPet);
            if (!pet) return;
            
            // 更新状态（随时间下降）
            const now = Date.now();
            const hoursPassed = (now - (pet.lastUpdate || now)) / (1000 * 60 * 60);
            
            if (hoursPassed > 0) {
                pet.stats.hunger = Math.max(0, pet.stats.hunger - hoursPassed * 5);
                pet.stats.water = Math.max(0, pet.stats.water - hoursPassed * 5);
                pet.stats.mood = Math.max(0, pet.stats.mood - hoursPassed * 3);
                pet.stats.energy = Math.min(100, pet.stats.energy + hoursPassed * 2);
                pet.lastUpdate = now;
            }
            
            // 计算当前等级经验进度
            const currentLevelExp = LEVEL_EXP[pet.level];
            const nextLevelExp = LEVEL_EXP[pet.level + 1] || currentLevelExp;
            const expProgress = ((pet.exp - currentLevelExp) / (nextLevelExp - currentLevelExp)) * 100;
            
            document.getElementById('petAvatar').textContent = pet.emoji;
            document.getElementById('petName').textContent = pet.name;
            document.getElementById('petLevel').textContent = `Lv.${pet.level}`;
            document.getElementById('expBar').style.width = Math.min(100, expProgress) + '%';
            
            // 更新天赋显示
            document.getElementById('talentStrength').textContent = pet.talents.strength;
            document.getElementById('talentAgility').textContent = pet.talents.agility;
            document.getElementById('talentIntelligence').textContent = pet.talents.intelligence;
            document.getElementById('talentCharm').textContent = pet.talents.charm;
            
            document.getElementById('hungerBar').style.width = pet.stats.hunger + '%';
            document.getElementById('hungerValue').textContent = Math.floor(pet.stats.hunger) + '/100';
            document.getElementById('waterBar').style.width = pet.stats.water + '%';
            document.getElementById('waterValue').textContent = Math.floor(pet.stats.water) + '/100';
            document.getElementById('moodBar').style.width = pet.stats.mood + '%';
            document.getElementById('moodValue').textContent = Math.floor(pet.stats.mood) + '/100';
            document.getElementById('energyBar').style.width = pet.stats.energy + '%';
            document.getElementById('energyValue').textContent = Math.floor(pet.stats.energy) + '/100';
        }

        function addExp(amount) {
            const pet = gameData.animals.find(a => a.id === gameData.currentPet);
            if (!pet || pet.level >= 10) return;
            
            // 经验加成道具
            let expMultiplier = 1;
            if (gameData.items.exp_boost > 0) {
                expMultiplier = 1.5;
                gameData.items.exp_boost--;
            }
            
            pet.exp += amount * expMultiplier;
            
            // 检查升级
            while (pet.level < 10 && pet.exp >= LEVEL_EXP[pet.level + 1]) {
                pet.level++;
                // 升级奖励：属性上限增加，随机天赋提升
                pet.stats.hunger = Math.min(100, pet.stats.hunger + 5);
                pet.stats.water = Math.min(100, pet.stats.water + 5);
                pet.stats.mood = Math.min(100, pet.stats.mood + 5);
                pet.stats.energy = Math.min(100, pet.stats.energy + 5);
                
                // 随机提升一个天赋
                const talents = ['strength', 'agility', 'intelligence', 'charm'];
                const randomTalent = talents[Math.floor(Math.random() * talents.length)];
                pet.talents[randomTalent]++;
            }
            
            saveGameData();
            updateCurrentPet();
        }

        function interact(action) {
            if (!gameData.currentPet) {
                alert('请先选择一只动物');
                return;
            }
            
            const pet = gameData.animals.find(a => a.id === gameData.currentPet);
            if (!pet) return;
            
            let expGain = 0;
            
            switch(action) {
                case 'feed':
                    if (gameData.items.food_normal > 0) {
                        pet.stats.hunger = Math.min(100, pet.stats.hunger + 20);
                        gameData.items.food_normal--;
                        expGain = 5;
                    } else {
                        alert('没有饲料，请先在商城购买');
                        return;
                    }
                    break;
                case 'water':
                    if (gameData.items.water_normal > 0) {
                        pet.stats.water = Math.min(100, pet.stats.water + 20);
                        gameData.items.water_normal--;
                        expGain = 3;
                    } else {
                        alert('没有饮水，请先在商城购买');
                        return;
                    }
                    break;
                case 'play':
                    if (gameData.items.toy_ball > 0) {
                        pet.stats.mood = Math.min(100, pet.stats.mood + 15);
                        pet.stats.energy = Math.max(0, pet.stats.energy - 10);
                        gameData.items.toy_ball--;
                        expGain = 8;
                    } else {
                        alert('没有玩具，请先在商城购买');
                        return;
                    }
                    break;
                case 'clean':
                    pet.stats.mood += 10;
                    pet.stats.energy -= 5;
                    expGain = 2;
                    break;
                case 'sleep':
                    pet.stats.energy = Math.min(100, pet.stats.energy + 30);
                    pet.stats.hunger -= 5;
                    pet.stats.water -= 5;
                    expGain = 1;
                    break;
                case 'medicine':
                    if (gameData.items.medicine > 0) {
                        pet.stats.hunger = Math.min(100, pet.stats.hunger + 30);
                        pet.stats.water = Math.min(100, pet.stats.water + 30);
                        pet.stats.mood = Math.min(100, pet.stats.mood + 30);
                        gameData.items.medicine--;
                        expGain = 15;
                    } else {
                        alert('没有药品，请先在商城购买');
                        return;
                    }
                    break;
                case 'train':
                    if (gameData.items.energy_drink > 0) {
                        pet.stats.energy = Math.min(100, pet.stats.energy + 20);
                        expGain = 20;
                        gameData.items.energy_drink--;
                    } else {
                        pet.stats.energy = Math.max(0, pet.stats.energy - 20);
                        expGain = 10;
                    }
                    break;
                case 'gift':
                    if (gameData.items.happiness_candy > 0) {
                        pet.stats.mood = Math.min(100, pet.stats.mood + 30);
                        expGain = 15;
                        gameData.items.happiness_candy--;
                    } else {
                        pet.stats.mood += 10;
                        expGain = 5;
                    }
                    break;
                case 'massage':
                    pet.stats.mood += 15;
                    pet.stats.energy -= 5;
                    expGain = 8;
                    break;
            }
            
            // 限制范围
            Object.keys(pet.stats).forEach(key => {
                pet.stats[key] = Math.min(100, Math.max(0, pet.stats[key]));
            });
            
            pet.lastUpdate = Date.now();
            
            if (expGain > 0) {
                addExp(expGain);
            }
            
            saveGameData();
            updateCurrentPet();
            updateBackpack();
        }

        // ==================== 背包系统 ====================
        function switchBackpackTab(tab) {
            currentBackpackTab = tab;
            document.querySelectorAll('.backpack-tab').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateBackpack();
        }

        function updateBackpack() {
            const content = document.getElementById('backpackContent');
            
            if (currentBackpackTab === 'eggs') {
                // 显示蛋
                const counts = {
                    common: gameData.eggs.filter(e => e.rarity === 'common').length,
                    uncommon: gameData.eggs.filter(e => e.rarity === 'uncommon').length,
                    rare: gameData.eggs.filter(e => e.rarity === 'rare').length,
                    epic: gameData.eggs.filter(e => e.rarity === 'epic').length,
                    legendary: gameData.eggs.filter(e => e.rarity === 'legendary').length
                };
                
                content.innerHTML = Object.entries(counts).map(([rarity, count]) => {
                    if (count === 0) return '';
                    return `
                        <div class="backpack-item" onclick="selectRarityFromBackpack('${rarity}')">
                            <div class="backpack-item-icon">🥚</div>
                            <div class="backpack-item-info">
                                <div class="backpack-item-name">${RARITY_CONFIG[rarity].name}</div>
                                <div class="backpack-item-desc">点击选择孵化</div>
                            </div>
                            <div class="backpack-item-count">x${count}</div>
                        </div>
                    `;
                }).join('') || '<div style="text-align:center; color:#aaa;">暂无蛋</div>';
                
            } else if (currentBackpackTab === 'animals') {
                // 显示动物
                content.innerHTML = gameData.animals.map(animal => `
                    <div class="backpack-item" onclick="setCurrentPet(${animal.id})">
                        <div class="backpack-item-icon">${animal.emoji}</div>
                        <div class="backpack-item-info">
                            <div class="backpack-item-name">${animal.name}</div>
                            <div class="backpack-item-desc">Lv.${animal.level}</div>
                        </div>
                    </div>
                `).join('') || '<div style="text-align:center; color:#aaa;">暂无动物</div>';
                
            } else if (currentBackpackTab === 'items') {
                // 显示道具
                const items = [
                    { id: 'food_normal', icon: '🍎', name: '普通饲料', desc: '增加饱食20' },
                    { id: 'food_premium', icon: '🥩', name: '高级饲料', desc: '增加饱食50' },
                    { id: 'water_normal', icon: '💧', name: '纯净水', desc: '增加水分20' },
                    { id: 'water_premium', icon: '🧃', name: '果汁', desc: '水分30+心情10' },
                    { id: 'toy_ball', icon: '🎾', name: '小球', desc: '心情15' },
                    { id: 'toy_plush', icon: '🧸', name: '毛绒玩具', desc: '心情30' },
                    { id: 'speed_potion', icon: '⏰', name: '加速药水', desc: '孵化-2h' },
                    { id: 'medicine', icon: '💊', name: '万能药', desc: '恢复50%' },
                    { id: 'strength_potion', icon: '💪', name: '力量药水', desc: '力量+2' },
                    { id: 'agility_potion', icon: '⚡', name: '敏捷药水', desc: '敏捷+2' },
                    { id: 'intelligence_potion', icon: '🧠', name: '智力药水', desc: '智力+2' },
                    { id: 'charm_potion', icon: '✨', name: '魅力药水', desc: '魅力+2' },
                    { id: 'exp_boost', icon: '📈', name: '经验加成', desc: '经验x1.5' },
                    { id: 'happiness_candy', icon: '🍬', name: '快乐糖果', desc: '心情+30' },
                    { id: 'energy_drink', icon: '🥤', name: '能量饮料', desc: '精力+20' },
                    { id: 'miracle_food', icon: '🌟', name: '神奇饲料', desc: '全属性+20' },
                    { id: 'golden_leaf', icon: '🍂', name: '金叶子', desc: '复活道具' },
                    { id: 'lucky_clover', icon: '🍀', name: '幸运草', desc: '抽蛋概率x1.5' }
                ];
                
                content.innerHTML = items.map(item => {
                    if (gameData.items[item.id] > 0) {
                        return `
                            <div class="backpack-item" onclick="useItemFromBackpack('${item.id}')">
                                <div class="backpack-item-icon">${item.icon}</div>
                                <div class="backpack-item-info">
                                    <div class="backpack-item-name">${item.name}</div>
                                    <div class="backpack-item-desc">${item.desc}</div>
                                </div>
                                <div class="backpack-item-count">x${gameData.items[item.id]}</div>
                            </div>
                        `;
                    }
                    return '';
                }).join('') || '<div style="text-align:center; color:#aaa;">暂无道具</div>';
            }
        }

        function selectRarityFromBackpack(rarity) {
            document.getElementById('incubatorSelect').value = rarity;
            selectedRarity = rarity;
            if (!gameData.incubating) {
                document.getElementById('incubatorAction').disabled = false;
            }
        }

        function useItemFromBackpack(itemId) {
            if (!gameData.currentPet) {
                alert('请先选择动物');
                return;
            }
            
            const pet = gameData.animals.find(a => a.id === gameData.currentPet);
            if (!pet) return;
            
            if (gameData.items[itemId] <= 0) return;
            
            switch(itemId) {
                case 'strength_potion':
                    pet.talents.strength += 2;
                    showToast('💪 力量+2');
                    break;
                case 'agility_potion':
                    pet.talents.agility += 2;
                    showToast('⚡ 敏捷+2');
                    break;
                case 'intelligence_potion':
                    pet.talents.intelligence += 2;
                    showToast('🧠 智力+2');
                    break;
                case 'charm_potion':
                    pet.talents.charm += 2;
                    showToast('✨ 魅力+2');
                    break;
                case 'happiness_candy':
                    pet.stats.mood = Math.min(100, pet.stats.mood + 30);
                    showToast('🍬 心情+30');
                    break;
                case 'energy_drink':
                    pet.stats.energy = Math.min(100, pet.stats.energy + 20);
                    showToast('🥤 精力+20');
                    break;
                case 'miracle_food':
                    pet.stats.hunger = Math.min(100, pet.stats.hunger + 20);
                    pet.stats.water = Math.min(100, pet.stats.water + 20);
                    pet.stats.mood = Math.min(100, pet.stats.mood + 20);
                    pet.stats.energy = Math.min(100, pet.stats.energy + 20);
                    showToast('🌟 全属性+20');
                    break;
                case 'golden_leaf':
                    // 复活或恢复所有状态
                    pet.stats.hunger = 100;
                    pet.stats.water = 100;
                    pet.stats.mood = 100;
                    pet.stats.energy = 100;
                    showToast('🍂 已完全恢复');
                    break;
                default:
                    return;
            }
            
            gameData.items[itemId]--;
            pet.lastUpdate = Date.now();
            
            saveGameData();
            updateCurrentPet();
            updateBackpack();
        }

        // ==================== 积分系统 ====================
        function updatePointsDisplay() {
            document.getElementById('totalPoints').textContent = gameData.totalPoints;
        }

        // ==================== 蛋的显示 ====================
        function updateEggsDisplay() {
            // 更新蛋的数量显示（如果需要）
        }

        // ==================== 重命名 ====================
        function showRenameModal() {
            if (!gameData.currentPet) {
                alert('请先选择一只动物');
                return;
            }
            document.getElementById('hatchPetName').value = gameData.animals.find(a => a.id === gameData.currentPet)?.name || '';
            document.getElementById('hatchModal').classList.add('show');
            document.getElementById('hatchEmoji').textContent = gameData.animals.find(a => a.id === gameData.currentPet)?.emoji || '🐣';
        }

        // ==================== 提示消息 ====================
        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #4CAF50;
                color: white;
                padding: 10px 20px;
                border-radius: 20px;
                z-index: 3000;
                animation: fadeOut 2s forwards;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                document.body.removeChild(toast);
            }, 2000);
        }

        // ==================== 定时器 ====================
        function startTimers() {
            if (incubatorTimer) clearInterval(incubatorTimer);
            incubatorTimer = setInterval(() => {
                if (gameData.incubating) {
                    updateIncubatorDisplay();
                }
            }, 1000);
            
            if (statsTimer) clearInterval(statsTimer);
            statsTimer = setInterval(() => {
                if (gameData.currentPet) {
                    updateCurrentPet();
                }
            }, 60000);
        }

        // ==================== 数据存储 ====================
        function saveGameData() {
            localStorage.setItem('animalGame', JSON.stringify(gameData));
        }

        window.onload = init;
    </script>
</body>
</html>
