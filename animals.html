<!DOCTYPE html>
<html>
<head>
    <title>我的动物庄园</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #2d6a4f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* 顶部导航 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .back-btn {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .admin-btn {
            background: rgba(255,215,0,0.3);
            padding: 10px 20px;
            color: white;
            border: 2px solid #FFD700;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .admin-btn:hover {
            background: rgba(255,215,0,0.5);
            transform: translateY(-2px);
        }

        /* 三栏布局 */
        .main-layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* 左侧签到区 */
        .left-sign {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .sign-card {
            text-align: center;
        }
        .sign-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #FFD700;
        }
        .points-display {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .points-today {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .points-number {
            font-size: 48px;
            font-weight: bold;
            color: #FFD700;
        }
        .points-total {
            margin-top: 10px;
            font-size: 16px;
            color: #ddd;
        }
        .sign-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 20px;
            color: #1a472a;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .sign-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,215,0,0.3);
        }
        .sign-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .sign-message {
            color: #FFD700;
            font-size: 14px;
            min-height: 20px;
        }

        /* 中间抽蛋区 */
        .middle-egg {
            flex: 1.5;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .egg-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #FFD700;
            text-align: center;
        }
        .egg-showcase {
            background: rgba(0,0,0,0.3);
            border-radius: 100px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .egg-showcase:hover {
            border-color: #FFD700;
            transform: scale(1.02);
        }
        .egg-emoji {
            font-size: 80px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .egg-price {
            font-size: 18px;
            margin-top: 10px;
        }
        .egg-price span {
            color: #FFD700;
            font-weight: bold;
        }
        .probability-info {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
        }
        .prob-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        .prob-bar {
            width: 100px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .prob-fill {
            height: 100%;
            background: #FFD700;
            border-radius: 4px;
        }

        /* 右侧孵化区 */
        .right-hatch {
            flex: 1;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        .hatch-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: #FFD700;
            text-align: center;
        }
        .incubator {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .incubator-empty {
            color: #aaa;
            font-size: 16px;
        }
        .incubator-egg {
            font-size: 60px;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .incubator-timer {
            font-size: 24px;
            font-weight: bold;
            color: #FFD700;
            margin: 10px 0;
        }
        .incubator-progress {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700, #FFA500);
            width: 0%;
            transition: width 1s;
        }
        .hatch-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border: none;
            border-radius: 30px;
            color: #1a472a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .hatch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,215,0,0.3);
        }

        /* 动物展示区 */
        .animals-collection {
            margin-top: 20px;
        }
        .animals-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        .animal-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .animal-emoji {
            font-size: 30px;
            margin-bottom: 5px;
        }
        .animal-name {
            font-size: 12px;
            color: #ddd;
        }
        .animal-rarity {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 5px;
        }
        .rarity-common { background: #808080; }
        .rarity-uncommon { background: #00FF00; color: black; }
        .rarity-rare { background: #0000FF; }
        .rarity-epic { background: #800080; }
        .rarity-legendary { background: #FFD700; color: black; }

        /* 管理员弹窗 */
        .admin-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2100;
            display: none;
            width: 350px;
        }
        .admin-modal.show {
            display: block;
        }
        .admin-modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 12px;
        }
        .admin-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .admin-btn-action {
            flex: 1;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .admin-btn-close {
            flex: 1;
            padding: 12px;
            background: #999;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .version-tag {
            position: fixed;
            bottom: 5px;
            right: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            background: rgba(0,0,0,0.3);
            padding: 2px 5px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>
            <a href="index.html"><button class="back-btn">← 返回首页</button></a>
        </div>
        <button class="admin-btn" onclick="showAdminModal()">👑 管理员</button>
    </div>

    <!-- 三栏布局 -->
    <div class="main-layout">
        <!-- 左侧签到区 -->
        <div class="left-sign">
            <div class="sign-card">
                <div class="sign-title">📅 每日签到</div>
                <div class="points-display">
                    <div class="points-today">今日获得</div>
                    <div class="points-number" id="todayPoints">0</div>
                    <div class="points-total">总积分: <span id="totalPoints">0</span></div>
                </div>
                <button class="sign-btn" id="signBtn" onclick="signIn()">签到领积分</button>
                <div class="sign-message" id="signMessage"></div>
            </div>
        </div>

        <!-- 中间抽蛋区 -->
        <div class="middle-egg">
            <div class="egg-title">🥚 动物蛋抽取</div>
            <div class="egg-showcase" onclick="drawEgg()">
                <div class="egg-emoji" id="eggEmoji">🥚</div>
                <div class="egg-price">消耗 <span>100</span> 积分</div>
            </div>
            
            <div class="probability-info">
                <div class="prob-item">
                    <span>🐣 基础 (60%)</span>
                    <div class="prob-bar"><div class="prob-fill" style="width: 60%"></div></div>
                </div>
                <div class="prob-item">
                    <span>🐥 普通 (25%)</span>
                    <div class="prob-bar"><div class="prob-fill" style="width: 25%"></div></div>
                </div>
                <div class="prob-item">
                    <span>🦆 稀有 (10%)</span>
                    <div class="prob-bar"><div class="prob-fill" style="width: 10%"></div></div>
                </div>
                <div class="prob-item">
                    <span>🦅 史诗 (4%)</span>
                    <div class="prob-bar"><div class="prob-fill" style="width: 4%"></div></div>
                </div>
                <div class="prob-item">
                    <span>🐉 传说 (1%)</span>
                    <div class="prob-bar"><div class="prob-fill" style="width: 1%"></div></div>
                </div>
            </div>
        </div>

        <!-- 右侧孵化区 -->
        <div class="right-hatch">
            <div class="hatch-title">⏳ 孵化器</div>
            <div class="incubator" id="incubator">
                <div class="incubator-empty" id="incubatorEmpty">🈳 暂无孵化中的蛋</div>
            </div>
            
            <div class="animals-collection">
                <div class="hatch-title">🐾 我的动物</div>
                <div class="animals-grid" id="animalsGrid"></div>
            </div>
        </div>
    </div>

    <!-- 管理员弹窗 -->
    <div id="adminModal" class="admin-modal">
        <h3 style="margin-top:0;">👑 管理员模式</h3>
        <input type="password" id="adminPassword" placeholder="输入密码">
        <div class="admin-buttons">
            <button class="admin-btn-action" onclick="adminAddPoints()">+1000积分</button>
            <button class="admin-btn-action" onclick="adminCompleteHatch()">立即孵化</button>
        </div>
        <div class="admin-buttons">
            <button class="admin-btn-action" onclick="adminResetSign()">重置签到</button>
            <button class="admin-btn-action" onclick="adminClearEgg()">清空孵化器</button>
        </div>
        <div style="text-align: right; margin-top: 15px;">
            <button class="admin-btn-close" onclick="closeAdminModal()">关闭</button>
        </div>
    </div>

    <div class="version-tag">v1.0 - 动物庄园</div>

    <script>
        // 动物数据
        const ANIMALS = {
            common: [
                { emoji: '🐣', name: '小鸡', rarity: 'common', hatchTime: 12 },
                { emoji: '🐥', name: '小鸭', rarity: 'common', hatchTime: 12 },
                { emoji: '🐰', name: '兔子', rarity: 'common', hatchTime: 12 }
            ],
            uncommon: [
                { emoji: '🦊', name: '狐狸', rarity: 'uncommon', hatchTime: 18 },
                { emoji: '🐱', name: '小猫', rarity: 'uncommon', hatchTime: 18 },
                { emoji: '🐶', name: '小狗', rarity: 'uncommon', hatchTime: 18 }
            ],
            rare: [
                { emoji: '🦌', name: '小鹿', rarity: 'rare', hatchTime: 24 },
                { emoji: '🐨', name: '考拉', rarity: 'rare', hatchTime: 24 },
                { emoji: '🦔', name: '刺猬', rarity: 'rare', hatchTime: 24 }
            ],
            epic: [
                { emoji: '🦅', name: '雄鹰', rarity: 'epic', hatchTime: 36 },
                { emoji: '🐺', name: '狼', rarity: 'epic', hatchTime: 36 },
                { emoji: '🐻', name: '熊', rarity: 'epic', hatchTime: 36 }
            ],
            legendary: [
                { emoji: '🐉', name: '小龙', rarity: 'legendary', hatchTime: 48 },
                { emoji: '🦄', name: '独角兽', rarity: 'legendary', hatchTime: 48 },
                { emoji: '🐲', name: '麒麟', rarity: 'legendary', hatchTime: 48 }
            ]
        };

        // 概率配置
        const PROBABILITIES = [
            { rarity: 'common', rate: 0.6, animals: ANIMALS.common },
            { rarity: 'uncommon', rate: 0.25, animals: ANIMALS.uncommon },
            { rarity: 'rare', rate: 0.1, animals: ANIMALS.rare },
            { rarity: 'epic', rate: 0.04, animals: ANIMALS.epic },
            { rarity: 'legendary', rate: 0.01, animals: ANIMALS.legendary }
        ];

        // 游戏数据
        let gameData = JSON.parse(localStorage.getItem('animalGame') || JSON.stringify({
            totalPoints: 1000, // 初始给1000积分方便测试
            lastSignDate: null,
            todayPoints: 0,
            incubating: null, // { animal, startTime, endTime }
            animals: [] // 已孵化的动物
        }));

        let adminAuthed = false;
        let incubatorTimer = null;

        // 初始化
        function init() {
            updatePointsDisplay();
            updateIncubator();
            updateAnimalsGrid();
            checkSignStatus();
            startIncubatorTimer();
        }

        // ==================== 签到系统 ====================
        function checkSignStatus() {
            const today = new Date().toDateString();
            const signBtn = document.getElementById('signBtn');
            
            if (gameData.lastSignDate === today) {
                signBtn.disabled = true;
                signBtn.textContent = '今日已签到';
                document.getElementById('signMessage').textContent = `今日获得 ${gameData.todayPoints} 积分`;
            } else {
                signBtn.disabled = false;
                signBtn.textContent = '签到领积分';
            }
        }

        function signIn() {
            const points = Math.floor(Math.random() * 101); // 0-100随机
            const today = new Date().toDateString();
            
            gameData.totalPoints += points;
            gameData.lastSignDate = today;
            gameData.todayPoints = points;
            
            saveGameData();
            updatePointsDisplay();
            checkSignStatus();
            document.getElementById('signMessage').textContent = `✨ 获得 ${points} 积分！`;
        }

        // ==================== 抽蛋系统 ====================
        function drawEgg() {
            if (gameData.incubating) {
                alert('已有正在孵化的蛋，请等待孵化完成');
                return;
            }
            
            if (gameData.totalPoints < 100) {
                alert('积分不足100');
                return;
            }
            
            // 扣积分
            gameData.totalPoints -= 100;
            
            // 抽稀有度
            const rand = Math.random();
            let cumulative = 0;
            let selectedRarity = null;
            
            for (const p of PROBABILITIES) {
                cumulative += p.rate;
                if (rand < cumulative) {
                    selectedRarity = p;
                    break;
                }
            }
            
            // 随机选动物
            const animal = selectedRarity.animals[Math.floor(Math.random() * selectedRarity.animals.length)];
            const animalWithRarity = { ...animal, rarity: selectedRarity.rarity };
            
            // 计算孵化时间（小时转毫秒）
            const hatchTimeMs = animal.hatchTime * 60 * 60 * 1000;
            const now = Date.now();
            
            gameData.incubating = {
                animal: animalWithRarity,
                startTime: now,
                endTime: now + hatchTimeMs
            };
            
            // 动画效果
            document.getElementById('eggEmoji').style.animation = 'shake 0.5s';
            setTimeout(() => {
                document.getElementById('eggEmoji').style.animation = 'float 3s ease-in-out infinite';
            }, 500);
            
            saveGameData();
            updatePointsDisplay();
            updateIncubator();
            startIncubatorTimer();
        }

        // 摇动动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // ==================== 孵化系统 ====================
        function updateIncubator() {
            const incubator = document.getElementById('incubator');
            const emptyDiv = document.getElementById('incubatorEmpty');
            
            if (!gameData.incubating) {
                incubator.innerHTML = '<div class="incubator-empty">🈳 暂无孵化中的蛋</div>';
                return;
            }
            
            const now = Date.now();
            const remaining = Math.max(0, gameData.incubating.endTime - now);
            const total = gameData.incubating.endTime - gameData.incubating.startTime;
            const progress = ((total - remaining) / total) * 100;
            
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const minutes = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            
            incubator.innerHTML = `
                <div class="incubator-egg">🥚</div>
                <div>${gameData.incubating.animal.emoji} ${gameData.incubating.animal.name}</div>
                <div class="incubator-timer">${hours}:${minutes.toString().padStart(2, '0')}</div>
                <div class="incubator-progress">
                    <div class="progress-fill" style="width: ${progress}%"></div>
                </div>
                ${remaining <= 0 ? '<button class="hatch-btn" onclick="hatchEgg()">🐣 孵化</button>' : ''}
            `;
        }

        function hatchEgg() {
            if (!gameData.incubating) return;
            
            const now = Date.now();
            if (now < gameData.incubating.endTime) {
                alert('孵化时间未到');
                return;
            }
            
            // 动物加入收藏
            gameData.animals.push(gameData.incubating.animal);
            gameData.incubating = null;
            
            saveGameData();
            updateIncubator();
            updateAnimalsGrid();
            stopIncubatorTimer();
        }

        function startIncubatorTimer() {
            if (incubatorTimer) clearInterval(incubatorTimer);
            incubatorTimer = setInterval(() => {
                if (gameData.incubating) {
                    updateIncubator();
                }
            }, 1000);
        }

        function stopIncubatorTimer() {
            if (incubatorTimer) {
                clearInterval(incubatorTimer);
                incubatorTimer = null;
            }
        }

        // ==================== 动物收藏 ====================
        function updateAnimalsGrid() {
            const grid = document.getElementById('animalsGrid');
            
            if (gameData.animals.length === 0) {
                grid.innerHTML = '<div style="color:#aaa; text-align:center; grid-column:span 3;">暂无动物</div>';
                return;
            }
            
            grid.innerHTML = gameData.animals.map(animal => `
                <div class="animal-card">
                    <div class="animal-emoji">${animal.emoji}</div>
                    <div class="animal-name">${animal.name}</div>
                    <div class="animal-rarity rarity-${animal.rarity}">${animal.rarity}</div>
                </div>
            `).join('');
        }

        // ==================== 积分系统 ====================
        function updatePointsDisplay() {
            document.getElementById('todayPoints').textContent = gameData.todayPoints || 0;
            document.getElementById('totalPoints').textContent = gameData.totalPoints;
        }

        // ==================== 管理员模式 ====================
        function showAdminModal() {
            document.getElementById('adminModal').classList.add('show');
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.remove('show');
            document.getElementById('adminPassword').value = '';
            adminAuthed = false;
        }

        function checkAdminAuth() {
            const password = document.getElementById('adminPassword').value;
            if (password === '597') {
                adminAuthed = true;
                return true;
            } else {
                alert('密码错误');
                return false;
            }
        }

        function adminAddPoints() {
            if (!checkAdminAuth()) return;
            gameData.totalPoints += 1000;
            saveGameData();
            updatePointsDisplay();
            alert('✅ 已增加1000积分');
        }

        function adminCompleteHatch() {
            if (!checkAdminAuth()) return;
            if (!gameData.incubating) {
                alert('没有正在孵化的蛋');
                return;
            }
            gameData.incubating.endTime = Date.now();
            updateIncubator();
            alert('✅ 已设置为立即孵化');
        }

        function adminResetSign() {
            if (!checkAdminAuth()) return;
            gameData.lastSignDate = null;
            gameData.todayPoints = 0;
            saveGameData();
            checkSignStatus();
            updatePointsDisplay();
            alert('✅ 签到已重置');
        }

        function adminClearEgg() {
            if (!checkAdminAuth()) return;
            gameData.incubating = null;
            saveGameData();
            updateIncubator();
            alert('✅ 孵化器已清空');
        }

        // ==================== 数据存储 ====================
        function saveGameData() {
            localStorage.setItem('animalGame', JSON.stringify(gameData));
        }

        // 初始化
        window.onload = init;
    </script>
</body>
</html>
